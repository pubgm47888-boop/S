<!DOCTYPE html>
<html lang="my" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepLearn AI Workspace</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Phosphor Icons -->

  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase v11 SDKs -->
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore-compat.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f8fafc; }

    .hide-scrollbar::-webkit-scrollbar { display: none; }

<body>
  <!-- Loading Fallback UI -->
  <div id="root">
    <div class="flex flex-col items-center justify-center min-h-screen text-indigo-400">
      <i class="ph ph-spinner animate-spin text-5xl mb-4"></i>
      <h2 class="text-xl font-bold">Workspace ကို ဖွင့်နေပါသည်...</h2>
      <p class="text-xs text-slate-500 mt-2">THET x DeepLearn System</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Sandbox-Safe Storage Helpers ---
    const memoryStore = {};
    const safeGetLocal = (key, defaultVal) => {
      try { return window.localStorage.getItem(key) || memoryStore[key] || defaultVal; } 
      catch(e) { return memoryStore[key] || defaultVal; }
    };
    const safeSetLocal = (key, val) => {
      try { window.localStorage.setItem(key, val); } 
      catch(e) { memoryStore[key] = val; }
    };

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "", 
      authDomain: "default-app-id.firebaseapp.com",
      projectId: "default-app-id",
      storageBucket: "default-app-id.appspot.com",
      messagingSenderId: "1234567890",
      appId: "1:1234567890:web:abcdef123456"
    };

    let safeAppId = 'default-app-id';
    try { if (typeof __app_id !== 'undefined' && __app_id) { safeAppId = __app_id; } } catch(e) {}
    
    let db = null, auth = null;
    try {
      if (typeof __firebase_config !== 'undefined' && __firebase_config) {
        firebase.initializeApp(JSON.parse(__firebase_config));
      } else {
        firebase.initializeApp(firebaseConfig);
      }
      db = firebase.firestore();
      auth = firebase.auth();
    } catch (e) {
      console.warn("Firebase Init Alert:", e);
    }

    function App() {
      // --- Obfuscated Groq Keys ---
      const reversedGroqKeys = [
        "hHiaJbZls8ppgDGU1h9EyjaYY3ZbydGWry4mr7GCKLHpAfagUaM_ksg",
        "qIbKFVpz4ChHJDvKvKFi6hbzefY3YbdGWv2dJxk0b0DKDOLNLuHxE_ksg",
        "eQINb2e5hf3cqz2vO82aYsY3YbdGWVMrYKfQGO2fafVFWWzV_ksg",
        "IBG883db6ivzjm4IbDdWrd3ZDF3YbdGWIWMAA9jh1AqNhpfEAWYI_ksg",
        "n6f7QGnP7sNZc2AbsqhdUXvCkWF3YbdGWFTe8cv9GsDPzOnjiarjY_ksg",
        "qTs3ndmSDrA7Ar9tFXUY10YF3YbdGWZNuSBt9Vzaaa0l0tXHa_ksg",
        "oDLaS5W90bi0sCqeBlBttWpQEF3YbdGWRQIpXxQrAoWvE6jiTePZ_ksg",
        "TcdP0GFgfczs5PZeiQeCKmvgzRF3YbdGWv6wHpF0D3Px4w7tfWq2J_ksg",
        "bbyFfemiOodzFjTIDbNQw7a66uFY3YbdGWxcp1YMfPPr8lzakTjl_ksg",
        "PPWcupcusx4W4l166SV3050hhyF3YbdGWc9xGWpcwbVZQNBX50GId_ksg"
      ];
      const initialGroqKeys = reversedGroqKeys.map(key => key.split('').reverse().join(''));

      // --- Core States ---
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [userRole, setUserRole] = useState('user');
      const [premiumExpiresAt, setPremiumExpiresAt] = useState('');
      
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => safeGetLocal('is_admin_auth', 'false') === 'true');
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');
      const ADMIN_SECRET_KEY = "123456"; 
      
      const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
      const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
      
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [submittedTxId, setSubmittedTxId] = useState('');
      const [activeTab, setActiveTab] = useState('transcript');
      const [groqKeys] = useState(initialGroqKeys);
      const [activeKeyIndex, setActiveKeyIndex] = useState(0);

      // Data States
      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [logs, setLogs] = useState([]);
      const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
      const [transcriptSegments, setTranscriptSegments] = useState(() => {
        try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; }
      });
      const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
      const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
      const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

      // Translate Options
      const [targetLang, setTargetLang] = useState('Myanmar');
      const languagesList = [
        { id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' },
        { id: 'Japanese', name: '🇯🇵 ဂျပန်' }, { id: 'Korean', name: '🇰🇷 ကိုရီးယား' },
        { id: 'Thai', name: '🇹🇭 ထိုင်း' }, { id: 'Chinese', name: '🇨🇳 တရုတ်' },
        { id: 'Russian', name: '🇷🇺 ရုရှား' }, { id: 'French', name: '🇫🇷 ပြင်သစ်' },
        { id: 'Spanish', name: '🇪🇸 စပိန်' }, { id: 'German', name: '🇩🇪 ဂျာမန်' },
        { id: 'Hindi', name: '🇮🇳 ဟိန္ဒီ' }
      ];

      // TTS Options & Presets
      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('my-mm-1'); // Changed to lang codes for robust routing
      const [ttsSpeed, setTtsSpeed] = useState(1.0);
      const [ttsPitch, setTtsPitch] = useState(1.0);
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);
      const [ttsErrorDetail, setTtsErrorMsg] = useState('');
      const audioRef = useRef(null);

      const voicePresets = [
        { id: 'my-mm-1', langCode: 'my', name: '👩🏻 မနီလာ (မြန်မာအမျိုးသမီး)', speed: 1.0, pitch: 1.0 },
        { id: 'my-mm-2', langCode: 'my', name: '👨🏻 ကိုသီဟ (မြန်မာအမျိုးသား)', speed: 1.0, pitch: 0.75 }, // Lower pitch for male sim
        { id: 'en-us-1', langCode: 'en', name: '👩🏼 English Female', speed: 1.0, pitch: 1.1 },
        { id: 'en-us-2', langCode: 'en', name: '👨🏼 English Male', speed: 1.0, pitch: 0.8 },
        { id: 'ja-jp-1', langCode: 'ja', name: '👩🏻 Japanese Female', speed: 1.0, pitch: 1.2 },
        { id: 'ko-kr-1', langCode: 'ko', name: '👩🏻 Korean Female', speed: 1.0, pitch: 1.1 },
        { id: 'th-th-1', langCode: 'th', name: '👩🏽 Thai Female', speed: 1.0, pitch: 1.1 },
        { id: 'zh-cn-1', langCode: 'zh-CN', name: '👩🏻 Chinese Female', speed: 1.0, pitch: 1.0 },
        { id: 'my-mm-3', langCode: 'my', name: '👧🏻 ကလေးမလေးသံ (မြန်မာ)', speed: 1.1, pitch: 1.4 },
        { id: 'my-mm-4', langCode: 'my', name: '👵🏻 အဘွားအိုသံ (မြန်မာ)', speed: 0.85, pitch: 0.8 }
      ];

      const handleVoiceChange = (vid) => {
        setSelectedVoice(vid);
        const p = voicePresets.find(v => v.id === vid);
        if(p) { setTtsSpeed(p.speed); setTtsPitch(p.pitch); }
      };

      // UI States
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [paymentRequests, setPaymentRequests] = useState([]);
      const [showShareModal, setShowShareModal] = useState(false);
      const [generatedShareUrl, setGeneratedShareUrl] = useState('');
      const [selectedReceiptUrl, setSelectedReceiptUrl] = useState(''); // Added back for Admin

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      // --- Firebase Auth & Shared Link Initializer ---
      useEffect(() => {
        const initAuth = async () => {
          if (!auth) return;
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await auth.signInWithCustomToken(__initial_auth_token);
            } else { await auth.signInAnonymously(); }
          } catch (e) {}
        };
        initAuth();

        let unsub;
        if(auth) {
           unsub = auth.onAuthStateChanged(user => {
            if (user && db) {
              setFirebaseUser(user);
              db.doc(`artifacts/${safeAppId}/users/${user.uid}/profile/status`).onSnapshot(doc => {
                if (doc.exists) {
                  setUserRole(doc.data().role || 'user');
                  setPremiumExpiresAt(doc.data().expiresAt || '');
                } else {
                  db.doc(`artifacts/${safeAppId}/users/${user.uid}/profile/status`).set({ role: 'user', expiresAt: '' });
                }
              }, err => {});
            }
          });
        }

        const readShareData = async () => {
           try {
             const params = new URLSearchParams(window.location.search);
             const shareId = params.get('share');
             if(shareId && db) {
                const doc = await db.doc(`artifacts/${safeAppId}/public/data/shares/${shareId}`).get();
                if (doc.exists) {
                    const data = doc.data();
                    if(data.transcript) setTranscriptText(data.transcript);
                    if(data.segments) setTranscriptSegments(data.segments);
                    if(data.srt) setSrtText(data.srt);
                    if(data.translatedText) setTranslatedText(data.translatedText);
                    if(data.translatedSrt) setTranslatedSrtText(data.translatedSrt);
                    showToast("မျှဝေထားသော အချက်အလက်များ ဖွင့်ပြီးပါပြီ။", "success");
                }
             }
           } catch(e) {}
        }
        setTimeout(readShareData, 1000);
        return () => { if(unsub) unsub(); }
      }, []);

      // --- Admin Payments Listener ---
      useEffect(() => {
        if (!firebaseUser || !db || !isAdminAuthenticated) return; // Optimize listener
        const unsub = db.collection(`artifacts/${safeAppId}/public/data/payments`).onSnapshot(snapshot => {
          const list = [];
          snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
          // Sort to show pending first, then newest
          list.sort((a, b) => {
             if (a.status === 'Pending' && b.status !== 'Pending') return -1;
             if (a.status !== 'Pending' && b.status === 'Pending') return 1;
             return new Date(b.timestamp) - new Date(a.timestamp);
          });
          setPaymentRequests(list);
        }, err => {});
        return () => unsub();
      }, [firebaseUser, isAdminAuthenticated]); // Re-run if admin auth changes

      // --- Caching ---
      useEffect(() => {
        safeSetLocal('stored_transcript', transcriptText);
        safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
        safeSetLocal('stored_srt', srtText);
        safeSetLocal('stored_translation', translatedText);
        safeSetLocal('stored_translated_srt', translatedSrtText);
      }, [transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

      // --- Extract & Encode Audio (Local) ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(["အသံလှိုင်းများကို ပြင်ဆင်နေပါသည်... ⏳"]);
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              setLogs([`အသံဖိုင် ပြင်ဆင်ပြီးပါပြီ။ 🚀`]);
              resolve(new File([wavBlob], "audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
        writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Main Actions ---
      const runTranscription = async () => {
        if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!", "error"); return; }
        setIsProcessing(true); setLogs(["AI စတင် အလုပ်လုပ်နေပါပြီ..."]);
        let audioFileToSend = selectedFile;
        
        // Auto convert videos locally before sending
        if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov)$/i)) {
          try { audioFileToSend = await processAndExtractAudio(selectedFile); } 
          catch (err) { setLogs(["ဗီဒီယိုမှ အသံထုတ်ယူခြင်း မအောင်မြင်ပါ။ မူရင်းဖိုင်အတိုင်း ပို့ပါမည်။"]); }
        }

        let success = false, resultText = "", resultSegments = [];
        
        // 1. Try Custom Key
        if (userGroqKey) {
          try {
            const formData = new FormData(); formData.append('file', audioFileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
            const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${userGroqKey}` }, body: formData });
            if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; }
          } catch (err) {}
        }
        
        // 2. Try Built-in Keys
        if (!success) {
          let keyIndex = activeKeyIndex;
          for (let i = 0; i < 10; i++) {
            try {
              const formData = new FormData(); formData.append('file', audioFileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
              const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${groqKeys[keyIndex]}` }, body: formData });
              if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; setActiveKeyIndex(keyIndex); break; }
            } catch (err) { keyIndex = (keyIndex + 1) % 10; }
          }
        }
        
        if (success) {
          setTranscriptText(resultText); setTranscriptSegments(resultSegments); showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။", "success"); setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
        } else {
          showToast("API Limit ပြည့်နေပါသည်။", "warning"); setLogs(["⚠️ API Limit ကျော်လွန်နေပါသည်။"]);
        }
        setIsProcessing(false);
      };

      const generateSrt = () => {
        if (!transcriptText || transcriptSegments.length === 0) { showToast("စာသားအရင်ထုတ်ပါ!", "error"); return; }
        setIsProcessing(true);
        setTimeout(() => {
          let srtResult = "";
          const formatTime = (seconds) => {
            const date = new Date(seconds * 1000);
            return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
          };
          transcriptSegments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
          setSrtText(srtResult); showToast("SRT ဖန်တီးပြီးပါပြီ။", "success"); setIsProcessing(false);
        }, 500);
      };

      const runTranslation = async (type) => {
        if (!userGeminiKey) { showToast("Gemini Key မရှိပါ! Settings ထဲတွင် ထည့်ပါ။", "error"); return; }
        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent) { showToast("ဘာသာပြန်ရန် စာသားမရှိပါ။", "error"); return; }

        setIsProcessing(true);
        const prompt = type === 'srt' 
          ? `Translate this SRT file into ${targetLang}. Preserve all numbers and timestamps exactly. Only translate the text. SRT:\n\n${sourceContent}`
          : `Translate the following text into ${targetLang}:\n\n${sourceContent}`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          const result = (await res.json()).candidates[0].content.parts[0].text;
          type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
          showToast(`အောင်မြင်စွာ ပြန်ဆိုပြီးပါပြီ။`, "success");
        } catch (e) { showToast("Gemini Key မှားယွင်းနိုင်ပါသည်။", "error"); }
        setIsProcessing(false);
      };

      // --- Premium TTS Play Function (FIXED FOR MULTI-LANG) ---
      const runNeuralTtsPlay = async () => {
        if (userRole !== 'premium') { showToast("Premium ဖြင့်သာ သုံးနိုင်ပါသည်။", "error"); return; }
        if (!ttsInput.trim()) return;
        setIsSynthesizing(true); setTtsErrorMsg('');

        try {
          // Get correct language code from preset
          const preset = voicePresets.find(v => v.id === selectedVoice);
          const langCode = preset ? preset.langCode : 'my'; // default to Myanmar

          const speechUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${langCode}&client=tw-ob&q=${encodeURIComponent(ttsInput.trim())}`;
          
          if (audioRef.current) audioRef.current.pause();
          const audioObj = new Audio(speechUrl);
          audioRef.current = audioObj;

          // Apply Pitch & Speed Simulation
          if (ttsPitch !== 1.0) { 
              audioObj.preservesPitch = false; 
              audioObj.playbackRate = ttsSpeed * ttsPitch; 
          } else { 
              audioObj.preservesPitch = true; 
              audioObj.playbackRate = ttsSpeed; 
          }

          audioObj.oncanplaythrough = () => { 
             audioObj.play().catch(() => { 
                setTtsErrorMsg("Browser Auto-play Blocked. ဖွင့်ခလုတ်ကို ကိုယ်တိုင်နှိပ်ပါ။"); 
                setIsSynthesizing(false); 
             }); 
          };
          audioObj.onplaying = () => { setIsSynthesizing(false); setSynthesizedAudioUrl(speechUrl); };
          audioObj.onerror = () => { setTtsErrorMsg("အသံဖိုင် ဖွင့်၍မရပါ။"); setIsSynthesizing(false); };

          {/* --- Modals --- */}
          {/* Share Modal */}
          {showShareModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="glass-card w-full max-w-sm rounded-3xl p-8 shadow-2xl relative text-center">
                <button onClick={() => setShowShareModal(false)} className="absolute top-5 right-5 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i className="ph ph-x"></i></button>
                <div className="w-16 h-16 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/30"><i className="ph-fill ph-share-network text-2xl"></i></div>
                <h3 className="text-lg font-bold text-white mb-2">Share Workspace</h3>
                <p className="text-xs text-slate-400 mb-6">Send this link to share your extracted text and translations.</p>
                <div className="bg-slate-950 border border-slate-800 p-4 rounded-xl mb-6 font-mono text-[11px] text-slate-300 break-all select-all shadow-inner">
                   {generatedShareUrl}
                </div>
                <button onClick={() => copyToClipboard(generatedShareUrl)} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg flex items-center justify-center gap-2 transition-all">
                   <i className="ph-fill ph-copy text-lg"></i> Copy Link
                </button>
              </div>
            </div>
          )}

          {/* Payment Modal */}
          {showPaymentModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="glass-card w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                <button onClick={() => setShowPaymentModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i className="ph ph-x"></i></button>
                
                <div className="text-center mb-6 pt-2">
                  <h3 className="text-xl font-bold text-amber-400 mb-2">Go Premium</h3>
                  <div className="bg-slate-950 inline-block px-5 py-2.5 rounded-2xl border border-slate-800 shadow-inner">
                    <span className="text-white text-lg font-bold tracking-wide">၁ လ - ၁၀,၀၀၀ ကျပ်</span>
                  </div>
                </div>
                
                <div className="flex gap-4 mb-6">
                   <div className="flex-1 bg-white p-2 rounded-2xl text-center shadow-lg">
                      <img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" className="w-full h-auto rounded-lg object-contain" />
                      <p className="text-black font-extrabold text-[10px] mt-2">KBZ Pay</p>
                   </div>
                   <div className="flex-1 bg-white p-2 rounded-2xl text-center shadow-lg">
                      <img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" className="w-full h-auto rounded-lg object-contain" />
                      <p className="text-black font-extrabold text-[10px] mt-2">Wave Pay</p>
                   </div>
                </div>

                <form onSubmit={handlePaymentSubmit} className="space-y-5">
                  <div>
                    <label className="text-xs text-slate-400 font-bold mb-2 block text-center">Transaction ID (နောက်ဆုံး ၆ လုံး/ ၈ လုံး)</label>
                    <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:outline-none focus:border-amber-500 font-mono tracking-[0.2em] text-center text-lg shadow-inner" placeholder="123456" />
                  </div>
                  
                  {/* Image Upload Input added back for Admin Verification */}
                  <div>
                    <label className="text-xs text-slate-400 font-bold mb-2 block text-center">ငွေလွှဲပြေစာ ပုံတင်ရန်</label>
                    <input type="file" accept="image/*" className="w-full text-xs text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-slate-800 file:text-indigo-400 hover:file:bg-slate-700" />
                  </div>

                  <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-400 text-slate-950 font-bold py-4 rounded-xl shadow-lg shadow-amber-500/20 text-sm hover:scale-[1.02] transition-transform">အတည်ပြုချက် တင်ပြမည်</button>
                </form>
              </div>
            </div>
          )}

          {/* Receipt Preview Modal */}
          {selectedReceiptUrl && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm z-[100] flex items-center justify-center p-4">
              <div className="relative w-full max-w-md">
                <button onClick={() => setSelectedReceiptUrl('')} className="absolute -top-12 right-0 text-white font-bold bg-slate-800 hover:bg-slate-700 w-10 h-10 rounded-full flex items-center justify-center"><i className="ph ph-x text-xl"></i></button>
                <img src={selectedReceiptUrl} className="w-full h-auto max-h-[80vh] object-contain rounded-lg border border-slate-700 shadow-2xl" />
              </div>
            </div>
          )}

          {/* Admin Login Modal (Password: 123456) */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
              <div className="glass-card w-full max-w-xs rounded-3xl p-8 shadow-2xl relative text-center">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i className="ph ph-x"></i></button>
                <div className="w-16 h-16 bg-slate-900 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-800"><i className="ph-fill ph-lock-key text-2xl"></i></div>
                <h3 className="text-lg font-bold text-white mb-6">Admin Login</h3>
                <form onSubmit={handleAdminLogin} className="space-y-5">
                  <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:outline-none text-center tracking-[0.3em] text-xl font-mono shadow-inner" placeholder="••••••" />
                  <button type="submit" className="w-full bg-slate-100 text-slate-900 hover:bg-white font-bold py-4 rounded-xl shadow-lg text-sm transition-transform active:scale-95">ဝင်ရောက်မည်</button>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
  </script>
</body>
</html>
