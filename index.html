      // --- Premium Expiration Watcher ---

      // --- ⚙️ BROWSER-BASED AUDIO EXTRACTION & DOWNSAMPLING ENGINE ⚙️ ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(prev => [...prev, "⚡ ဗီဒီယိုဖိုင်အား ဖတ်ရှုနေပါသည်..."]);
              const arrayBuffer = e.target.result;
              
              const AudioContextClass = window.AudioContext || window.webkitAudioContext;
              const audioCtx = new AudioContextClass();
              
              setLogs(prev => [...prev, "⚡ ဗီဒီယိုထဲမှ အသံလှိုင်းများကို စတင်ခွဲထုတ်နေပါသည် (Decoding Audio Track)..."]);
              const decodedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
              
              setLogs(prev => [...prev, "⚡ အသံလှိုင်းများကို 16,000Hz Speech WAV အဖြစ်သို့ အရွယ်အစားချုံ့နေပါသည်..."]);
              
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              
              setLogs(prev => [...prev, `✅ အသံဖိုင်အား အောင်မြင်စွာချုံ့ပြီးပါပြီ။ (အရွယ်အစား: ${(wavBlob.size / (1024 * 1024)).toFixed(2)} MB)`]);
              resolve(new File([wavBlob], "compressed_audio.wav", { type: "audio/wav" }));
            } catch (err) {
              reject(err);
            }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);

        const writeString = (offset, string) => {
          for (let i = 0; i < string.length; i++) {
            view.setUint8(offset + i, string.charCodeAt(i));
          }
        };

        writeString(0, 'RIFF');
        view.setUint32(4, length - 8, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, length - 44, true);

        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }

        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Transcript Generation with Single Provided Key ---

          return;

        setIsProcessing(true);
        setLogs(["🚀 လုပ်ဆောင်ချက် စတင်နေပြီ..."]);

        let audioFileToSend = selectedFile;
        const isVideo = selectedFile.type.startsWith('video/') || selectedFile.name.endsWith('.mp4') || selectedFile.name.endsWith('.mkv') || selectedFile.name.endsWith('.mov');

        if (isVideo) {
          try {
            audioFileToSend = await processAndExtractAudio(selectedFile);
          } catch (err) {
            console.error("Audio Extraction Error:", err);
            setLogs(prev => [...prev, "⚠️ ဗီဒီယိုမှ အသံဖိုင်ခွဲထုတ်ခြင်း မအောင်မြင်ပါ။ မူရင်းဖိုင်အတိုင်း ဆက်လက်ပေးပို့ပါမည်။"]);
          }
        }

        setLogs(prev => [...prev, `📤 Groq API သို့ ပေးပို့နေပါသည်...`]);

        try {
          const formData = new FormData();
          formData.append('file', audioFileToSend);
          formData.append('model', 'whisper-large-v3-turbo');

          const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${MAIN_GROQ_KEY}` },
            body: formData
          });

          if (!response.ok) {
            let exactErrorMessage = `HTTP Error Code: ${response.status}`;
            try {
                const errorData = await response.json();
                if (errorData.error && errorData.error.message) {
                    exactErrorMessage = errorData.error.message;
                }
            } catch(parseError) {}
            throw new Error(exactErrorMessage);
          }

          const data = await response.json();
          setTranscriptText(data.text);
          setApiStatus('Active 🟢');
          setLogs(prev => [...prev, "✅ စာသားပြောင်းလဲခြင်း အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
          showToast("စာသားပြောင်းလဲခြင်း အောင်မြင်ပါပြီ။", "success");

        } catch (err) {
          setApiStatus('Error 🔴');
          setLogs(prev => [...prev, `❌ ချို့ယွင်းချက်ဖြစ်ပေါ်နေပါသည်: ${err.message}`]);
          showToast("API အလုပ်မလုပ်ပါ။ အောက်ရှိ Log ကိုဖတ်ရှုပါ။", "error");
        }
        
        setIsProcessing(false);
      };

      // --- Generate SRT Subtitles ---
      const generateSrt = () => {
        if (!transcriptText) {
          showToast("SRT ထုတ်ရန်အတွက် အရင်ဆုံး Transcript အပိုင်းတွင် စာသားပြောင်းလဲခြင်း အရင်လုပ်ဆောင်ပါ!", "error");
          return;
        }
        setIsProcessing(true);
        setLogs(["စာတန်းထိုး (SRT) ဖိုင် စတင်ဖန်တီးနေပါသည်..."]);

        setTimeout(() => {
          const sentences = transcriptText.match(/[^|]|[^\.!\?]+[\.!\?]+/g) || [transcriptText];
          let srtResult = "";
          
          sentences.forEach((sentence, idx) => {
            const startSec = idx * 5;
            const endSec = (idx + 1) * 5;
            const formatTime = (sec) => {
              const hrs = String(Math.floor(sec / 3600)).padStart(2, '0');
              const mins = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
              const secs = String(sec % 60).padStart(2, '0');
              return `${hrs}:${mins}:${secs},000`;
            };
            srtResult += `${idx + 1}\n${formatTime(startSec)} --> ${formatTime(endSec)}\n${sentence.trim()}\n\n`;
          });

          setSrtText(srtResult);
          showToast("SRT Subtitles ထုတ်လုပ်မှု အောင်မြင်ပါပြီ။", "success");
          setIsProcessing(false);
        }, 1000);
      };

      // --- Dual-Mode AI Translation Engine (Gemini) ---
      const runTranslation = async (type) => {
        if (!userGeminiKey) {
          showToast("သင်၏ ကိုယ်ပိုင် Gemini API Key အား Settings တွင် ထည့်သွင်းပေးပါ!", "error");
          return;
        }

        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent) {
          showToast("ဘာသာပြန်ရန် မူရင်း အချက်အလက် မရှိသေးပါ။", "error");
          return;
        }

        setIsProcessing(true);
        setLogs([`Gemini API ဖြင့် ${type.toUpperCase()} အား စတင်ဘာသာပြန်နေပါသည်...`]);

        const prompt = type === 'srt' 
          ? `You are an expert subtitle translator. Translate the following SRT subtitle file into English. You MUST preserve all block numbers and timestamps (e.g. 00:00:05,000 --> 00:00:10,000) exactly. Do NOT modify any formatting. Translate ONLY the subtitle texts. Here is the SRT file:\n\n${sourceContent}`
          : `Translate the following transcript text professionally and naturally into English:\n\n${sourceContent}`;

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });
          const data = await response.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Completed.";
          
          if (type === 'srt') {
            setTranslatedSrtText(result);
          } else {
            setTranslatedText(result);
          }
          showToast("အင်္ဂလိပ်သို့ အောင်မြင်စွာ ဘာသာပြန်ဆိုပြီးပါပြီ။", "success");
        } catch (e) {
          showToast("ဘာသာပြန်ဆိုမှု မအောင်မြင်ပါ။ Key ကိုပြန်စစ်ပါ။", "error");
        }
        setIsProcessing(false);
      };

      // --- Premium TTS System ---
      const runNeuralTtsPlay = async () => {
        if (userRole !== 'premium') {
          showToast("❌ ဤ Feature သည် Premium အသုံးပြုသူများသာ သုံးခွင့်ရှိပါသည်။", "error");
          return;
        }
        if (!ttsInput.trim()) {
          showToast("အသံထုတ်လုပ်ရန် စာသားရိုက်ထည့်ပါ!", "error");
          return;
        }

        setIsSynthesizing(true);
        setTtsErrorMsg('');

        try {
          const targetLang = "my";
          const speechUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=${targetLang}&client=tw-ob&q=${encodeURIComponent(ttsInput.trim())}`;
          
          if (audioRef.current) {
            audioRef.current.pause();
          }

          const audioObj = new Audio(speechUrl);
          audioRef.current = audioObj;

          audioObj.oncanplaythrough = () => {
            audioObj.play().catch(err => {
              setTtsErrorMsg("Browser Policy Block: အသံဖိုင်ကို တိုက်ရိုက် auto-play ခွင့်မပြုပါ။ Play ခလုတ်ကို ကိုယ်တိုင်နှိပ်ပေးရန် လိုအပ်ပါသည်။");
              setIsSynthesizing(false);
            });
          };

          audioObj.onplaying = () => {
            setIsSynthesizing(false);

            setIsSynthesizing(false);
          };

        } catch (err) {
          setTtsErrorMsg(`အသံဖိုင်ထုတ်လုပ်မှု မအောင်မြင်ပါ: ${err.message}`);
          setIsSynthesizing(false);
        }
      };

      const handlePaymentSubmit = (e) => {
        e.preventDefault();
        showToast("Payment submission requires backend, UI simulated.", "info");
        setShowPaymentModal(false);
      };
      
      const handleAdminLogin = (e) => {
          e.preventDefault();
          if (adminPasswordInput === ADMIN_SECRET_KEY) {
              setIsAdminAuthenticated(true);
              sessionStorage.setItem('is_admin_auth', 'true');
              setShowAdminLoginModal(false);
              showToast("Admin အဖြစ် ဝင်ရောက်အောင်မြင်ပါသည်။", "success");
          } else {
              showToast("Admin Password မှားယွင်းနေပါသည်။", "error");
          }
      };
      
      const handleApproveRequest = (req) => { showToast("Approve disabled in demo.", "info"); };
      const handleRejectRequest = (id) => { showToast("Reject disabled in demo.", "info"); };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans relative">
          
          {/* TOAST SYSTEM */}
          {toast.show && (
            <div className="fixed bottom-5 right-5 z-50">
              <div className={`px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 text-xs font-bold border ${
                toast.type === 'success' ? 'bg-emerald-950 border-emerald-500 text-emerald-300' : 
                toast.type === 'error' ? 'bg-red-950 border-red-500 text-red-300' :
                toast.type === 'warning' ? 'bg-amber-950 border-amber-500 text-amber-300' :
                'bg-indigo-950 border-indigo-500 text-indigo-300'
              }`}>
                <span>{toast.message}</span>
              </div>
