<body class="bg-[#020617] text-slate-100 min-h-screen selection:bg-indigo-500/30">

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Sandbox-Safe Memory System ---
        const memoryStore = {};
        const safeGetLocal = (key, defaultVal) => {
          try { return window.localStorage.getItem(key) || memoryStore[key] || defaultVal; } 
          catch(e) { return memoryStore[key] || defaultVal; }
        };
        const safeSetLocal = (key, val) => {
          try { window.localStorage.setItem(key, val); } 
          catch(e) { memoryStore[key] = val; }
        };
        const safeGetSession = (key, defaultVal) => {
          try { return window.sessionStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; }
        };
        const safeSetSession = (key, val) => {
          try { window.sessionStorage.setItem(key, val); } catch(e) {}
        };
        const safeRemoveSession = (key) => {
          try { window.sessionStorage.removeItem(key); } catch(e) {}
        };

        // --- Firebase Setup ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "dummy", authDomain: "dummy", projectId: "dummy", storageBucket: "dummy", messagingSenderId: "dummy", appId: "dummy"
        };
        
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.firestore();
        const safeAppId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        function App() {
          // --- Obfuscated System Free Groq Keys (10 Keys Loop) ---
          const reversedGroqKeys = [
            "hHiaJbZls8ppgDGU1h9EyjaYY3ZbydGWry4mr7GCKLHpAfagUaM_ksg",
            "qIbKFVpz4ChHJDvKvKFi6hbzefY3YbdGWv2dJxk0b0DKDOLNLuHxE_ksg",
            "eQINb2e5hf3cqz2vO82aYsY3YbdGWVMrYKfQGO2fafVFWWzV_ksg",
            "IBG883db6ivzjm4IbDdWrd3ZDF3YbdGWIWMAA9jh1AqNhpfEAWYI_ksg",
            "n6f7QGnP7sNZc2AbsqhdUXvCkWF3YbdGWFTe8cv9GsDPzOnjiarjY_ksg",
            "qTs3ndmSDrA7Ar9tFXUY10YF3YbdGWZNuSBt9Vzaaa0l0tXHa_ksg",
            "oDLaS5W90bi0sCqeBlBttWpQEF3YbdGWRQIpXxQrAoWvE6jiTePZ_ksg",
            "TcdP0GFgfczs5PZeiQeCKmvgzRF3YbdGWv6wHpF0D3Px4w7tfWq2J_ksg",
            "bbyFfemiOodzFjTIDbNQw7a66uFY3YbdGWxcp1YMfPPr8lzakTjl_ksg",
            "PPWcupcusx4W4l166SV3050hhyF3YbdGWc9xGWpcwbVZQNBX50GId_ksg"
          ];
          const initialGroqKeys = reversedGroqKeys.map(key => key.split('').reverse().join(''));

          // --- Core States ---
          const [firebaseUser, setFirebaseUser] = useState(null);
          const [userRole, setUserRole] = useState('user');
          const [premiumExpiresAt, setPremiumExpiresAt] = useState('');
          
          const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => safeGetSession('is_admin_auth', 'false') === 'true');
          const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const ADMIN_SECRET_KEY = "111"; 
          
          const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
          const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
          
          const [showPaymentModal, setShowPaymentModal] = useState(false);
          const [submittedTxId, setSubmittedTxId] = useState('');
          const [activeTab, setActiveTab] = useState('transcript');
          const [groqKeys] = useState(initialGroqKeys);
          const [activeKeyIndex, setActiveKeyIndex] = useState(0);

          // Data States
          const [selectedFile, setSelectedFile] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);
          const [logs, setLogs] = useState([]);
          const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
          const [transcriptSegments, setTranscriptSegments] = useState(() => {
            try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; }
          });
          const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
          const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
          const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

          // Target Languages Setup
          const [targetLang, setTargetLang] = useState('Myanmar');
          const languagesList = [
            { id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' },
            { id: 'Japanese', name: '🇯🇵 ဂျပန်' }, { id: 'Korean', name: '🇰🇷 ကိုရီးယား' },
            { id: 'Thai', name: '🇹🇭 ထိုင်း' }, { id: 'Chinese', name: '🇨🇳 တရုတ်' },
            { id: 'Russian', name: '🇷🇺 ရုရှား' }, { id: 'French', name: '🇫🇷 ပြင်သစ်' },
            { id: 'Spanish', name: '🇪🇸 စပိန်' }, { id: 'German', name: '🇩🇪 ဂျာမန်' },
            { id: 'Hindi', name: '🇮🇳 ဟိန္ဒီ' }
          ];

          // TTS Options
          const [customTtsApi, setCustomTtsApi] = useState(() => safeGetLocal('custom_tts_api', 'https://Myanmar-Voice-Generator.pubgm47888.replit.dev/tts'));
          const [ttsInput, setTtsInput] = useState('');
          const [selectedVoice, setSelectedVoice] = useState('my-MM-NilarNeural');
          const [ttsSpeed, setTtsSpeed] = useState(1.0);
          const [ttsPitch, setTtsPitch] = useState(1.0);
          const [ttsChunks, setTtsChunks] = useState([]); 

          const voicePresets = [
            { id: 'my-MM-NilarNeural', name: '👩🏻 မနီလာ (Nilar - Female)' },
            { id: 'my-MM-ThihaNeural', name: '👨🏻 ကိုသီဟ (Thiha - Male)' }
          ];

          // Testing API Key Statuses
          const [isTestingGroq, setIsTestingGroq] = useState(false);
          const [groqStatus, setGroqStatus] = useState(null);
          const [isTestingGemini, setIsTestingGemini] = useState(false);
          const [geminiStatus, setGeminiStatus] = useState(null);

          const [toast, setToast] = useState({ show: false, message: '' });
          const [paymentRequests, setPaymentRequests] = useState([]);
          const [showShareModal, setShowShareModal] = useState(false);
          const [generatedShareUrl, setGeneratedShareUrl] = useState('');

          const showToast = (message) => {
            setToast({ show: true, message });
            setTimeout(() => setToast({ show: false, message: '' }), 4000);
          };

          // --- Sync Firebase Status and Shared Data Links ---
          useEffect(() => {
            const initAuth = async () => {
              try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                  await auth.signInWithCustomToken(__initial_auth_token);
                } else { 
                  await auth.signInAnonymously(); 
                }
              } catch (e) {
                console.error("Auth error", e);
              }
            };
            initAuth();

            const unsub = auth.onAuthStateChanged(user => {
              if (user) {
                setFirebaseUser(user);
                const statusRef = db.collection('artifacts').doc(safeAppId).collection('users').doc(user.uid).collection('profile').doc('status');
                statusRef.onSnapshot(docSnap => {
                  if (docSnap.exists) {
                    setUserRole(docSnap.data().role || 'user');
                    setPremiumExpiresAt(docSnap.data().expiresAt || '');
                  } else {
                    statusRef.set({ role: 'user', expiresAt: '' });
                  }
                }, err => console.warn(err));
              }
            });

            const readShareData = async () => {
               try {
                 const params = new URLSearchParams(window.location.search);
                 const shareId = params.get('share');
                 if(shareId) {
                    const shareRef = db.collection('artifacts').doc(safeAppId).collection('public').doc('data').collection('shares').doc(shareId);
                    const docSnap = await shareRef.get();
                    if (docSnap.exists) {
                        const data = docSnap.data();
                        if(data.transcript) setTranscriptText(data.transcript);
                        if(data.segments) setTranscriptSegments(data.segments);
                        if(data.srt) setSrtText(data.srt);
                        if(data.translatedText) setTranslatedText(data.translatedText);
                        if(data.translatedSrt) setTranslatedSrtText(data.translatedSrt);
                        showToast("မျှဝေထားသော အချက်အလက်များ ဖွင့်ပြီးပါပြီ။");
                    }
                 }
               } catch(e) {}
            };
            setTimeout(readShareData, 1000);
            return () => unsub();
          }, []);

          useEffect(() => {
            if (!firebaseUser) return;
            const paymentsRef = db.collection('artifacts').doc(safeAppId).collection('public').doc('data').collection('payments');
            const unsub = paymentsRef.onSnapshot(snapshot => {
              const list = [];
              snapshot.forEach(d => list.push({ id: d.id, ...d.data() }));
              setPaymentRequests(list);
            }, err => console.warn(err));
            return () => unsub();
          }, [firebaseUser]);

          useEffect(() => {
            safeSetLocal('stored_transcript', transcriptText);
            safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
            safeSetLocal('stored_srt', srtText);
            safeSetLocal('stored_translation', translatedText);
            safeSetLocal('stored_translated_srt', translatedSrtText);
          }, [transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

          // --- Lucide Refresh Trigger ---
          useEffect(() => {
            if(window.lucide) { window.lucide.createIcons(); }
          }, [activeTab, ttsChunks, showPaymentModal, showAdminLoginModal, showShareModal, userRole]);

          // --- Test API Keys System ---
          const testGroqKey = async () => {
            if(!userGroqKey) { showToast("Key အရင်ထည့်ပါ"); return; }
            setIsTestingGroq(true); setGroqStatus(null);
            try {
              const res = await fetch('https://api.groq.com/openai/v1/models', {
                headers: { 'Authorization': `Bearer ${userGroqKey}` }
              });
              if (res.ok) {
                setGroqStatus('success'); showToast("✅ Groq Key အလုပ်လုပ်ပါသည်။");
              } else {
                setGroqStatus('error'); showToast("❌ Groq Key မှားယွင်းနေပါသည်။");
              }
            } catch(e) {
              setGroqStatus('error'); showToast("Connection Error");
            }
            setIsTestingGroq(false);
          };

          const testGeminiKey = async () => {
            if(!userGeminiKey) { showToast("Key အရင်ထည့်ပါ"); return; }
            setIsTestingGemini(true); setGeminiStatus(null);
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
              });
              if (res.ok) {
                setGeminiStatus('success'); showToast("✅ Gemini Key အလုပ်လုပ်ပါသည်။");
              } else {
                setGeminiStatus('error'); showToast("❌ Gemini Key မှားယွင်းနေပါသည်။");
              }
            } catch(e) {
              setGeminiStatus('error'); showToast("Connection Error");
            }
            setIsTestingGemini(false);
          };

          // --- Video to Mono WAV Audio Converter Engine ---
          const processAndExtractAudio = async (videoFile) => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = async (e) => {
                try {
                  setLogs(["အသံလှိုင်းများကို သီးသန့်ခွဲထုတ်နေပါသည်... ⏳"]);
                  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                  const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
                  const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
                  const bufferSource = offlineCtx.createBufferSource();
                  bufferSource.buffer = decodedBuffer;
                  bufferSource.connect(offlineCtx.destination);
                  bufferSource.start();
                  const renderedBuffer = await offlineCtx.startRendering();
                  
                  const buffer = renderedBuffer.getChannelData(0);
                  const sampleRate = renderedBuffer.sampleRate;
                  const length = buffer.length * 2 + 44;
                  const bufferArray = new ArrayBuffer(length);
                  const view = new DataView(bufferArray);
                  const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
                  writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
                  let offset = 44;
                  for (let i = 0; i < buffer.length; i++, offset += 2) {
                    const s = Math.max(-1, Math.min(1, buffer[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                  }
                  const wavBlob = new Blob([view], { type: 'audio/wav' });
                  setLogs([`အသံဖိုင် သီးသန့်ထုတ်ယူမှု အောင်မြင်ပါသည်။ 🚀`]);
                  resolve(new File([wavBlob], "audio.wav", { type: "audio/wav" }));
                } catch (err) { reject(err); }
              };
              reader.onerror = () => reject(new Error("File reading failed"));
              reader.readAsArrayBuffer(videoFile);
            });
          };

          // --- Run Transcription (Key Loop Backup System) ---
          const runTranscription = async () => {
            if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!"); return; }
            setIsProcessing(true); setLogs(["AI စတင်အလုပ်လုပ်နေပါပြီ..."]);
            
            let audioFileToSend = selectedFile;
            if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov)$/i)) {
              try { audioFileToSend = await processAndExtractAudio(selectedFile); } 
              catch (err) { setLogs(["ဗီဒီယိုမှ အသံထုတ်ယူခြင်း မအောင်မြင်ပါ။"]); }
            }

            let success = false, resultText = "", resultSegments = [];
            if (userGroqKey) {
              try {
                const formData = new FormData(); formData.append('file', audioFileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
                const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${userGroqKey}` }, body: formData });
                if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; }
              } catch (err) {}
            }
            
            if (!success) {
              let keyIndex = activeKeyIndex;
              for (let i = 0; i < 10; i++) {
                try {
                  setLogs([`System Back-up Key (${keyIndex + 1}) ဖြင့် ကြိုးစားနေပါသည်... ⏳`]);
                  const formData = new FormData(); formData.append('file', audioFileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
                  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${groqKeys[keyIndex]}` }, body: formData });
                  if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; setActiveKeyIndex(keyIndex); break; }
                } catch (err) { keyIndex = (keyIndex + 1) % 10; }
              }
            }

            if (success) {
              setTranscriptText(resultText); setTranscriptSegments(resultSegments); showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။"); setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
            } else {
              showToast("API Limit ပြည့်နေပါသည်။"); setLogs(["⚠️ System Free Keys အားလုံး Limit ကျော်လွန်နေပါသည်။ ကိုယ်ပိုင် Key ထည့်သွင်းပေးပါ။"]);
            }
            setIsProcessing(false);
          };

          // --- SRT Generator ---
          const generateSrt = () => {
            if (!transcriptText) { showToast("စာသားအရင်ထုတ်ပါ သို့မဟုတ် စာသားဖြည့်ပါ!"); return; }
            setIsProcessing(true);
            setTimeout(() => {
              let srtResult = "";
              const formatTime = (seconds) => {
                const date = new Date(seconds * 1000);
                return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
              };
              if(transcriptSegments && transcriptSegments.length > 0) {
                 transcriptSegments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
              } else {
                 srtResult = `1\n00:00:01,000 --> 00:00:10,000\n${transcriptText}\n\n`;
              }
              setSrtText(srtResult); showToast("SRT ဖန်တီးပြီးပါပြီ။"); setIsProcessing(false);
            }, 400);
          };

          // --- Run Translation System ---
          const runTranslation = async (type) => {
            if (!userGeminiKey) { showToast("Gemini Key မရှိပါ! Key အရင်ထည့်ပါ။"); return; }
            const sourceContent = type === 'srt' ? srtText : transcriptText;
            if (!sourceContent) { showToast("ဘာသာပြန်ရန် စာသားမရှိပါ။"); return; }

            setIsProcessing(true);
            const prompt = type === 'srt' 
              ? `Translate this SRT file into ${targetLang}. Preserve all numbers and timestamps exactly. Only translate the dialogue text. SRT:\n\n${sourceContent}`
              : `Translate the following text into ${targetLang}:\n\n${sourceContent}`;
            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
              });
              if (!res.ok) throw new Error("API Error");
              const data = await res.json();
              const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
              type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
              showToast(`အောင်မြင်စွာ ပြန်ဆိုပြီးပါပြီ။`);
            } catch (e) { showToast("Gemini Key မှားယွင်းနေနိုင်ပါသည်။"); }
            setIsProcessing(false);
          };

          // --- Long Text Automatic Voice Chunk Splitting Engine ---
          const chunkTextForReplit = (text) => {
            const maxLen = 800; const chunks = []; const lines = text.split('\n');
            for (let line of lines) {
               if (line.trim().length === 0) continue;
               if (line.length <= maxLen) { chunks.push(line.trim()); } 
               else {
                  const sentences = line.split('။'); let current = "";
                  for (let sentence of sentences) {
                     if (current.length + sentence.length > maxLen) {
                        if(current.trim()) chunks.push(current.trim() + "။"); current = sentence;
                     } else { current += sentence + "။"; }
                  }
                  if (current.trim() && current.trim() !== "။") chunks.push(current.trim());
               }
            }
            return chunks.map(c => c.replace(/။+$/, '။')).filter(c => c.length > 0);
          };

          const generateTtsAudioChunks = () => {
            if (userRole !== 'premium') { showToast("Premium ဖြင့်သာ သုံးနိုင်ပါသည်။"); return; }
            if (!ttsInput.trim()) { showToast("စာသားရိုက်ထည့်ပါ!"); return; }

            const chunks = chunkTextForReplit(ttsInput.trim());
            const baseUrl = customTtsApi.trim() || 'https://Myanmar-Voice-Generator.pubgm47888.replit.dev/tts';
            const separator = baseUrl.includes('?') ? '&' : '?';
            
            const newChunks = chunks.map((text, idx) => ({
                id: idx, text: text,
                url: `${baseUrl}${separator}text=${encodeURIComponent(text)}&voice=${selectedVoice}&speed=${ttsSpeed}&pitch=${ttsPitch}`
            }));
            setTtsChunks(newChunks);
            showToast(`အသံဖိုင် ${newChunks.length} ပိုင်း ခွဲထုတ်ရန် ပြင်ဆင်ပြီးပါပြီ။`);
          };

          const handleDownloadAudio = async (url, filename) => {
            showToast("ဒေါင်းလုဒ် ဆွဲနေပါသည်...");
            try {
              const res = await fetch(url);
              if (!res.ok) throw new Error("Network error");
              const blob = await res.blob();

                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </div>
                  )}

                  {/* 5. CONFIG CONFIGURATION */}
                  {activeTab === 'settings' && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-6">
                        <div className="w-12 h-12 bg-slate-800 text-slate-300 rounded-2xl flex items-center justify-center border border-slate-700"><i data-lucide="settings" className="w-6 h-6"></i></div>
                        <div><h2 className="text-lg font-bold text-white">Configuration</h2><p className="text-xs text-slate-400">External Base Endpoint Settings</p></div>
                      </div>
                      
                      <div className="bg-slate-900 p-5 rounded-2xl border border-slate-800">
                        <label className="text-sm font-bold text-slate-300 block mb-3">Replit သို့မဟုတ် Custom TTS API Base</label>
                        <input type="text" value={customTtsApi} onChange={(e) => { setCustomTtsApi(e.target.value); safeSetLocal('custom_tts_api', e.target.value); }} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-300 focus:outline-none focus:border-pink-500 font-mono text-[10px]" />
                        <p className="text-[10px] text-slate-500 mt-2">Default Base: https://Myanmar-Voice-Generator.pubgm47888.replit.dev/tts</p>
                      </div>
                    </div>
                  )}

                  {/* 6. ADMIN SYSTEM DASHBOARD */}
                  {activeTab === 'admin' && isAdminAuthenticated && (
                    <div className="space-y-4">
                      <div className="flex items-center gap-3 mb-6">
                        <div className="w-12 h-12 bg-indigo-500/20 text-indigo-400 rounded-2xl flex items-center justify-center border border-indigo-500/30"><i data-lucide="shield-check" className="w-6 h-6"></i></div>
                        <div><h2 className="text-lg font-bold text-white">Admin Console</h2><p className="text-xs text-slate-400">Manage Real-time Requests</p></div>
                      </div>
                      
                      <div className="space-y-3">
                        {paymentRequests.length === 0 ? <p className="text-slate-500 text-center py-10 font-medium bg-slate-900 rounded-2xl border border-slate-800">No requests pending in Firebase.</p> : paymentRequests.map(req => (
                          <div key={req.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center shadow-sm">
                            <div>
                              <p className="text-indigo-400 font-mono text-sm font-bold tracking-wider">{req.transactionId}</p>
                              <p className="text-[10px] text-slate-500 mt-1 uppercase">UID: {req.userId?.substring(0,8)}</p>
                            </div>
                            {req.status === 'Pending' ? (
                              <div className="flex gap-2">
                                <button onClick={() => handleApproveRequest(req)} className="bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 px-4 py-2 rounded-xl text-xs font-bold transition-colors">Approve</button>
                                <button onClick={() => handleRejectRequest(req.id)} className="bg-red-500/20 text-red-400 hover:bg-red-500/30 px-4 py-2 rounded-xl text-xs font-bold transition-colors">Reject</button>
                              </div>
                            ) : <span className="font-bold text-[10px] uppercase px-3 py-1.5 bg-slate-950 rounded-lg text-slate-400">{req.status}</span>}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                </div>
              </div>

              {/* --- Modals Control Windows --- */}
              {/* Share Feature Modal */}
              {showShareModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-sm rounded-3xl p-8 shadow-2xl relative text-center">
                    <button onClick={() => setShowShareModal(false)} className="absolute top-5 right-5 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="x" className="w-5 h-5"></i></button>
                    <div className="w-16 h-16 bg-indigo-500/20 text-indigo-400 rounded-full flex items-center justify-center mx-auto mb-4 border border-indigo-500/30"><i data-lucide="share-2" className="w-8 h-8"></i></div>
                    <h3 className="text-lg font-bold text-white mb-2">Share Workspace</h3>
                    <p className="text-xs text-slate-400 mb-6">Send this link to share your extracted text and translations.</p>
                    <div className="bg-slate-950 border border-slate-800 p-4 rounded-xl mb-6 font-mono text-[11px] text-slate-300 break-all select-all">
                       {generatedShareUrl}
                    </div>
                    <button onClick={() => copyToClipboard(generatedShareUrl)} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-3.5 rounded-xl shadow-lg flex items-center justify-center gap-2">
                       <i data-lucide="copy" className="w-5 h-5"></i> Copy Link
                    </button>
                  </div>
                </div>
              )}

              {/* Secure Upgrade Account Modal (QR Core Engine) */}
              {showPaymentModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-sm rounded-3xl p-6 shadow-2xl relative">
                    <button onClick={() => setShowPaymentModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="x" className="w-5 h-5"></i></button>
                    
                    <div className="text-center mb-6 pt-2">
                      <h3 className="text-xl font-bold text-amber-400 mb-2">Go Premium</h3>
                      <div className="bg-slate-950 inline-block px-5 py-2.5 rounded-2xl border border-slate-800">
                        <span className="text-white text-lg font-bold tracking-wide">၁ လ - ၁၀,၀၀၀ ကျပ်</span>
                      </div>
                    </div>
                    
                    <div className="flex gap-4 mb-6">
                       <div className="flex-1 bg-white p-2 rounded-2xl text-center shadow-lg">
                          <img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" alt="KBZ Pay" className="w-full h-auto rounded-lg object-contain" />
                          <p className="text-black font-extrabold text-[10px] mt-2">KBZ Pay</p>
                       </div>
                       <div className="flex-1 bg-white p-2 rounded-2xl text-center shadow-lg">
                          <img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" alt="Wave Pay" className="w-full h-auto rounded-lg object-contain" />
                          <p className="text-black font-extrabold text-[10px] mt-2">Wave Pay</p>
                       </div>
                    </div>

                    <form onSubmit={handlePaymentSubmit} className="space-y-5">
                      <div>
                        <label className="text-xs text-slate-400 font-bold mb-2 block text-center">Transaction ID (နောက်ဆုံး ၆ လုံး/ ၈ လုံး)</label>
                        <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:outline-none focus:border-amber-500 font-mono tracking-[0.2em] text-center text-lg" placeholder="123456" />
                      </div>
                      
                      <a href="https://t.me/thetphyo_tun" target="_blank" rel="noreferrer" className="w-full bg-[#2AABEE]/10 border border-[#2AABEE]/20 text-[#2AABEE] py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 text-sm">
                         <i data-lucide="send" className="w-5 h-5"></i> ပြေစာအား Telegram သို့ပို့ရန်
                      </a>

                      <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-400 text-slate-950 font-bold py-4 rounded-xl shadow-lg text-sm transition-transform active:scale-95">အတည်ပြုချက် တင်ပြမည်</button>
                    </form>
                  </div>
                </div>
              )}

              {/* Secure Admin Gate Authenticator */}
              {showAdminLoginModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-xs rounded-3xl p-8 shadow-2xl relative text-center">
                    <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white bg-slate-900 w-8 h-8 rounded-full flex items-center justify-center"><i data-lucide="x" className="w-5 h-5"></i></button>
                    <div className="w-16 h-16 bg-slate-900 text-slate-300 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-800"><i data-lucide="lock" className="w-8 h-8"></i></div>
                    <h3 className="text-lg font-bold text-white mb-6">Admin Login</h3>
                    <form onSubmit={handleAdminLogin} className="space-y-5">
                      <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-4 text-white focus:outline-none text-center tracking-[0.3em] text-xl font-mono" placeholder="••••••" />
                      <button type="submit" className="w-full bg-slate-100 text-slate-900 hover:bg-white font-bold py-4 rounded-xl shadow-lg text-sm transition-transform active:scale-95">ဝင်ရောက်မည်</button>
                    </form>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
