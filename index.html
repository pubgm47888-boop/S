<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepLearn - AI Workspace Pro (Complete Version)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#020617] text-slate-100 min-h-screen selection:bg-indigo-500/30">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Safe Browser Storage System ---
        const safeGetLocal = (key, defaultVal) => {
          try { return window.localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; }
        };
        const safeSetLocal = (key, val) => {
          try { window.localStorage.setItem(key, val); } catch(e) {}
        };

        function App() {
          // --- Obfuscated Free Groq Keys (Looping System) ---
          const reversedGroqKeys = [
            "hHiaJbZls8ppgDGU1h9EyjaYY3ZbydGWry4mr7GCKLHpAfagUaM_ksg",
            "qIbKFVpz4ChHJDvKvKFi6hbzefY3YbdGWv2dJxk0b0DKDOLNLuHxE_ksg",
            "eQINb2e5hf3cqz2vO82aYsY3YbdGWVMrYKfQGO2fafVFWWzV_ksg",
            "IBG883db6ivzjm4IbDdWrd3ZDF3YbdGWIWMAA9jh1AqNhpfEAWYI_ksg",
            "n6f7QGnP7sNZc2AbsqhdUXvCkWF3YbdGWFTe8cv9GsDPzOnjiarjY_ksg",
            "qTs3ndmSDrA7Ar9tFXUY10YF3YbdGWZNuSBt9Vzaaa0l0tXHa_ksg",
            "oDLaS5W90bi0sCqeBlBttWpQEF3YbdGWRQIpXxQrAoWvE6jiTePZ_ksg",
            "TcdP0GFgfczs5PZeiQeCKmvgzRF3YbdGWv6wHpF0D3Px4w7tfWq2J_ksg",
            "bbyFfemiOodzFjTIDbNQw7a66uFY3YbdGWxcp1YMfPPr8lzakTjl_ksg",
            "PPWcupcusx4W4l166SV3050hhyF3YbdGWc9xGWpcwbVZQNBX50GId_ksg"
          ];
          const groqKeys = reversedGroqKeys.map(key => key.split('').reverse().join(''));
          const [activeKeyIndex, setActiveKeyIndex] = useState(0);

          // --- Core States ---
          const [userRole, setUserRole] = useState(() => safeGetLocal('user_role', 'user')); 
          const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => safeGetLocal('is_admin_auth', 'false') === 'true');
          const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
          const [adminPasswordInput, setAdminPasswordInput] = useState('');
          const ADMIN_SECRET_KEY = "111"; 
          
          const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
          const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
          
          const [showPaymentModal, setShowPaymentModal] = useState(false);
          const [submittedTxId, setSubmittedTxId] = useState('');
          const [activeTab, setActiveTab] = useState('transcript');

          // Local Fake Sandbox DB
          const [paymentRequests, setPaymentRequests] = useState(() => {
             try { return JSON.parse(safeGetLocal('payment_requests', '[]')); } catch(e) { return []; }
          });

          // Data States
          const [selectedFile, setSelectedFile] = useState(null);
          const [isProcessing, setIsProcessing] = useState(false);
          const [logs, setLogs] = useState([]);
          const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
          const [transcriptSegments, setTranscriptSegments] = useState(() => {
            try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; }
          });
          const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
          const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
          const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

          // Translation Languages (All 11 Target Languages)
          const [targetLang, setTargetLang] = useState('Myanmar');
          const languagesList = [
            { id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' },
            { id: 'Japanese', name: '🇯🇵 ဂျပန်' }, { id: 'Korean', name: '🇰🇷 ကိုရီးယား' },
            { id: 'Thai', name: '🇹🇭 ထိုင်း' }, { id: 'Chinese', name: '🇨🇳 တရုတ်' },
            { id: 'Russian', name: '🇷🇺 ရုရှား' }, { id: 'French', name: '🇫🇷 ပြင်သစ်' },
            { id: 'Spanish', name: '🇪🇸 စပိန်' }, { id: 'German', name: '🇩🇪 ဂျာမန်' },
            { id: 'Hindi', name: '🇮🇳 ဟိန္ဒီ' }
          ];

          // TTS Options
          const [customTtsApi, setCustomTtsApi] = useState(() => safeGetLocal('custom_tts_api', 'https://Myanmar-Voice-Generator.pubgm47888.replit.dev/tts'));
          const [ttsInput, setTtsInput] = useState('');
          const [selectedVoice, setSelectedVoice] = useState('my-MM-NilarNeural');
          const [ttsSpeed, setTtsSpeed] = useState(1.0);
          const [ttsPitch, setTtsPitch] = useState(1.0);
          const [ttsChunks, setTtsChunks] = useState([]); 

          const [showShareModal, setShowShareModal] = useState(false);
          const [generatedShareUrl, setGeneratedShareUrl] = useState('');
          const [toast, setToast] = useState({ show: false, message: '' });

          const showToast = (message) => {
            setToast({ show: true, message });
            setTimeout(() => setToast({ show: false, message: '' }), 4000);
          };

          // Auto Sync to Browser Storage
          useEffect(() => {
            safeSetLocal('user_role', userRole);
            safeSetLocal('is_admin_auth', String(isAdminAuthenticated));
            safeSetLocal('payment_requests', JSON.stringify(paymentRequests));
            safeSetLocal('stored_transcript', transcriptText);
            safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
            safeSetLocal('stored_srt', srtText);
            safeSetLocal('stored_translation', translatedText);
            safeSetLocal('stored_translated_srt', translatedSrtText);
          }, [userRole, isAdminAuthenticated, paymentRequests, transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

          // Refresh Lucide Icons
          useEffect(() => {
            if(window.lucide) { window.lucide.createIcons(); }
          }, [activeTab, ttsChunks, showPaymentModal, showAdminLoginModal, showShareModal, userRole, isAdminAuthenticated]);

          // --- Audio Extractor Core Logic (ဗီဒီယိုကနေ အသံသီးသန့်လှိုင်းထုတ်ယူခြင်း) ---
          const extractAudioFromVideo = async (videoFile) => {
            return new Promise((resolve, reject) => {
              const reader = new FileReader();
              reader.onload = async (e) => {
                try {
                  setLogs(["ဗီဒီယိုမှ အသံလှိုင်းများကို သီးသန့်ခွဲထုတ်နေပါသည်... ⏳"]);
                  const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                  const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
                  const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
                  const src = offlineCtx.createBufferSource();
                  src.buffer = decodedBuffer;
                  src.connect(offlineCtx.destination);
                  src.start();
                  const renderedBuffer = await offlineCtx.startRendering();
                  
                  const buffer = renderedBuffer.getChannelData(0);
                  const sampleRate = renderedBuffer.sampleRate;
                  const length = buffer.length * 2 + 44;
                  const bufferArray = new ArrayBuffer(length);
                  const view = new DataView(bufferArray);
                  
                  const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
                  writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
                  
                  let offset = 44;
                  for (let i = 0; i < buffer.length; i++, offset += 2) {
                    const s = Math.max(-1, Math.min(1, buffer[i]));
                    view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
                  }
                  const wavBlob = new Blob([view], { type: 'audio/wav' });
                  setLogs([`အသံဖိုင် သီးသန့်ထုတ်ယူမှု အောင်မြင်ပါသည်။ 🚀`]);
                  resolve(new File([wavBlob], "audio.wav", { type: "audio/wav" }));
                } catch (err) { reject(err); }
              };
              reader.onerror = () => reject(new Error("File error"));
              reader.readAsArrayBuffer(videoFile);
            });
          };

          // --- Run Transcription (With Back up Key-Loop System) ---
          const runTranscription = async () => {
            if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!"); return; }
            setIsProcessing(true);
            setLogs(["AI စတင်ပြင်ဆင်နေပါပြီ..."]);

            let fileToSend = selectedFile;
            if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov)$/i)) {
              try { fileToSend = await extractAudioFromVideo(selectedFile); } 
              catch (err) { setLogs(["⚠️ ဗီဒီယိုပြောင်းလဲမှု အမှားအယွင်းရှိသည်။"]); }
            }

            let success = false, resData = null;
            
            // ၁။ User ကိုယ်ပိုင် Key သုံးရင် အရင်စမ်းမည်
            if (userGroqKey) {
              try {
                const formData = new FormData(); formData.append('file', fileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
                const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${userGroqKey}` }, body: formData });
                if (res.ok) { resData = await res.json(); success = true; }
              } catch (e) {}
            }

            // ၂။ မရပါက Built-in System Keys ဆယ်လုံးကို ပတ်စမ်းမည်
            if (!success) {
              let keyIndex = activeKeyIndex;
              for (let i = 0; i < 10; i++) {
                try {
                  setLogs([`System Key (${keyIndex + 1}) ကို အသုံးပြု၍ ကြိုးစားနေပါသည်... ⏳`]);
                  const formData = new FormData(); formData.append('file', fileToSend); formData.append('model', 'whisper-large-v3'); formData.append('response_format', 'verbose_json');
                  const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${groqKeys[keyIndex]}` }, body: formData });
                  if (res.ok) { resData = await res.json(); success = true; setActiveKeyIndex(keyIndex); break; }
                } catch (err) { keyIndex = (keyIndex + 1) % 10; }
              }
            }

            if (success && resData) {
              setTranscriptText(resData.text);
              if (resData.segments) {
                setTranscriptSegments(resData.segments);
                let srtResult = "";
                const formatTime = (secs) => {
                  const d = new Date(secs * 1000);
                  return `${String(d.getUTCHours()).padStart(2,'0')}:${String(d.getUTCMinutes()).padStart(2,'0')}:${String(d.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((secs%1)*1000)).padStart(3,'0')}`;
                };
                resData.segments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
                setSrtText(srtResult);
              }
              showToast("စာသားထုတ်ယူခြင်း ပြီးမြောက်ပါပြီ။");
              setLogs(["✅ အောင်မြင်စွာ စာသားထုတ်ယူပြီးပါပြီ။"]);
            } else {
              showToast("API Limit ကျော်လွန်နေပါသည်။");
              setLogs(["⚠️ အခမဲ့ Key အားလုံး Limit ပြည့်နေပါသည်။ ကိုယ်ပိုင် Key ထည့်သုံးပေးပါ။"]);
            }
            setIsProcessing(false);
          };

          // --- Run Translation (Gemini API) ---
          const runTranslation = async (type) => {
            if (!userGeminiKey) { showToast("Gemini Key မရှိပါ။ Key အရင်ထည့်ပါ။"); return; }
            const sourceContent = type === 'srt' ? srtText : transcriptText;
            if (!sourceContent) { showToast("ဘာသာပြန်ဆိုရန် စာသားမရှိသေးပါ။"); return; }

            setIsProcessing(true);
            const prompt = type === 'srt' 
              ? `Translate this SRT file into ${targetLang}. Keep all numbers and timestamps perfectly. Output only SRT:\n\n${sourceContent}`
              : `Translate this text into ${targetLang}:\n\n${sourceContent}`;

            try {
              const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
              });
              if (res.ok) {
                const data = await res.json();
                const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
                type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
                showToast("ဘာသာပြန်ဆိုခြင်း ပြီးမြောက်ပါပြီ။");
              } else { showToast("Gemini API Error!"); }
            } catch (e) { showToast("ချိတ်ဆက်မှု မအောင်မြင်ပါ။"); }
            setIsProcessing(false);
          };

          // --- Neural TTS Long Text Auto-Chunk Splitter ---
          const generateTtsAudioChunks = () => {
            if (userRole !== 'premium') { showToast("Premium အကောင့်များသာ သုံးနိုင်ပါသည်။"); return; }
            if (!ttsInput.trim()) { showToast("စာသားရိုက်ထည့်ပါ!"); return; }

            const maxLen = 800; const chunks = []; const lines = ttsInput.split('\n');
            for (let line of lines) {
               if (line.trim().length === 0) continue;
               if (line.length <= maxLen) { chunks.push(line.trim()); } 
               else {
                  const sentences = line.split('။'); let current = "";
                  for (let s of sentences) {
                     if (current.length + s.length > maxLen) {
                        if(current.trim()) chunks.push(current.trim() + "။"); current = s;
                     } else { current += s + "။"; }
                  }
                  if (current.trim() && current.trim() !== "။") chunks.push(current.trim());
               }
            }
            const cleanChunks = chunks.map(c => c.replace(/။+$/, '။')).filter(c => c.length > 0);
            const baseUrl = customTtsApi.trim() || 'https://Myanmar-Voice-Generator.pubgm47888.replit.dev/tts';
            
            const newChunks = cleanChunks.map((text, idx) => ({
                id: idx, text: text,
                url: `${baseUrl}?text=${encodeURIComponent(text)}&voice=${selectedVoice}&speed=${ttsSpeed}&pitch=${ttsPitch}`
            }));
            setTtsChunks(newChunks);
            showToast(`အသံဖိုင် ${newChunks.length} ပိုင်း ခွဲထုတ်ပြီးပါပြီ။`);
          };

          // --- Sandbox Premium Upgrade Requests Handle ---
          const handlePaymentSubmit = (e) => {
            e.preventDefault();
            if (!submittedTxId.trim()) return;
            const newRequest = { id: Math.random().toString(36).substring(2,9), transactionId: submittedTxId, status: "Pending" };
            setPaymentRequests([newRequest, ...paymentRequests]);
            setShowPaymentModal(false); setSubmittedTxId('');
            showToast("Admin ထံ တင်ပြပြီးပါပြီ။ Admin Board တွင် သွားရောက် Approve ပေးပါ။");
          };

          const handleApproveRequest = (id) => {
             setPaymentRequests(paymentRequests.map(r => r.id === id ? {...r, status: 'Approved'} : r));
             setUserRole('premium'); showToast("Premium Status activated!");
          };

          const handleAdminLogin = (e) => {
            e.preventDefault();
            if (adminPasswordInput === ADMIN_SECRET_KEY) {
              setIsAdminAuthenticated(true); setShowAdminLoginModal(false); setAdminPasswordInput(''); showToast("Admin Mode ဝင်ရောက်ပြီးပါပြီ။");
            } else { showToast("Password မှားယွင်းပါသည်။"); }
          };

          // --- Fake Share Link Generator ---
          const generateLocalShareLink = () => {
             const url = window.location.href.split('?')[0] + "?share=demo_active_workspace";
             setGeneratedShareUrl(url); setShowShareModal(true);
          };

          return (
            <div className="min-h-screen pb-20 flex flex-col items-center pt-8 px-4 font-sans selection:bg-indigo-500/40">
              
              {toast.show && (
                <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-xl bg-indigo-600 text-white font-semibold text-xs flex items-center gap-2">
                  <i data-lucide="info" className="w-4 h-4"></i> {toast.message}
                </div>
              )}

              <div className="w-full max-w-2xl">
                {/* Dashboard Navigation Bar */}
                <header className="flex justify-between items-center mb-6">
                  <div>
                    <h1 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 flex items-center gap-2">
                      <i data-lucide="sparkles" className="w-6 h-6 text-indigo-400 fill-indigo-400"></i> DeepLearn 
                    </h1>
                    <p className="text-xs text-slate-500 font-medium mt-1">AI Workspace Pro</p>
                  </div>
                  <div className="flex gap-2">
                    <button onClick={generateLocalShareLink} className="bg-[#0f172a] border border-slate-800 hover:bg-slate-800 text-slate-300 w-10 h-10 rounded-xl flex items-center justify-center">
                      <i data-lucide="share-2" className="w-4 h-4"></i>
                    </button>
                    {userRole !== 'premium' ? (
                      <button onClick={() => setShowPaymentModal(true)} className="bg-gradient-to-r from-amber-500 to-orange-400 text-slate-900 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1.5 shadow-lg shadow-amber-500/10">
                        <i data-lucide="crown" className="w-4 h-4 fill-slate-900"></i> Upgrade
                      </button>
                    ) : (
                      <span className="bg-[#0f172a] border border-slate-800 text-emerald-400 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1.5">
                        <i data-lucide="check-circle-2" className="w-4 h-4"></i> Premium
                      </span>
                    )}
                    <button onClick={() => setShowAdminLoginModal(true)} className="bg-[#0f172a] border border-slate-800 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center">
                      <i data-lucide="lock" className="w-4 h-4"></i>
                    </button>
                  </div>
                </header>

                {/* Sub-Navigation Tabs Menu */}
                <div className="flex overflow-x-auto gap-2 mb-6 pb-2" style={{scrollbarWidth: 'none'}}>
                    <button onClick={() => setActiveTab('transcript')} className={`px-5 py-3 rounded-2xl font-semibold text-xs whitespace-nowrap ${activeTab === 'transcript' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] border border-slate-800 text-slate-400'}`}>Extract Text</button>
                    <button onClick={() => setActiveTab('translation')} className={`px-5 py-3 rounded-2xl font-semibold text-xs whitespace-nowrap ${activeTab === 'translation' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] border border-slate-800 text-slate-400'}`}>Translate</button>
                    <button onClick={() => setActiveTab('tts')} className={`px-5 py-3 rounded-2xl font-semibold text-xs whitespace-nowrap ${activeTab === 'tts' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] border border-slate-800 text-slate-400'}`}>အသံထွက် (TTS)</button>
                    <button onClick={() => setActiveTab('settings')} className={`px-5 py-3 rounded-2xl font-semibold text-xs whitespace-nowrap ${activeTab === 'settings' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] border border-slate-800 text-slate-400'}`}>Settings</button>
                    {isAdminAuthenticated && (
                      <button onClick={() => setActiveTab('admin')} className={`px-5 py-3 rounded-2xl font-semibold text-xs whitespace-nowrap ${activeTab === 'admin' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-[#0f172a] border border-slate-800 text-slate-400'}`}>Admin Board ({paymentRequests.filter(r=>r.status==='Pending').length})</button>
                    )}
                </div>

                {/* Main Workspace Frame */}
                <div className="bg-[#0f172a] border border-slate-800 rounded-3xl p-6 sm:p-8 shadow-xl">
                  
                  {/* TAB 1: MEDIA TRANSCRIPTION & SRT */}
                  {activeTab === 'transcript' && (
                    <div className="space-y-6">
                      <div className="text-center">
                        <h2 className="text-lg font-bold text-white mb-2">Media Transcriber Pro</h2>
                        <div className="mb-4 text-left bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                          <label className="text-xs font-bold text-slate-400 block mb-2">ကိုယ်ပိုင် Groq API Key ထည့်ရန် (စနစ်ထဲတွင် Key အလွတ်အပိုပါပြီးသားဖြစ်သည်)</label>
                          <input type="password" value={userGroqKey} onChange={(e) => setUserGroqKey(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white font-mono text-xs focus:border-indigo-500 outline-none" placeholder="gsk_..." />
                        </div>

                        <div className="relative mb-4">
                          <input type="file" accept="audio/*,video/*" onChange={(e) => setSelectedFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                          <div className="border-2 border-dashed border-slate-700 bg-slate-900 rounded-2xl p-6 text-center">
                            <i data-lucide="cloud-upload" className="w-8 h-8 text-slate-500 mx-auto mb-2"></i>
                            <p className="text-xs font-semibold text-slate-300">{selectedFile ? selectedFile.name : "ဗီဒီယို သို့မဟုတ် အသံဖိုင် တင်သွင်းရန် နှိပ်ပါ"}</p>
                          </div>
                        </div>
                        
                        <button onClick={runTranscription} disabled={isProcessing} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-3.5 rounded-2xl font-bold text-sm">
                          {isProcessing ? "AI လုပ်ဆောင်နေပါသည်..." : "စတင်ထုတ်ယူမည်"}
                        </button>
                        {logs.length > 0 && <p className="text-xs text-indigo-400 font-semibold mt-3">{logs[logs.length-1]}</p>}
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4 pt-4 border-t border-slate-800">
                        <div>
                          <h3 className="font-bold text-slate-300 text-xs mb-2">စာသား ရလဒ်</h3>
                          <textarea rows="6" value={transcriptText} onChange={(e) => setTranscriptText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-slate-300 text-xs leading-relaxed" placeholder="စာသားများ..." />
                        </div>
                        <div>
                          <h3 className="font-bold text-slate-300 text-xs mb-2">SRT Subtitle ရလဒ်</h3>
                          <textarea rows="6" value={srtText} onChange={(e) => setSrtText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-slate-300 font-mono text-xs leading-normal" placeholder="SRT Data..." />
                        </div>
                      </div>
                    </div>
                  )}

                  {/* TAB 2: AI TRANSLATOR WORKSPACE (11 Languages) */}
                  {activeTab === 'translation' && (
                    <div className="space-y-6">
                      <div className="flex justify-between items-center border-b border-slate-800 pb-4">
                        <h2 className="text-base font-bold text-white">Gemini AI Translator</h2>
                        <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} className="bg-slate-900 border border-slate-700 py-2 px-3 rounded-xl text-white font-bold text-xs">
                          {languagesList.map(lang => <option key={lang.id} value={lang.id}>{lang.name}</option>)}
                        </select>
                      </div>

                      <div className="bg-slate-900/60 p-4 rounded-xl border border-slate-800">
                        <label className="text-xs font-bold text-slate-400 block mb-2">Gemini API Key ထည့်သွင်းရန်</label>
                        <input type="password" value={userGeminiKey} onChange={(e) => setUserGeminiKey(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-white font-mono text-xs outline-none focus:border-blue-500" placeholder="AIzaSy..." />
                      </div>

                      <div className="space-y-4">
                        <div>
                          <button onClick={() => runTranslation('transcript')} className="w-full bg-indigo-600/20 text-indigo-300 py-2.5 rounded-xl font-bold text-xs mb-2">ရိုးရိုးစာသားကို ဘာသာပြန်မည်</button>
                          <textarea rows="3" value={translatedText} onChange={(e) => setTranslatedText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs text-slate-300" placeholder="Translated Text Result..." />
                        </div>
                        <div>
                          <button onClick={() => runTranslation('srt')} className="w-full bg-purple-600/20 text-purple-300 py-2.5 rounded-xl font-bold text-xs mb-2">SRT Subtitle ကို ဘာသာပြန်မည်</button>
                          <textarea rows="3" value={translatedSrtText} onChange={(e) => setTranslatedSrtText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300" placeholder="Translated SRT Result..." />
                        </div>
                      </div>
                    </div>
                  )}

                  {/* TAB 3: NEURAL VOICE ENGINE (TTS) */}
                  {activeTab === 'tts' && (
                    <div className="space-y-6 relative">
                      {userRole !== 'premium' && (
                        <div className="absolute inset-0 z-10 bg-slate-950/95 rounded-2xl flex flex-col items-center justify-center p-6 text-center">
                          <i data-lucide="lock" className="w-10 h-10 text-amber-500 mb-2"></i>
                          <h2 className="text-base font-bold text-white mb-1">Premium Feature Locked</h2>
                          <p className="text-slate-400 mb-4 text-xs max-w-xs">မနီလာနှင့် ကိုသီဟ Neural Voices များဖြင့် စာပိုဒ်ရှည်ထုတ်ယူရန် အကောင့်မြှင့်တင်ပါ။</p>
                          <button onClick={() => setShowPaymentModal(true)} className="bg-gradient-to-r from-amber-500 to-orange-400 text-slate-900 px-6 py-2.5 rounded-xl font-bold text-xs">Upgrade Account</button>
                        </div>
                      )}

                      <div className="space-y-4">
                        <h2 className="text-base font-bold text-white">Myanmar Neural TTS Engine</h2>
                        <div className="grid grid-cols-2 gap-2">
                          <button onClick={() => setSelectedVoice('my-MM-NilarNeural')} className={`py-2.5 rounded-xl font-bold text-xs border ${selectedVoice === 'my-MM-NilarNeural' ? 'bg-pink-600 border-pink-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>👩🏻 မနီလာ (Nilar)</button>
                          <button onClick={() => setSelectedVoice('my-MM-ThihaNeural')} className={`py-2.5 rounded-xl font-bold text-xs border ${selectedVoice === 'my-MM-ThihaNeural' ? 'bg-pink-600 border-pink-400 text-white' : 'bg-slate-950 border-slate-800 text-slate-400'}`}>👨🏻 ကိုသီဟ (Thiha)</button>
                        </div>

                        <div className="grid grid-cols-2 gap-2">
                           <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 text-xs">
                              <span className="text-slate-400">အမြန်နှုန်း: {ttsSpeed}x</span>
                              <input type="range" min="0.5" max="2.0" step="0.1" value={ttsSpeed} onChange={(e)=>setTtsSpeed(parseFloat(e.target.value))} className="w-full mt-2 accent-pink-500" />
                           </div>
                           <div className="bg-slate-900 p-3 rounded-xl border border-slate-800 text-xs">
                              <span className="text-slate-400">အသံတုန်ခါမှု: {ttsPitch}</span>
                              <input type="range" min="0.5" max="2.0" step="0.1" value={ttsPitch} onChange={(e)=>setTtsPitch(parseFloat(e.target.value))} className="w-full mt-2 accent-pink-500" />
                           </div>
                        </div>

                        <textarea rows="4" value={ttsInput} onChange={(e) => setTtsInput(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white text-xs leading-relaxed" placeholder="မြန်မာစာ ရိုက်ထည့်ပါ (၈၀၀ လုံးထက်ကျော်ပါက အလိုအလျောက် အပိုင်းခွဲထုတ်ပေးမည်)..." />
                        <button onClick={generateTtsAudioChunks} className="w-full bg-pink-600 text-white py-3 rounded-xl font-bold text-xs">အသံဖိုင် စတင်ထုတ်လုပ်မည်</button>

                        {ttsChunks.map((chunk) => (
                          <div key={chunk.id} className="bg-slate-950 p-3 rounded-xl border border-slate-800 mt-2">
                            <p className="text-[11px] text-slate-400 mb-2 leading-relaxed">{chunk.text}</p>
                            <audio controls className="w-full h-8" src={chunk.url} />
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* TAB 4: CONFIG SETTINGS */}
                  {activeTab === 'settings' && (
                    <div className="space-y-4">
                      <h2 className="text-base font-bold text-white mb-2">Global Setup Options</h2>
                      <div className="bg-slate-900 p-4 rounded-xl border border-slate-800">
                        <label className="text-xs font-bold text-slate-400 block mb-2">Replit Custom TTS Endpoint Server URL</label>
                        <input type="text" value={customTtsApi} onChange={(e) => setCustomTtsApi(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2.5 text-slate-300 font-mono text-[10px]" />
                      </div>
                      <button onClick={() => { setUserRole('user'); setPaymentRequests([]); showToast("ဒေတာများ အားလုံး Reset ပြီးပါပြီ။"); }} className="bg-red-500/20 text-red-400 border border-red-500/30 px-4 py-2.5 rounded-xl text-xs font-bold w-full">Clear Local App Data Cache</button>
                    </div>
                  )}

                  {/* TAB 5: ADMIN SANDBOX BOARD */}
                  {activeTab === 'admin' && isAdminAuthenticated && (
                    <div className="space-y-4">
                      <h2 className="text-base font-bold text-white mb-2">Admin Panel Sandbox Board</h2>
                      <div className="space-y-2">
                        {paymentRequests.length === 0 ? <p className="text-slate-500 text-center py-6 text-xs">စစ်ဆေးရန် တင်ပြချက်များ မရှိသေးပါ။</p> : paymentRequests.map(req => (
                          <div key={req.id} className="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                            <div>
                              <p className="text-indigo-400 font-mono text-xs font-bold">TxID: {req.transactionId}</p>
                              <p className="text-[10px] text-slate-500 uppercase mt-0.5">Status: {req.status}</p>
                            </div>
                            {req.status === 'Pending' && (
                              <button onClick={() => handleApproveRequest(req.id)} className="bg-emerald-500/20 text-emerald-400 hover:bg-emerald-500/30 px-3 py-1.5 rounded-xl text-xs font-bold">Approve</button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                </div>
              </div>

              {/* MODAL 1: PRESET REAL QR PAYMENT SYSTEM */}
              {showPaymentModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-sm rounded-3xl p-6 text-center relative">
                    <button onClick={() => setShowPaymentModal(false)} className="absolute top-4 right-4 text-slate-500 hover:text-white">✕</button>
                    <h3 className="text-lg font-bold text-amber-400 mb-1">Upgrade Premium Account</h3>
                    <p className="text-white text-xs font-bold mb-4 bg-slate-950 py-1.5 rounded-xl border border-slate-800 max-w-[150px] mx-auto">၁ လ - ၁၀,၀၀၀ ကျပ်</p>
                    
                    {/* Realistic Payment Image Grid */}
                    <div className="grid grid-cols-2 gap-3 mb-4">
                       <div className="bg-white p-2 rounded-xl text-center shadow">
                          <img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" alt="KBZ Pay" className="w-full h-28 object-contain rounded" />
                          <p className="text-slate-900 font-extrabold text-[9px] mt-1">KBZ Pay QR</p>
                       </div>
                       <div className="bg-white p-2 rounded-xl text-center shadow">
                          <img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" alt="Wave Pay" className="w-full h-28 object-contain rounded" />
                          <p className="text-slate-900 font-extrabold text-[9px] mt-1">Wave Pay QR</p>
                       </div>
                    </div>

                    <form onSubmit={handlePaymentSubmit} className="space-y-3">
                      <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-center font-mono text-sm outline-none focus:border-amber-500" placeholder="Transaction ID (နောက်ဆုံး ၆ လုံး)" />
                      <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-400 text-slate-950 font-bold py-3 rounded-xl text-xs shadow-lg">အတည်ပြုချက် တင်ပြမည်</button>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL 2: ADMIN PASSWORD CHECKGATE */}
              {showAdminLoginModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-xs rounded-3xl p-6 text-center relative">
                    <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
                    <h3 className="text-base font-bold text-white mb-4">Admin Authentication Gate</h3>
                    <form onSubmit={handleAdminLogin} className="space-y-4">
                      <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-white text-center font-mono text-lg outline-none focus:border-indigo-500" placeholder="••••••" />
                      <button type="submit" className="w-full bg-slate-100 text-slate-900 font-bold py-3 rounded-xl text-xs">ဝင်ရောက်မည်</button>
                      <p className="text-[10px] text-slate-500">Default Secret Password Key: 111</p>
                    </form>
                  </div>
                </div>
              )}

              {/* MODAL 3: WORKSPACE SHARE WINDOW */}
              {showShareModal && (
                <div className="fixed inset-0 bg-slate-950/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                  <div className="bg-[#0f172a] border border-slate-800 w-full max-w-xs rounded-3xl p-6 text-center relative">
                    <button onClick={() => setShowShareModal(false)} className="absolute top-4 right-4 text-slate-400 hover:text-white">✕</button>
                    <h3 className="text-sm font-bold text-white mb-2">Workspace Share Link</h3>
                    <div className="bg-slate-950 p-3 rounded-xl border border-slate-800 text-[10px] text-slate-400 select-all font-mono break-all mb-4">
                      {generatedShareUrl}
                    </div>
                    <button onClick={() => { navigator.clipboard.writeText(generatedShareUrl); showToast("Copied Link to Clipboard!"); setShowShareModal(false); }} className="bg-indigo-600 text-white font-bold w-full py-2.5 rounded-xl text-xs">Copy Link</button>
                  </div>
                </div>
              )}

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
