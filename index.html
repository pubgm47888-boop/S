  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Firebase Configurations ---

        { id: 'Korean', name: '🇰🇷 Korean (ကိုရီးယား)' },
        { id: 'Thai', name: '🇹🇭 Thai (ထိုင်း)' },

        { id: 'Russian', name: '🇷🇺 Russian (ရုရှား)' },
        { id: 'French', name: '🇫🇷 French (ပြင်သစ်)' },

        { id: 'German', name: '🇩🇪 German (ဂျာမန်)' },

      // Premium Neural TTS States
      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('Nilar');
      const [isSynthesizing, setIsSynthesizing] = useState(false);

      const [ttsErrorDetail, setTtsErrorMsg] = useState('');
      const audioRef = useRef(null);

      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const showToast = (message, type = 'info') => {

      // --- Firebase Auth Hook ---
      useEffect(() => {
        const initAuthAndConnect = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {

        };

        initAuthAndConnect();

        const unsubscribe = auth.onAuthStateChanged(async (user) => {
          if (user) {

            showToast("Cloud Database နှင့် အောင်မြင်စွာ ချိတ်ဆက်ပြီးပါပြီ။", "success");
            
            const userRef = db.doc(`artifacts/${safeAppId}/users/${user.uid}/profile/status`);

                userRef.set({ role: 'user', expiresAt: '' });

        return () => unsubscribe();
      }, []);

      // --- Sync Database Snapshots ---
      useEffect(() => {
        if (!firebaseUser) return;

        const publicCollection = db.collection(`artifacts/${safeAppId}/public/data/payments`);
        const unsubscribePayments = publicCollection.onSnapshot((snapshot) => {
          const list = [];
          snapshot.forEach((doc) => {
            list.push({ id: doc.id, ...doc.data() });

        }, (error) => {

        });

        return () => unsubscribePayments();
      }, [firebaseUser]);

      // --- Premium Validation Watcher ---
      useEffect(() => {
        const checkPremiumExpiry = async () => {
          if (userRole === 'premium' && premiumExpiresAt && firebaseUser) {
            const expiry = new Date(premiumExpiresAt);
            const now = new Date();
            if (now > expiry) {
              setUserRole('user');
              showToast("🚨 သင်၏ Premium ရက်ပေါင်း ၃၀ သက်တမ်း ကုန်ဆုံးသွားသဖြင့် အလိုအလျောက် သာမန်အဆင့်သို့ ပြန်လည်ရောက်ရှိသွားပါပြီ။", "warning");
              await db.doc(`artifacts/${safeAppId}/users/${firebaseUser.uid}/profile/status`).set({
                role: 'user',
                expiresAt: ''
              });
            }
          }
        };
        checkPremiumExpiry();
        const interval = setInterval(checkPremiumExpiry, 15000);
        return () => clearInterval(interval);
      }, [userRole, premiumExpiresAt, firebaseUser]);

      // LocalStorage Cache Synced
      useEffect(() => {
        localStorage.setItem('stored_transcript', transcriptText);
        localStorage.setItem('stored_srt', srtText);
        localStorage.setItem('stored_translation', translatedText);
        localStorage.setItem('stored_translated_srt', translatedSrtText);
      }, [transcriptText, srtText, translatedText, translatedSrtText]);

      // --- ⚙️ REAL-TIME BROWSER-BASED AUDIO EXTRACTION & DOWNSAMPLING ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(prev => [...prev, "⚡ ဗီဒီယိုဖိုင်အား ဖတ်ရှုနေပါသည်..."]);
              const arrayBuffer = e.target.result;
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              
              setLogs(prev => [...prev, "⚡ ဗီဒီယိုထဲမှ အသံလှိုင်းများကို စတင်ခွဲထုတ်နေပါသည် (Decoding Audio Track)..."]);
              const decodedBuffer = await audioCtx.decodeAudioData(arrayBuffer);
              
              setLogs(prev => [...prev, "⚡ အသံလှိုင်းများကို 16,000Hz Speech WAV အဖြစ်သို့ အရွယ်အစားချုံ့နေပါသည်..."]);
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              
              setLogs(prev => [...prev, `✅ အသံဖိုင်အား အောင်မြင်စွာချုံ့ပြီးပါပြီ။ (အရွယ်အစား: ${(wavBlob.size / (1024 * 1024)).toFixed(2)} MB)`]);
              resolve(new File([wavBlob], "compressed_audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeString = (offset, string) => {
          for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
        };
        writeString(0, 'RIFF');
        view.setUint32(4, length - 8, true);
        writeString(8, 'WAVE');
        writeString(12, 'fmt ');
        view.setUint32(16, 16, true);
        view.setUint16(20, 1, true);
        view.setUint16(22, 1, true);
        view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true);
        view.setUint16(32, 2, true);
        view.setUint16(34, 16, true);
        writeString(36, 'data');
        view.setUint32(40, length - 44, true);
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Transcribe Processing Hub ---
      const runTranscription = async () => {
        if (!selectedFile) {
          showToast("အဆင့် ၁ တွင် Audio သို့မဟုတ် Video ဖိုင် အရင်ထည့်သွင်းပေးပါ!", "error");
          return;
        }
        setIsProcessing(true);
        setLogs(["လုပ်ဆောင်ချက် စတင်နေပြီ..."]);

        let audioFileToSend = selectedFile;
        const isVideo = selectedFile.type.startsWith('video/') || selectedFile.name.endsWith('.mp4') || selectedFile.name.endsWith('.mkv') || selectedFile.name.endsWith('.mov');

        if (isVideo) {
          try {
            audioFileToSend = await processAndExtractAudio(selectedFile);
          } catch (err) {
            setLogs(prev => [...prev, "⚠️ ဗီဒီယိုမှ အသံဖိုင်ခွဲထုတ်ခြင်း မအောင်မြင်ပါ။"]);
          }
        }

        let keyIndex = activeKeyIndex;
        let success = false;
        let resultText = "";

        for (let i = 0; i < 10; i++) {
          const currentKey = groqKeys[keyIndex];
          setLogs(prev => [...prev, `Groq API Key #${keyIndex + 1} သို့ ပေးပို့နေပါသည်...`]);

          try {
            const formData = new FormData();
            formData.append('file', audioFileToSend);
            formData.append('model', 'whisper-large-v3');

            const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${currentKey}` },
              body: formData
            });

            if (response.status === 429) throw new Error("Rate Limit 429");
            if (!response.ok) throw new Error("API Error");

            const data = await response.json();
            resultText = data.text;
            success = true;
            setActiveKeyIndex(keyIndex);
            break;
          } catch (err) {
            const tempStatus = [...keyStatus];
            tempStatus[keyIndex] = 'Limit Reached 🔴';
            setKeyStatus(tempStatus);
            setLogs(prev => [...prev, `⚠️ Key #${keyIndex + 1} အလုပ်မလုပ်ပါ။ နောက်တစ်ခုသို့ လွှဲပြောင်းနေပါသည်...`]);
            keyIndex = (keyIndex + 1) % 10;
          }
        }

        if (success) {
          setTranscriptText(resultText);
          setLogs(prev => [...prev, "✅ စာသားပြောင်းလဲခြင်း အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
          showToast("စာသားပြောင်းလဲခြင်း အောင်မြင်ပါပြီ။", "success");
        } else {
          setTranscriptText("မင်္ဂလာပါရှင်။ API Keys အားလုံး Rate limit ဖြစ်နေပါသဖြင့် သရုပ်ပြစာသားကို ထုတ်ပေးထားပါသည်။");
          showToast("သရုပ်ပြအဆင့် စာသားထုတ်ပေးထားပါသည်။", "warning");
        }
        setIsProcessing(false);
      };

      // --- 🎬 SMART SRT SUBTITLE GENERATOR FOR BURMESE ---
      const generateSrt = () => {
        if (!transcriptText.trim()) {
          showToast("SRT ထုတ်ရန်အတွက် အရင်ဆုံး Transcript အပိုင်းတွင် စာသားပြောင်းလဲခြင်း အရင်လုပ်ဆောင်ပါ!", "error");
          return;
        }
        setIsProcessing(true);
        setLogs(["မြန်မာစာလုံးအလှလိုက် စာတန်းထိုး (SRT) ဖိုင် စတင်ဖန်တီးနေပါသည်..."]);

        setTimeout(() => {
          const tokens = transcriptText.trim().split(/\s+/);
          let chunks = [];
          let currentChunk = [];

          tokens.forEach(token => {
            currentChunk.push(token);
            if (currentChunk.length >= 12 || token.endsWith('။') || token.endsWith('့')) {
              chunks.push(currentChunk.join(' '));
              currentChunk = [];
            }
          });
          if (currentChunk.length > 0) {
            chunks.push(currentChunk.join(' '));
          }

          let srtResult = "";
          chunks.forEach((chunk, idx) => {
            const startSec = idx * 4;
            const endSec = (idx + 1) * 4;
            const formatTime = (sec) => {
              const hrs = String(Math.floor(sec / 3600)).padStart(2, '0');
              const mins = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
              const secs = String(sec % 60).padStart(2, '0');
              return `${hrs}:${mins}:${secs},000`;
            };
            srtResult += `${idx + 1}\n${formatTime(startSec)} --> ${formatTime(endSec)}\n${chunk.trim()}\n\n`;
          });

          setSrtText(srtResult);
          showToast("SRT Subtitles ထုတ်လုပ်မှု အောင်မြင်ပါပြီ။", "success");
          setIsProcessing(false);
        }, 800);
      };

      // --- 🌐 DUAL-MODE MULTI-LANGUAGE AI TRANSLATION ENGINE (GEMINI) ---
      const runTranslation = async (type) => {
        if (!userGeminiKey) {
          showToast("VIP အဆင့်အတွက် Gemini Key ကို ထည့်သွင်းပေးပါ!", "error");
          return;
        }

        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent) {
          showToast("ဘာသာပြန်ရန် မူရင်း အချက်အလက် မရှိသေးပါ။", "error");
          return;
        }

        setIsProcessing(true);
        setLogs([`Gemini API ဖြင့် ${targetLang} ဘာသာသို့ စတင်ပြန်ဆိုနေပါသည်...`]);

        const prompt = type === 'srt' 
          ? `You are an expert subtitle translator. Translate the following SRT subtitle file into ${targetLang}. You MUST preserve all block numbers and timestamps (e.g. 00:00:04,000 --> 00:00:08,000) exactly without changing any numbers or arrows. Do NOT modify any timecodes. Translate ONLY the subtitle texts underneath the timecodes. Here is the SRT data:\n\n${sourceContent}`
          : `Translate the following transcript text professionally, fluidly, and contextually into ${targetLang}:\n\n${sourceContent}`;

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: prompt }] }]
            })
          });
          const data = await response.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Finished.";
          
          if (type === 'srt') {
            setTranslatedSrtText(result);
          } else {
            setTranslatedText(result);
          }
          showToast(`${targetLang} သို့ အောင်မြင်စွာ ဘာသာပြန်ဆိုပြီးပါပြီ။`, "success");
        } catch (e) {
          showToast("ဘာသာပြန်ဆိုမှု မအောင်မြင်ပါ။ API Key ကိုပြန်စစ်ပါ။", "error");
        }
        setIsProcessing(false);
      };

      // --- 🔊 PREMIUM BURMESE NEURAL TTS PIPELINE ---
      const runNeuralTtsPlay = async () => {
        if (userRole !== 'premium') {
          showToast("❌ ဤ Feature သည် Premium အသုံးပြုသူများသာ သုံးခွင့်ရှိပါသည်။", "error");
          return;
        }
        if (!ttsInput.trim()) {
          showToast("အသံထုတ်လုပ်ရန် စာသားရိုက်ထည့်ပါ!", "error");
          return;
        }

        setIsSynthesizing(true);
        setTtsErrorMsg('');

                      </div>
                    </div>

                    <textarea rows="3" value={ttsInput} onChange={(e) => setTtsInput(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm focus:outline-none" placeholder="အသံထွက်ဆိုလိုသည့် မြန်မာစာသားကို ရိုက်ထည့်ပါ..." />
                    
                    <div className="flex flex-col sm:flex-row gap-4 items-center">
                      <button onClick={runNeuralTtsPlay} disabled={isSynthesizing} className="bg-indigo-600 hover:bg-indigo-700 py-3 px-6 rounded-xl text-xs font-bold transition-all shadow-lg">{isSynthesizing ? "အသံထုတ်လုပ်နေသည်..." : "🔊 အသံထုတ်လုပ်ပြီး နားထောင်မည်"}</button>
                      
                      {synthesizedAudioUrl && (
                        <div className="w-full sm:flex-1 bg-slate-950 p-2 rounded-xl border border-slate-800 flex items-center justify-between">
                          <audio src={synthesizedAudioUrl} controls className="h-8 max-w-[200px]" autoPlay />
                          <a href={synthesizedAudioUrl} download={`${selectedVoice}_speech.mp3`} className="bg-green-600 hover:bg-green-700 text-white text-xs font-bold py-1.5 px-3 rounded-lg transition-all shadow-lg">ဖိုင်ကိုဒေါင်းလုဒ်ဆွဲမည် 💾</a>
                        </div>
                      )}
                    </div>

                    {ttsErrorDetail && (
                      <div className="mt-4 p-4 bg-red-950/40 border border-red-500/50 rounded-xl space-y-2">
                        <p className="text-xs font-black text-red-400">⚠️ အသံထုတ်လုပ်မှု အမှားအယွင်း (Detailed Log):</p>
                        <p className="text-[11px] text-slate-300 font-medium leading-5">{ttsErrorDetail}</p>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>

          </main>

          {/* PAYMENT POPUP MODAL */}
          {showPaymentModal && (
            <div className="fixed inset-0 bg-slate-950/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="bg-slate-900 border border-slate-800 max-w-lg w-full rounded-2xl overflow-hidden shadow-2xl flex flex-col max-h-[90vh]">
                <div className="p-5 border-b border-slate-800 flex justify-between items-center">
                  <h3 className="font-bold text-white text-base">💎 Premium ဝယ်ယူရန် နှင့် သက်တမ်းတိုးရန်</h3>
                  <button onClick={() => setShowPaymentModal(false)} className="text-slate-400 hover:text-slate-200 text-lg">✕</button>
                </div>
                <div className="p-5 overflow-y-auto space-y-5">
                  <p className="text-xs text-slate-400">KBZPay သို့မဟုတ် WavePay QR Code ကို စကင်ဖတ်ပြီး ငွေလွှဲပါ။ ပြီးလျှင် အောက်တွင် ငွေလွှဲပြေစာပုံနှင့် Transaction ID တင်ပြပေးပါ။ Admin မှ စစ်ဆေးအတည်ပြုပေးပြီးမှသာ သင့်စနစ်ကို ဖွင့်ပေးမည် ဖြစ်ပါသည်။</p>
                  
                  <div className="grid grid-cols-2 gap-4">
                    <div className="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-center">
                      <p className="text-xs font-bold text-sky-400 mb-2">KBZ Pay QR Code</p>
                      <img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" alt="KBZPay QR Code" className="w-full max-h-48 object-contain rounded-lg hover:scale-105 transition-transform duration-200" />
                      <p className="text-[10px] text-slate-400 mt-2 font-semibold">U Thet Phyo Tun</p>
                    </div>
                    <div className="bg-slate-950 p-2.5 rounded-xl border border-slate-800 text-center">
                      <p className="text-xs font-bold text-yellow-500 mb-2">Wave Pay QR Code</p>
                      <img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" alt="WavePay QR Code" className="w-full max-h-48 object-contain rounded-lg hover:scale-105 transition-transform duration-200" />
                      <p className="text-[10px] text-slate-400 mt-2 font-semibold">U Thet Phyo Tun</p>
                    </div>
                  </div>

                  <form onSubmit={handlePaymentSubmit} className="space-y-4 pt-2">
                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-300">Transaction ID (နောက်ဆုံးဂဏန်း ၈ လုံး သို့မဟုတ် ၁၀ လုံး)</label>
                      <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} placeholder="ဥပမာ- 20260702881" className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2 text-sm text-slate-200 focus:outline-none focus:border-indigo-500" />
                    </div>
                    <div className="space-y-1">
                      <label className="text-xs font-semibold text-slate-300">ငွေလွှဲပြေစာ ပုံတင်ရန် (Screenshot)</label>
                      <input type="file" accept="image/*" className="w-full text-xs text-slate-400 file:mr-4 file:py-1.5 file:px-3 file:rounded-lg file:border-0 file:text-xs file:font-bold file:bg-slate-800 file:text-indigo-400 hover:file:bg-slate-700" />
                    </div>
                    <div className="pt-2 flex space-x-3">
                      <button type="button" onClick={() => setShowPaymentModal(false)} className="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-200 font-bold py-2.5 rounded-xl text-xs transition-colors">ဖျက်သိမ်းမည်</button>
                      <button type="submit" className="flex-1 bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 font-bold py-2.5 rounded-xl text-xs shadow-lg transition-all hover:scale-105">အတည်ပြုချက် တင်ပြမည် 🚀</button>
                    </div>
                  </form>
                </div>
                <div className="p-4 bg-slate-950 border-t border-slate-800 text-center">
                  <a href="https://t.me/thetphyo_tun" target="_blank" rel="noreferrer" className="text-xs text-sky-400 hover:underline font-bold">ပြဿနာတစ်စုံတစ်ရာရှိပါက Telegram Account (@thetphyo_tun) သို့ ဆက်သွယ်ပါ။</a>
                </div>
              </div>
            </div>
          )}

          {/* SECURE ADMIN LOGIN MODAL */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 bg-slate-950/95 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <form onSubmit={handleAdminLogin} className="bg-slate-900 border border-slate-800 max-w-sm w-full rounded-2xl p-6 space-y-4 shadow-2xl">
                <div className="flex justify-between items-center border-b border-slate-800 pb-2">
                  <h3 className="font-bold text-white text-sm">🔒 Admin Dashboard Verification</h3>
                  <button type="button" onClick={() => setShowAdminLoginModal(false)} className="text-slate-400">✕</button>
                </div>
                <div className="space-y-1.5">
                  <label className="text-xs text-slate-300">သီးသန့် လျှို့ဝှက်ကုဒ် (Secret Key) ကိုရိုက်ထည့်ပါ:</label>
                  <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} placeholder="Password ကိုရိုက်ထည့်ပါ..." className="w-full bg-slate-950 border border-slate-800 rounded-xl px-3 py-2.5 text-xs text-white focus:outline-none focus:border-indigo-500" />
                </div>
                <button type="submit" className="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2 rounded-xl text-xs font-bold transition-all hover:scale-105">အတည်ပြု ဝင်ရောက်မည် 🔑</button>
              </form>
            </div>
          )}

          {/* RECEIPT PREVIEW MODAL */}
          {selectedReceiptUrl && (
            <div className="fixed inset-0 bg-black/90 backdrop-blur-sm flex items-center justify-center p-4 z-50">
              <div className="relative max-w-md w-full">
                <button onClick={() => setSelectedReceiptUrl('')} className="absolute -top-10 right-0 text-white font-bold text-lg">ပိတ်မည် ✕</button>
                <img src={selectedReceiptUrl} alt="Receipt Preview" className="w-full h-auto rounded-lg max-h-[80vh] object-contain bg-slate-900 border border-slate-800" />
              </div>
            </div>
          )}

          <footer className="bg-slate-950 border-t border-slate-900 py-6 text-center text-xs text-slate-500 mt-auto">
            <p>© 2026 THET x DeepLearn AI Workspace. All rights reserved.</p>
            <p className="mt-1">Powered by Groq API Load Balancing & Gemini Translator</p>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
