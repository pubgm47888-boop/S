<!DOCTYPE html>
<html lang="my" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepLearn AI Workspace</title>
  
  <script>window.onerror = function(message) { console.error(message); return true; };</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-app-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-auth-compat.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/firebase/10.7.1/firebase-firestore-compat.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    body { font-family: 'Outfit', sans-serif; background-color: #020617; color: #f8fafc; margin: 0; padding: 0; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    .glass-card { background: #0f172a; border: 1px solid #1e293b; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .input-focus-ring:focus { box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2); }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background-color: #020617; color: #fbbf24;">
      <i class="fa-solid fa-spinner fa-spin" style="font-size: 3rem; margin-bottom: 1rem;"></i>
      <h2 style="font-size: 1.25rem; font-weight: bold; margin-bottom: 0.5rem; color: #f8fafc;">Workspace ကို ဖွင့်နေပါသည်...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const safeGetLocal = (key, defaultVal) => { try { return window.localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
    const safeSetLocal = (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} };
    const safeGetSession = (key, defaultVal) => { try { return window.sessionStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
    const safeSetSession = (key, val) => { try { window.sessionStorage.setItem(key, val); } catch(e) {} };

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "AIzaSyDRaW1Y_L586Z7NBqiPDUpXa-dVXGvF1QE",
      authDomain: "whlaing-d5c07.firebaseapp.com",
      projectId: "whlaing-d5c07",
      storageBucket: "whlaing-d5c07.firebasestorage.app",
      messagingSenderId: "824820035764",
      appId: "1:824820035764:web:8ad8bffe7ce77f4c3027e1"
    };

    let db = null, auth = null;
    try {
      if (window.firebase && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
      }
    } catch (e) {}

    function App() {
      const [firebaseUser, setFirebaseUser] = useState(null);
      const [userRole, setUserRole] = useState('user');
      const [premiumDaysLeft, setPremiumDaysLeft] = useState(0);
      
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => safeGetSession('is_admin_auth', 'false') === 'true');
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');
      
      const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
      const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
      
      // Admin System Keys
      const [systemGeminiKey, setSystemGeminiKey] = useState('');
      const [systemGroqKeys, setSystemGroqKeys] = useState([]);
      const [systemGroqKeysInput, setSystemGroqKeysInput] = useState('');
      const [currentGroqKeyIndex, setCurrentGroqKeyIndex] = useState(0);
      
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [submittedTxId, setSubmittedTxId] = useState('');
      const [activeTab, setActiveTab] = useState('transcript');

      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [logs, setLogs] = useState([]);
      const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
      const [transcriptSegments, setTranscriptSegments] = useState(() => { try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; } });
      const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
      const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
      const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

      const [targetLang, setTargetLang] = useState('Myanmar');
      const languagesList = [{ id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' }];

      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('my-MM-NilarNeural');
      const [ttsRate, setTtsRate] = useState(0);   
      const [ttsPitch, setTtsPitch] = useState(0); 
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);
      const [ttsErrorDetail, setTtsErrorMsg] = useState('');
      const audioRef = useRef(null);

      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [paymentRequests, setPaymentRequests] = useState([]);
      const [allPremiumUsers, setAllPremiumUsers] = useState([]);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      // Listen to Auth & Account Info
      useEffect(() => {
        if (!auth) return;
        auth.signInAnonymously().catch(e => {});
        const unsub = auth.onAuthStateChanged(user => {
          if (user) {
            setFirebaseUser(user);
            if(db) {
              db.collection("users").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) { 
                   const data = doc.data();
                   if (data.role === 'premium' && data.premiumUntil) {
                       const until = new Date(data.premiumUntil);
                       const now = new Date();
                       const diff = Math.ceil((until - now) / (1000 * 60 * 60 * 24));
                       if (diff <= 0) {
                           db.collection("users").doc(user.uid).update({ role: 'user', premiumUntil: null });
                           setUserRole('user');
                       } else {
                           setUserRole('premium');
                           setPremiumDaysLeft(diff);
                       }
                   } else {
                       setUserRole('user');
                   }
                } else { 
                   db.collection("users").doc(user.uid).set({ role: 'user', createdAt: new Date().toISOString() }); 
                }
              });
            }
          }
        });
        return () => unsub();
      }, []);

      // Fetch System Gemini Key & Admin Data
      useEffect(() => {
        if (!db) return;
        db.collection("settings").doc("api_keys").onSnapshot(doc => {
           if(doc.exists) {
               const data = doc.data();
               setSystemGeminiKey(data.geminiKey || '');
               setSystemGroqKeys(data.groqKeys || []);
               setSystemGroqKeysInput((data.groqKeys || []).join('\n'));
           }
        });

        const unsubPay = db.collection("payments").onSnapshot(snapshot => {
          const list = [];
          snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
          list.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          setPaymentRequests(list);
        });

        const unsubUsers = db.collection("users").where("role", "==", "premium").onSnapshot(snapshot => {
          const list = [];
          snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
          setAllPremiumUsers(list);
        });

        return () => { unsubPay(); unsubUsers(); };
      }, []);

      useEffect(() => {
        safeSetLocal('stored_transcript', transcriptText);
        safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
        safeSetLocal('stored_srt', srtText);
        safeSetLocal('stored_translation', translatedText);
        safeSetLocal('stored_translated_srt', translatedSrtText);
      }, [transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

      // --- Audio Extraction Logic ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(["အသံလှိုင်းများကို ပြင်ဆင်နေပါသည်... ⏳"]);
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              setLogs([`အသံဖိုင် သီးသန့်ခွဲထုတ်ခြင်း ပြီးမြောက်ပါပြီ။ 🚀`]);
              resolve(new File([wavBlob], "extracted_audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
        writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); 
        writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); 
        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); 
        view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Secure Backend Transcription ---
      const runTranscription = async () => {
        if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!", "error"); return; }
        
        let activeKey = userGroqKey;
        let useSystemKeys = false;
        
        if (!activeKey) {
            if (systemGroqKeys && systemGroqKeys.length > 0) {
                activeKey = systemGroqKeys[currentGroqKeyIndex % systemGroqKeys.length];
                useSystemKeys = true;
            } else {
                showToast("System API Key မရှိပါ။ Admin မှထည့်ပေးရန် လိုအပ်ပါသည်။", "error");
                return;
            }
        }

        setIsProcessing(true); 
        setLogs([useSystemKeys ? "System Key ဖြင့် စတင်နေပါသည်..." : "ကိုယ်ပိုင် Key ဖြင့် စတင်နေပါသည်..."]);
        
        let audioFileToSend = selectedFile;
        
        if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov|avi)$/i)) {
          try { 
            audioFileToSend = await processAndExtractAudio(selectedFile); 
          } catch (err) { 
            setLogs(["ဗီဒီယိုမှ အသံထုတ်ယူခြင်း မအောင်မြင်ပါ။"]); setIsProcessing(false); return; 
          }
        }

        const formData = new FormData(); 
        formData.append('file', audioFileToSend); 
        formData.append('model', 'whisper-large-v3'); 
        formData.append('response_format', 'verbose_json');

        try {
            setLogs(["AI Server သို့ ပေးပို့နေပါသည်..."]);
            const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${activeKey}` },
                body: formData
            });

            if (res.ok) {
               const data = await res.json();
               setTranscriptText(data.text);
               setTranscriptSegments(data.segments || []);
               showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။", "success");
               setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
               if (useSystemKeys) setCurrentGroqKeyIndex(prev => prev + 1); 
            } else {
               showToast("API Limit ပြည့်နေပါသည်။ နောက်တစ်ကြိမ် ထပ်နှိပ်ကြည့်ပါ။", "error");
               setLogs(["⚠️ API Error. ကျေးဇူးပြု၍ ပြန်လည်ကြိုးစားပါ။"]);
               if (useSystemKeys) setCurrentGroqKeyIndex(prev => prev + 1); 
            }
        } catch (err) {
            showToast("Connection Error", "error");
            setLogs(["⚠️ Server သို့ ချိတ်ဆက်၍မရပါ။"]);
        }
        setIsProcessing(false);
      };

      const generateSrt = () => {
        if (!transcriptText || transcriptSegments.length === 0) { showToast("စာသားအရင်ထုတ်ပါ!", "error"); return; }
        setIsProcessing(true);
        setTimeout(() => {
          let srtResult = "";
          const formatTime = (seconds) => {
            const date = new Date(seconds * 1000);
            return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
          };
          transcriptSegments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
          setSrtText(srtResult); showToast("SRT ဖန်တီးပြီးပါပြီ။", "success"); setIsProcessing(false);
        }, 500);
      };

      const runTranslation = async (type) => {
        const activeKey = userGeminiKey || systemGeminiKey;
        if (!activeKey) { showToast("Settings သို့မဟုတ် Admin မှ Gemini API Key အရင်ထည့်ပါ။", "error"); return; }
        
        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent.trim()) { showToast("ဘာသာပြန်ရန် စာသားအရင်ထည့်ပါ။", "error"); return; }

        setIsProcessing(true);
        const prompt = type === 'srt' ? `Translate this SRT file into ${targetLang}. Preserve all numbers and timestamps exactly. Only translate the text. SRT:\n\n${sourceContent}` : `Translate the following text into ${targetLang}:\n\n${sourceContent}`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          if (!res.ok) throw new Error("API Error");
          const data = await res.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Error.";
          type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
          showToast(`အောင်မြင်စွာ ပြန်ဆိုပြီးပါပြီ။`, "success");
        } catch (e) { showToast("Key မှားယွင်းနိုင်ပါသည်။", "error"); }
        setIsProcessing(false);
      };

      const runTtsGeneration = async () => {
        if (userRole !== 'premium') { showToast("Premium ဖြင့်သာ သုံးနိုင်ပါသည်။", "error"); return; }
        const text = ttsInput.trim();
        if (!text) { showToast("စာသားရိုက်ထည့်ပါ!", "error"); return; }

        setIsSynthesizing(true); setTtsErrorMsg(''); setSynthesizedAudioUrl(null);
        const existingPlayer = document.getElementById("tts-player");
        if (existingPlayer) existingPlayer.pause();

        try {
          const response = await fetch('/api/generate', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ text: text, voice: selectedVoice, rate: ttsRate, pitch: ttsPitch }),
          });
          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error || "API ချိတ်ဆက်၍မရပါ။");
          }
          const blob = await response.blob();
          const audioUrl = URL.createObjectURL(blob);
          setSynthesizedAudioUrl(audioUrl);
          showToast("အသံဖန်တီးမှု အောင်မြင်ပါသည်။", "success");
          
          setTimeout(() => {
             const player = document.getElementById("tts-player");
             if (player) player.play();
          }, 100);

        } catch (err) { setTtsErrorMsg("⚠ " + err.message); } 
        finally { setIsSynthesizing(false); }
      };

      const handlePaymentSubmit = async (e) => {
        e.preventDefault();
        if (!db) return;
        let currentUser = firebaseUser;
        if (!currentUser) {
           try { const cred = await auth.signInAnonymously(); currentUser = cred.user; setFirebaseUser(currentUser); } catch (err) { return; }
        }
        try {
          await db.collection("payments").doc(currentUser.uid).set({
            userId: currentUser.uid, transactionId: submittedTxId, status: "Pending", timestamp: new Date().toISOString()
          });
          showToast("အောင်မြင်စွာ တင်ပြပြီးပါပြီ။", "success"); setShowPaymentModal(false); setSubmittedTxId('');
        } catch (err) { showToast("တင်ပြမှု မအောင်မြင်ပါ။", "error"); }
      };

      const handleApproveRequest = async (request) => {
        if (!db) return;
        try {
          const expireDate = new Date();
          expireDate.setDate(expireDate.getDate() + 30); 
          await db.collection("users").doc(request.userId).update({ role: 'premium', premiumUntil: expireDate.toISOString() });
          await db.collection("payments").doc(request.userId).update({ status: 'Approved' });
          showToast("Premium အတည်ပြုပြီးပါပြီ။", "success");
        } catch (err) { showToast("Error", "error"); }
      };

      const handleRejectRequest = async (id) => { 
        if (!db) return; 
        try { await db.collection("payments").doc(id).update({ status: 'Rejected' }); } catch (err) {}
      };

      const handleRevokePremium = async (uid) => {
        if(!db) return;
        if(confirm("ဤ User ကို Premium မှ ဖယ်ရှားမည်မှာ သေချာပါသလား?")) {
            await db.collection("users").doc(uid).update({ role: 'user', premiumUntil: null });
            showToast("ဖယ်ရှားပြီးပါပြီ", "success");
        }
      };

      const handleClearAllPayments = async () => {
        if(!db) return;
        if(confirm("Payment မှတ်တမ်းဟောင်းများ အားလုံးကို ရှင်းလင်းမည်မှာ သေချာပါသလား?")) {
            const snapshot = await db.collection("payments").get();
            snapshot.docs.forEach(doc => doc.ref.delete());
            showToast("မှတ်တမ်းများ ရှင်းလင်းပြီးပါပြီ", "success");
        }
      };

      // --- Admin Key Settings Update ---
      const saveSystemKeys = async () => {
        if(!db) return;
        const groqArray = systemGroqKeysInput.split('\n').map(k => k.trim()).filter(k => k.length > 0);
        await db.collection("settings").doc("api_keys").set({ 
            geminiKey: systemGeminiKey,
            groqKeys: groqArray
        }, {merge: true});
        showToast("System API Keys များ သိမ်းဆည်းပြီးပါပြီ", "success");
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPasswordInput === "111") {
          setIsAdminAuthenticated(true); safeSetSession('is_admin_auth', 'true'); setShowAdminLoginModal(false); setAdminPasswordInput(''); showToast("Admin ဝင်ရောက်ပြီးပါပြီ။", "success");
        } else { showToast("Password မှားယွင်းပါသည်။", "error"); }
      };

      const tabs = [
        { id: 'settings', icon: 'fa-user', label: 'Profile' },
        { id: 'transcript', icon: 'fa-microphone', label: 'Extract Text' },
        { id: 'srt', icon: 'fa-closed-captioning', label: 'SRT Gen' },
        { id: 'translation', icon: 'fa-language', label: 'Translate' },
        { id: 'tts', icon: 'fa-volume-high', label: 'အသံထွက် (TTS)' }
      ];
      if (isAdminAuthenticated) tabs.push({ id: 'admin', icon: 'fa-shield-halved', label: 'Admin Board' });

                   <span className="bg-amber-500 text-slate-900 px-5 py-2 rounded-2xl font-bold shadow-lg text-sm inline-block">၁ လ - ၁၀,၀၀၀ ကျပ်</span>
                </div>
                
                {/* 3 Payment Options (KBZ, Wave, Thai Bank) */}
                <div className="grid grid-cols-3 gap-3 mb-6">
                   <div className="bg-white p-2 rounded-2xl text-center shadow-lg transform hover:scale-105 transition-transform cursor-pointer">
                      <img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" className="w-full h-auto rounded-lg object-contain" alt="KBZ Pay" />
                      <p className="text-black font-extrabold text-[9px] mt-2">KBZ Pay</p>
                   </div>
                   <div className="bg-white p-2 rounded-2xl text-center shadow-lg transform hover:scale-105 transition-transform cursor-pointer">
                      <img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" className="w-full h-auto rounded-lg object-contain" alt="Wave Pay" />
                      <p className="text-black font-extrabold text-[9px] mt-2">Wave Pay</p>
                   </div>
                   <div className="bg-white p-2 rounded-2xl text-center shadow-lg transform hover:scale-105 transition-transform cursor-pointer">
                      <img src="https://i.postimg.cc/GhdP2zVj/IMG-20260710-080330-465.jpg" className="w-full h-auto rounded-lg object-contain" alt="Thai Bank" />
                      <p className="text-black font-extrabold text-[9px] mt-2">Thai Bank</p>
                   </div>
                </div>
                
                <a href="https://t.me/thetphyo_tun" target="_blank" className="w-full bg-[#2AABEE]/10 border border-[#2AABEE]/30 text-[#2AABEE] py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#2AABEE]/20 transition-colors text-sm mb-5 shadow-inner">
                   <i className="fa-brands fa-telegram text-xl"></i> ငွေလွှဲပြေစာအား Telegram သို့ပို့ရန်
                </a>

                <form onSubmit={handlePaymentSubmit} className="space-y-4">
                  <div>
                    <label className="text-[10px] font-bold text-slate-400 block mb-1.5 text-center">Transaction ID သို့မဟုတ် အမည်</label>
                    <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3.5 text-amber-400 text-center tracking-wider outline-none focus:border-amber-500 transition-colors text-sm" placeholder="နောက်ဆုံး ၆ လုံး..." />
                  </div>
                  <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-yellow-600 hover:opacity-90 text-slate-900 font-bold py-3.5 rounded-xl shadow-lg transition-transform active:scale-95 text-sm">တင်ပြမည်</button>
                </form>
              </div>
            </div>
          )}

          {/* ADMIN LOGIN MODAL */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="glass-card border border-slate-700 w-full max-w-xs rounded-3xl p-8 relative text-center shadow-2xl">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-slate-500 w-8 h-8 hover:text-white bg-slate-900 rounded-full flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                <div className="w-16 h-16 rounded-full bg-amber-500/10 flex items-center justify-center border border-amber-500/30 mx-auto mb-4">
                  <i className="fa-solid fa-lock text-2xl text-amber-400"></i>
                </div>
                <h3 className="text-lg font-bold text-amber-400 mb-6">Admin Login</h3>
                <form onSubmit={handleAdminLogin} className="space-y-5">
                  <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-slate-950 border border-slate-700 rounded-xl p-4 text-white text-center tracking-[0.3em] text-xl outline-none focus:border-amber-500 transition-colors input-focus-ring" placeholder="••••••" />
                  <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-yellow-600 text-slate-900 font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-transform active:scale-95">ဝင်မည်</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App/>);
  </script>
</body>
</html>
