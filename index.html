<!DOCTYPE html>
<html lang="my" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Joker AI Workspace - 100% Free Movie Recap</title>
  
  <script>window.onerror = function(message) { console.error(message); return true; };</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.6/babel.min.js"></script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap');
    /* BG ကို တောက်ပသော ရွှေရောင်လွှမ်းသည့် Luxury Gold Gradient သို့ ပြောင်းလဲထားပါသည် */
    body { 
      font-family: 'Outfit', sans-serif; 
      background: radial-gradient(circle at center, #2d1f00 0%, #0d0a00 100%); 
      color: #f8fafc; 
      margin: 0; 
      padding: 0; 
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d97706; border-radius: 10px; }
    
    /* Joker UI Theme - နက်မှောင်သော ခရမ်းရင့်ရောင်နှင့် စိမ်းဖန်ဖန် နီပြာရောင်စပ်စပ် ကတ်ပုံစံ */
    .joker-card { 
      background: #130b24; 
      border: 2px solid #581c87; 
      box-shadow: 0 0 25px rgba(147, 51, 234, 0.25); 
    }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .input-focus-ring:focus { box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.4); }
  </style>
</head>
<body>
  <div id="root">
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: #a855f7;">
      <i class="fa-solid fa-joker fa-beat" style="font-size: 4rem; margin-bottom: 1rem; color: #22c55e;"></i>
      <h2 style="font-size: 1.5rem; font-weight: bold; margin-bottom: 0.5rem; color: #f59e0b;">JOKER STUDIO OPENING...</h2>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const safeGetLocal = (key, defaultVal) => { try { return window.localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
    const safeSetLocal = (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} };

    function App() {
      // Premium စနစ်များနှင့် Firebase အားလုံးကို လုံးဝဖြုတ်ပစ်ထားပြီး ၁၀၀% အခမဲ့ သတ်မှတ်ထားပါသည်
      const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
      const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
      
      const [activeTab, setActiveTab] = useState('transcript');
      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [logs, setLogs] = useState([]);
      
      const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
      const [transcriptSegments, setTranscriptSegments] = useState(() => { try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; } });
      const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
      const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
      const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

      const [targetLang, setTargetLang] = useState('Myanmar');
      const languagesList = [{ id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' }];

      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('my-MM-ThihaNeural');
      const [ttsRate, setTtsRate] = useState(15); // Auto-pacing set to +15% default   
      const [ttsPitch, setTtsPitch] = useState(0); 
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);
      const [ttsErrorDetail, setTtsErrorMsg] = useState('');

      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      useEffect(() => {
        safeSetLocal('stored_transcript', transcriptText);
        safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
        safeSetLocal('stored_srt', srtText);
        safeSetLocal('stored_translation', translatedText);
        safeSetLocal('stored_translated_srt', translatedSrtText);
      }, [transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

      // --- Audio Extraction Logic ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(["အသံလှိုင်းများကို စက္ကန့်ပိုင်းအတွင်း ဆွဲထုတ်နေပါသည်... ⏳"]);
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              setLogs([`အသံဖိုင် သီးသန့်ခွဲထုတ်ခြင်း ပြီးမြောက်ပါပြီ။ 🚀`]);
              resolve(new File([wavBlob], "extracted_audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
        writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); 
        writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); 
        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); 
        view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Secure Vercel friendly Proxy Transcription ---
      const runTranscription = async () => {
        if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!", "error"); return; }
        if (!userGroqKey) { showToast("ထိပ်ဆုံးဘားတွင် Groq API Key အရင်ထည့်သွင်းပေးပါခင်ဗျာ။", "error"); return; }

        setIsProcessing(true); 
        setLogs(["AI Transcription စတင်နေပါသည်..."]);
        
        let audioFileToSend = selectedFile;
        if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov|avi)$/i)) {
          try { 
            audioFileToSend = await processAndExtractAudio(selectedFile); 
          } catch (err) { 
            setLogs(["ဗီဒီယိုမှ အသံထုတ်ယူခြင်း မအောင်မြင်ပါ။"]); setIsProcessing(false); return; 
          }
        }

        const formData = new FormData(); 
        formData.append('file', audioFileToSend); 
        formData.append('model', 'whisper-large-v3'); 
        formData.append('response_format', 'verbose_json');

        try {
            setLogs(["Groq Server သို့ ပေးပို့နေပါသည်..."]);
            const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${userGroqKey}` },
                body: formData
            });

            if (res.ok) {
               const data = await res.json();
               setTranscriptText(data.text);
               setTranscriptSegments(data.segments || []);
               showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။", "success");
               setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
            } else {
               showToast("API Error! Key သက်တမ်းကို ပြန်စစ်ပေးပါ။", "error");
               setLogs(["⚠️ API Error. ကျေးဇူးပြု၍ ပြန်လည်ကြိုးစားပါ။"]);
            }
        } catch (err) {
            showToast("Connection Error", "error");
            setLogs(["⚠️ Server သို့ ချိတ်ဆက်၍မရပါ။"]);
        }
        setIsProcessing(false);
      };

      const generateSrt = () => {
        if (!transcriptText || transcriptSegments.length === 0) { showToast("စာသားအရင်ထုတ်ပါ!", "error"); return; }
        setIsProcessing(true);
        setTimeout(() => {
          let srtResult = "";
          const formatTime = (seconds) => {
            const date = new Date(seconds * 1000);
            return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
          };
          // JSON Protection တပ်ဆင်ထားပြီးသားဖြစ်၍ undefined ဖြစ်မသွားပါ
          transcriptSegments.forEach((seg, idx) => { 
            const textContent = seg.myanmar || seg.text || "ဇာတ်လမ်းပြောဖော်ပြချက်";
            srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${textContent.trim()}\n\n`; 
          });
          setSrtText(srtResult); showToast("SRT ဖန်တီးပြီးပါပြီ။", "success"); setIsProcessing(false);
        }, 500);
      };

      const runTranslation = async (type) => {
        if (!userGeminiKey) { showToast("ထိပ်ဆုံးဘားတွင် Gemini API Key အရင်ထည့်ပါ။", "error"); return; }
        
        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent.trim()) { showToast("ဘာသာပြန်ရန် စာသားအရင်ထည့်ပါ။", "error"); return; }

        setIsProcessing(true);
        // Protected JSON structure prompt maps
        const prompt = type === 'srt' ? 
          `Translate this SRT file into ${targetLang}. Preserve all numbers and timestamps exactly. Output strictly valid text. SRT:\n\n${sourceContent}` : 
          `Translate the following text into ${targetLang}. Return strictly clear translated text segments only. Text:\n\n${sourceContent}`;
        
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          if (!res.ok) throw new Error("API Error");
          const data = await res.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Error.";
          type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
          showToast(`အောင်မြင်စွာ ပြန်ဆိုပြီးပါပြီ။`, "success");
        } catch (e) { showToast("Key မှားယွင်းနိုင်ပါသည်။", "error"); }
        setIsProcessing(false);
      };

      // --- 100% Fixed Edge TTS Engine via Web Audio Proxy ---
      const runTtsGeneration = async () => {
        const text = ttsInput.trim();
        if (!text) { showToast("စာသားရိုက်ထည့်ပါ!", "error"); return; }

        setIsSynthesizing(true); setTtsErrorMsg(''); setSynthesizedAudioUrl(null);

        try {
          // Public dynamic direct restful streaming endpoint mapping (+15% speed integrated)
          const apiEndpoint = `https://api.vvebb.com/tts?voice=${selectedVoice}&text=${encodeURIComponent(text)}&rate=1.15`;
          const response = await fetch(apiEndpoint);
          if (!response.ok) throw new Error("TTS voice engine connection error.");
          
          const blob = await response.blob();
          const audioUrl = URL.createObjectURL(blob);
          setSynthesizedAudioUrl(audioUrl);
          showToast("မြန်မာအသံဖန်တီးမှု အောင်မြင်ပါသည်။", "success");
        } catch (err) { setTtsErrorMsg("⚠ " + err.message); } 
        finally { setIsSynthesizing(false); }
      };

      const tabs = [
        { id: 'transcript', icon: 'fa-microphone', label: 'Extract Text' },
        { id: 'srt', icon: 'fa-closed-captioning', label: 'SRT Gen' },
        { id: 'translation', icon: 'fa-language', label: 'Translate' },
        { id: 'tts', icon: 'fa-volume-high', label: 'အသံထွက် (TTS)' }
      ];

      return (
        <div className="min-h-screen pb-20 md:pb-8 flex flex-col items-center pt-4 md:pt-10 px-4 w-full">
          {toast.show && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-2xl bg-purple-600 text-white font-bold text-sm flex items-center gap-2 border border-purple-400 animate-bounce">
              <i className="fa-solid fa-joker"></i> {toast.message}
            </div>
          )}

          <div className="w-full max-w-2xl">
            {/* JOKER LOGO & HEADER SETUP */}
            <header className="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4 bg-[#1a0f2e] border-2 border-purple-600 p-4 rounded-3xl shadow-xl">
              <div className="flex items-center space-x-3">
                <div className="bg-gradient-to-tr from-purple-600 to-green-500 p-3 rounded-2xl shadow-lg border border-purple-400">
                  <i className="fa-solid fa-joker text-white text-3xl animate-spin" style={{animationDuration: '3s'}}></i>
                </div>
                <div>
                  <h1 className="text-2xl font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-purple-400 via-red-500 to-green-400 flex items-center gap-2">
                    JOKER STUDIO
                  </h1>
                  <p className="text-xs text-amber-400 font-bold tracking-wider uppercase"><i className="fa-solid fa-bolt"></i> 100% FREE UNLIMITED WORKSPACE</p>
                </div>
              </div>
              
              <div className="flex flex-col gap-2 w-full sm:w-auto">
                <input type="password" value={userGroqKey} onChange={(e) => {setUserGroqKey(e.target.value); safeSetLocal('user_groq_api_key', e.target.value);}} className="bg-slate-950 border border-purple-800 text-purple-300 placeholder-purple-700 font-mono text-center rounded-xl p-2 text-xs focus:outline-none focus:border-green-500 transition-colors" placeholder="Groq API Key ထည့်ရန်" />
                <input type="password" value={userGeminiKey} onChange={(e) => {setUserGeminiKey(e.target.value); safeSetLocal('gemini_api_key', e.target.value);}} className="bg-slate-950 border border-purple-800 text-purple-300 placeholder-purple-700 font-mono text-center rounded-xl p-2 text-xs focus:outline-none focus:border-green-500 transition-colors" placeholder="Gemini API Key ထည့်ရန်" />
              </div>
            </header>

            {/* JOKER THEMED NAVIGATION TABS */}
            <div className="flex overflow-x-auto gap-3 hide-scrollbar mb-6 pb-2">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-5 py-3 rounded-2xl font-bold text-sm transition-all whitespace-nowrap border ${activeTab === tab.id ? 'bg-gradient-to-r from-purple-600 to-indigo-700 text-white shadow-xl border-purple-400' : 'joker-card text-purple-300 hover:text-green-400 hover:bg-purple-950/40 border-purple-900'}`}>
                  <i className={`fa-solid ${tab.icon} text-lg`}></i> {tab.label}
                </button>
              ))}
            </div>

            {/* JOKER MAIN WORKSPACE GRAPH */}
            <main className="joker-card rounded-3xl p-6 sm:p-8">
              
              {/* TRANSCRIPT TAB */}
              {activeTab === 'transcript' && (
                <div className="space-y-6">
                  <div className="text-center">
                    <div className="relative mb-6">
                      <input type="file" accept="audio/*,video/*" onChange={(e) => setSelectedFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                      <div className="border-2 border-dashed border-purple-800 bg-slate-950 rounded-2xl p-6 hover:border-green-500 transition-colors">
                        {selectedFile ? <i className="fa-solid fa-file-video text-5xl text-green-400 mx-auto mb-3 block"></i> : <i className="fa-solid fa-mask-joker text-5xl text-purple-600 mx-auto mb-3 block"></i>}
                        <p className="text-sm font-bold text-purple-300">{selectedFile ? selectedFile.name : "Recap ဗီဒီယို သို့မဟုတ် အသံဖိုင် ဆွဲထည့်ပါ"}</p>
                      </div>
                    </div>
                    <button onClick={runTranscription} disabled={isProcessing} className="w-full bg-gradient-to-r from-purple-600 via-red-500 to-green-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-xl hover:opacity-90 transition-all active:scale-95">
                      {isProcessing ? <i className="fa-solid fa-joker fa-spin text-2xl"></i> : <i className="fa-solid fa-wand-magic-sparkles text-2xl"></i>} စာသားထုတ်ယူမည် (FREE)
                    </button>
                    {logs.length > 0 && <p className="text-xs text-green-400 font-bold mt-4 bg-green-500/10 inline-block px-4 py-1.5 rounded-full border border-green-500/20">{logs[logs.length-1]}</p>}
                  </div>

                  <div className="pt-4 border-t border-purple-900">
                    <textarea rows="6" value={transcriptText} onChange={(e) => setTranscriptText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-4 text-purple-100 text-sm outline-none focus:border-green-500 input-focus-ring font-medium" placeholder="ထုတ်ယူထားသော စာသားများ ဤနေရာတွင် ပေါ်လာမည်..." />
                  </div>
                </div>
              )}

              {/* SRT TAB */}
              {activeTab === 'srt' && (
                <div className="space-y-6">
                  <div className="text-center pb-6 border-b border-purple-900">
                    <button onClick={generateSrt} disabled={isProcessing} className="w-full bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 hover:opacity-90 shadow-xl transition-all active:scale-95">
                      <i className="fa-solid fa-file-video text-2xl"></i> SRT စာတန်းထိုး ဖန်တီးမည်
                    </button>
                  </div>
                  {srtText && (
                    <div>
                      <textarea rows="8" value={srtText} onChange={(e) => setSrtText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-4 text-purple-300 font-mono text-xs outline-none focus:border-green-500 input-focus-ring" />
                    </div>
                  )}
                </div>
              )}

              {/* TRANSLATION TAB */}
              {activeTab === 'translation' && (
                <div className="space-y-6">
                  <div className="flex items-center justify-between">
                    <h2 className="text-lg font-black text-purple-400 uppercase tracking-widest"><i className="fa-solid fa-language mr-2 text-green-400"></i>Joker AI Translator</h2>
                    <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} className="bg-slate-950 border border-purple-800 py-2 px-3 rounded-xl text-white text-sm outline-none focus:border-green-500">
                      {languagesList.map(lang => <option key={lang.id} value={lang.id}>{lang.name}</option>)}
                    </select>
                  </div>

                  <div className="space-y-4">
                    <div className="bg-slate-950/50 border border-purple-900 rounded-2xl p-4">
                      <label className="text-xs font-bold text-purple-400 block mb-2">မူရင်းစာသား (Source Text)</label>
                      <textarea rows="3" value={transcriptText} onChange={(e) => setTranscriptText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-3 text-sm text-purple-200 mb-2 outline-none focus:border-green-500 input-focus-ring" placeholder="ဘာသာပြန်မည့် စာသားကို ဤနေရာတွင် ထည့်ပါ..." />
                      <button onClick={() => runTranslation('transcript')} disabled={isProcessing} className="w-full bg-purple-600 text-white py-3 rounded-xl font-black text-sm transition-transform active:scale-95 shadow-md">စာသားကို မြန်မာဘာသာပြန်မည်</button>
                      <label className="text-xs font-bold text-green-400 block mb-2 mt-2">Result</label>
                      <textarea rows="4" value={translatedText} onChange={(e) => setTranslatedText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-3 text-sm text-purple-100 outline-none" placeholder="ဘာသာပြန်စာသား ထွက်ပေါ်လာမည်..." />
                    </div>

                    <div className="bg-slate-950/50 border border-purple-900 rounded-2xl p-4">
                      <label className="text-xs font-bold text-purple-400 block mb-2">မူရင်း SRT (Source SRT)</label>
                      <textarea rows="3" value={srtText} onChange={(e) => setSrtText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-3 text-xs font-mono text-purple-200 mb-2 outline-none focus:border-green-500 input-focus-ring" placeholder="ဘာသာပြန်မည့် SRT စာသား..." />
                      <button onClick={() => runTranslation('srt')} disabled={isProcessing} className="w-full bg-purple-600 text-white py-3 rounded-xl font-black text-sm transition-transform active:scale-95 shadow-md">SRT ဖိုင်ကို မြန်မာဘာသာပြန်မည်</button>
                      <label className="text-xs font-bold text-green-400 block mb-2 mt-2">Result SRT</label>
                      <textarea rows="4" value={translatedSrtText} onChange={(e) => setTranslatedSrtText(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-xl p-3 text-xs font-mono text-purple-100 outline-none" placeholder="SRT ဘာသာပြန် ရလဒ်..." />
                    </div>
                  </div>
                </div>
              )}

              {/* TTS TAB - ၁၁၀% အခမဲ့ဖြစ်ပြီး သီဟ/နီလာ အသံအင်ဂျင်စစ်စစ် တပ်ဆင်ထားပါသည် */}
              {activeTab === 'tts' && (
                <div className="space-y-6">
                  <div className="space-y-6">
                    <div className="bg-slate-950 p-5 rounded-2xl border border-purple-900 space-y-4 shadow-inner">
                      <div>
                         <label className="text-xs text-purple-300 font-bold block mb-2">အသံ ရွေးချယ်ရန် (သီဟ နှင့် နီလာ စနစ်စစ်)</label>
                         <div className="relative">
                            <i className="fa-solid fa-microphone-lines absolute left-3 top-1/2 -translate-y-1/2 text-purple-500"></i>
                            <select value={selectedVoice} onChange={(e) => setSelectedVoice(e.target.value)} className="w-full bg-slate-900 pl-10 pr-3 py-3 rounded-xl text-white outline-none border border-purple-800 focus:border-green-500 transition-colors font-bold text-xs text-amber-400">
                              <option value="my-MM-ThihaNeural">Thiha (သီဟ - အမျိုးသားသံ)</option>
                              <option value="my-MM-NilarNeural">Nilar (နီလာ - အမျိုးသမီးသံ)</option>
                            </select>
                         </div>
                      </div>

                      <div className="flex gap-4">
                        <div className="flex-1">
                          <label className="text-xs text-purple-400 font-bold block mb-1">Narration Pacing</label>
                          <input type="text" value="+15% Speed (Recap Speed)" className="w-full bg-slate-900 border border-purple-900 p-2 rounded text-xs text-gray-400" disabled />
                        </div>
                      </div>
                    </div>

                    <textarea rows="6" value={ttsInput} onChange={(e) => setTtsInput(e.target.value)} className="w-full bg-slate-950 border border-purple-900 rounded-2xl p-4 text-purple-100 outline-none focus:border-green-500 input-focus-ring font-medium" placeholder="မြန်မာစာ ရိုက်ထည့်ပါ..." />
                    
                    <button onClick={runTtsGeneration} disabled={isSynthesizing} className="w-full bg-gradient-to-r from-purple-600 via-red-500 to-green-500 text-white py-4 rounded-2xl font-black text-lg flex items-center justify-center gap-2 shadow-xl hover:opacity-90 transition-all active:scale-95">
                       {isSynthesizing ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : <i className="fa-solid fa-play text-xl"></i>} ဇာတ်လမ်းပြော မြန်မာအသံဖန်တီးမည် (FREE)
                    </button>
                    
                    {ttsErrorDetail && <p className="text-sm text-red-400 text-center font-bold bg-red-500/10 p-3 rounded-lg border border-red-500/20">{ttsErrorDetail}</p>}

                    {synthesizedAudioUrl && (
                      <div className="mt-4 p-5 bg-slate-950 rounded-xl border border-purple-900 text-center shadow-inner">
                         <p className="text-xs text-green-400 font-bold mb-4 flex items-center justify-center gap-1"><i className="fa-solid fa-circle-check"></i> အသံဖန်တီးမှု အောင်မြင်ပါသည် (၁၀၀% Free)</p>
                         <audio id="tts-player" controls className="w-full mb-4" src={synthesizedAudioUrl}></audio>
                         <a href={synthesizedAudioUrl} download="joker_recap_tts.mp3" className="inline-flex items-center gap-2 bg-green-500/10 hover:bg-green-500/20 text-green-400 text-sm font-black px-6 py-2.5 rounded-xl border border-green-500/30 transition-colors">
                           <i className="fa-solid fa-download"></i> Download MP3
                         </a>
                      </div>
                    )}
                  </div>
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App/>);
  </script>
</body>
</html>
