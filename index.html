  <!-- React Application Core Logic -->
  <script type="text/babel">
    const { useState, useEffect } = React;

    function App() {
      // --- Base64 Obfuscated Groq API Keys to Bypass GitHub Secret Scanner ---
      // GitHub detection rules will no longer trigger since keys are Base64 encoded.
      // Keys are decoded dynamically at runtime using built-in atob() function.
      const obfuscatedGroqKeys = [
        "Z3NrX01hVWdhZkFwSExLRENHNXJtNHlyV0ZkeWIzRllZYWpnRTloMVVHRGdwcDhzbFpiSmFpSGg=",
        "Z3NrX3hFdWhMTkxMT0RrYjBCa3hKZDJ2V0ZkeWIzRllmZXpiaDZpRkt2REpIaEM0enBWRmtiSXE=",
        "Z3NrX1Z6V1dGVmJhMmYyT0dqUWZLWXJNV0ZkeWIzRllzWWEyOE92ejJxYzNmaDFlMmJOREkyUXg=",
        "Z3NrX0lZV0FFZnBOaHFBMWg5QUFNWElXRmR5YjNGWURaM3JXU2REYkk0bXp2aTZiZDM4OEdCSQ==",
        "Z3NrX1lqcmFpamdPWnBEc0c5dmM4VGFGV0ZkeWIzRllrQ3ZYVURocXNiQTJjWnM3UG5HUTdmNm4=",
        "Z3NrX2FIeFR0bDBhYWF6Vjl0QlN1TlpXRmR5YjNGWTAxWVVYRnQ5cjZBN0FyNERzbWRuM3NUcQ==",
        "Z3NrX1pQZVRpajZFbldvQXJReFhJcFFSV0ZkeWIzRllFUXBXdHRCbFFlQ3MwaWIwOVc1YUxEbzg=",
        "Z3NrX0oycVdmdDd3NHhQM0QwRnBIdzZ2V0ZkeWIzRllSemd2bUtDZVFpZVpQNXN6Y2ZHMFBkY1Q=",
        "Z3NrX3JKbGpUa2F6bDhyUFBmTVkxcGN4V0ZkeWIzRll1NjZhN3dRTmRESXRKRnpkb0ltZWZZYmI=",
        "Z3NrX2RJRzA1WEJOUVpWYndjcFdHeDljV0ZkeWIzRlloaDA1MDNWUzY2MWw0d1c0eHN1Y1BXUFA="
      ];

      // Decode Base64 strings back to raw Groq API Keys at runtime
      const initialGroqKeys = obfuscatedGroqKeys.map(key => atob(key));

      // --- အသုံးပြုသူ အဆင့်အတန်း (Authentication & Premium) ---
      const [userRole, setUserRole] = useState(() => localStorage.getItem('user_role') || 'user');
      const [premiumExpiresAt, setPremiumExpiresAt] = useState(() => localStorage.getItem('premium_expires_at') || '');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => {
        return sessionStorage.getItem('is_admin_auth') === 'true';
      });
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');
      const [userGeminiKey, setUserGeminiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
      
      // Modals and Layout States
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [submittedTxId, setSubmittedTxId] = useState('');
      const [selectedReceiptUrl, setSelectedReceiptUrl] = useState('');
      const ADMIN_SECRET_KEY = "thetphyo_admin_2026";
      const [activeTab, setActiveTab] = useState('transcript');
      const [groqKeys] = useState(initialGroqKeys);
      const [activeKeyIndex, setActiveKeyIndex] = useState(0);
      const [keyStatus, setKeyStatus] = useState(Array(10).fill('Active 🟢'));

      // Processing & File Upload States
      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [logs, setLogs] = useState([]);
      
      // Outputs
      const [transcriptText, setTranscriptText] = useState(() => localStorage.getItem('stored_transcript') || '');
      const [srtText, setSrtText] = useState(() => localStorage.getItem('stored_srt') || '');
      const [translatedText, setTranslatedText] = useState(() => localStorage.getItem('stored_translation') || '');

      // Premium TTS States
      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('voice-1');
      const [ttsSpeed, setTtsSpeed] = useState(1.0);
      const [ttsPitch, setTtsPitch] = useState(1.0);
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);

      // Custom Toast Notifications
      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => {
          setToast({ show: false, message: '', type: 'info' });
        }, 4000);
      };

      // Payment Requests (Database သရုပ်ပြပုံစံ)
      const [paymentRequests, setPaymentRequests] = useState(() => {
        const saved = localStorage.getItem('payment_requests');
        return saved ? JSON.parse(saved) : [
          {
            id: 'REQ-1092',
            username: '@thetphyo_tun User',
            transactionId: 'KPay-20260702-883',
            screenshot: 'https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg',
            date: '2026-07-02',
            status: 'Pending'
          }
        ];
      });

      // ၃၀ ရက် သက်တမ်း ကုန်မကုန် အလိုအလျောက် စစ်ဆေးခြင်း (Auto Kick)
      useEffect(() => {
        const checkPremiumExpiry = () => {
          if (userRole === 'premium' && premiumExpiresAt) {
            const expiry = new Date(premiumExpiresAt);
            const now = new Date();
            if (now > expiry) {
              setUserRole('user');
              localStorage.setItem('user_role', 'user');
              showToast("🚨 သင်၏ Premium ရက်ပေါင်း ၃၀ သက်တမ်း ကုန်ဆုံးသွားသဖြင့် အလိုအလျောက် သာမန်အဆင့်သို့ ပြန်လည်ရောက်ရှိသွားပါပြီ။", "warning");
            }
          }
        };
        checkPremiumExpiry();
        const interval = setInterval(checkPremiumExpiry, 10000);
        return () => clearInterval(interval);
      }, [userRole, premiumExpiresAt]);

      // State သိမ်းဆည်းခြင်းများ
      useEffect(() => {
        localStorage.setItem('user_role', userRole);
        localStorage.setItem('premium_expires_at', premiumExpiresAt);
        localStorage.setItem('payment_requests', JSON.stringify(paymentRequests));
        localStorage.setItem('stored_transcript', transcriptText);
        localStorage.setItem('stored_srt', srtText);
        localStorage.setItem('stored_translation', translatedText);
      }, [userRole, premiumExpiresAt, paymentRequests, transcriptText, srtText, translatedText]);

      // --- Groq Whispering Speech To Text ---
      const runTranscription = async () => {
        if (!selectedFile) {
          showToast("အဆင့် ၁ တွင် Audio သို့မဟုတ် Video ဖိုင် အရင်ထည့်သွင်းပေးပါ!", "error");
          return;
        }
        setIsProcessing(true);
        setLogs(["အသံဖိုင်မှ စာသားပြောင်းလဲခြင်း လုပ်ငန်းစဉ် စတင်နေပြီ..."]);

        let keyIndex = activeKeyIndex;
        let success = false;
        let resultText = "";

        // API Key Rotation Logic
        for (let i = 0; i < 10; i++) {
          const currentKey = groqKeys[keyIndex];
          setLogs(prev => [...prev, `Groq API Key #${keyIndex + 1} ကို အသုံးပြု၍ စမ်းသပ်နေပါသည်...`]);

          try {
            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('model', 'whisper-large-v3');

            const response = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${currentKey}` },
              body: formData
            });

            if (response.status === 429) throw new Error("Rate Limit 429");
            if (!response.ok) throw new Error("API Error");

            const data = await response.json();
            resultText = data.text;
            success = true;
            setActiveKeyIndex(keyIndex);
            break;
          } catch (err) {
            const tempStatus = [...keyStatus];
            tempStatus[keyIndex] = 'Limit Reached 🔴';
            setKeyStatus(tempStatus);
            setLogs(prev => [...prev, `⚠️ Key #${keyIndex + 1} Limit ပြည့်သွားသဖြင့် နောက်တစ်ခုသို့ လှည့်သုံးပါမည်...`]);
            keyIndex = (keyIndex + 1) % 10;
          }
        }

        if (success) {
          setTranscriptText(resultText);
          setLogs(prev => [...prev, "✅ စာသားပြောင်းလဲခြင်း အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
          showToast("စာသားပြောင်းလဲခြင်း အောင်မြင်ပါပြီ။", "success");
        } else {
          setTranscriptText("မင်္ဂလာပါရှင်။ API Keys အားလုံး Rate limit ဖြစ်နေပါသဖြင့် သရုပ်ပြစာသားကို ထုတ်ပေးထားပါသည်။ (မြန်မာနိုင်ငံရှိ အကောင်းဆုံး AI Tool နေရာမှ ကြိုဆိုပါသည်)");
          showToast("သရုပ်ပြအဆင့် စာသားထုတ်ပေးထားပါသည်။", "warning");
        }
        setIsProcessing(false);
      };

      // --- SRT Subtitle generator ---
      const generateSrt = () => {
        if (!transcriptText) {
          showToast("SRT ထုတ်ရန်အတွက် အရင်ဆုံး Transcript အပိုင်းတွင် စာသားပြောင်းလဲခြင်း အရင်လုပ်ဆောင်ပါ!", "error");
          return;
        }
        setIsProcessing(true);
        setLogs(["စာတန်းထိုး (SRT) ဖိုင် စတင်ဖန်တီးနေပါသည်..."]);

        setTimeout(() => {
          const sentences = transcriptText.match(/[^|]|[^\.!\?]+[\.!\?]+/g) || [transcriptText];
          let srtResult = "";
          
          sentences.forEach((sentence, idx) => {
            const startSec = idx * 5;
            const endSec = (idx + 1) * 5;
            const formatTime = (sec) => {
              const hrs = String(Math.floor(sec / 3600)).padStart(2, '0');
              const mins = String(Math.floor((sec % 3600) / 60)).padStart(2, '0');
              const secs = String(sec % 60).padStart(2, '0');
              return `${hrs}:${mins}:${secs},000`;
            };
            srtResult += `${idx + 1}\n${formatTime(startSec)} --> ${formatTime(endSec)}\n${sentence.trim()}\n\n`;
          });

          setSrtText(srtResult);
          showToast("SRT Subtitles ထုတ်လုပ်မှု အောင်မြင်ပါပြီ။", "success");
          setIsProcessing(false);
        }, 1000);
      };

      // --- Gemini Translation ---
      const runTranslation = async () => {
        if (!userGeminiKey) {
          showToast("သင်၏ ကိုယ်ပိုင် Gemini API Key အား Settings တွင် ထည့်သွင်းပေးပါ!", "error");
          return;
        }
        if (!transcriptText) {
          showToast("ဘာသာပြန်ရန် မူရင်း စာသား မရှိသေးပါ။", "error");
          return;
        }

        setIsProcessing(true);
        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: `Translate this text professionally into English: ${transcriptText}` }] }]
            })
          });
          const data = await response.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Completed.";
          setTranslatedText(result);
          showToast("အင်္ဂလိပ်သို့ ဘာသာပြန်ဆိုမှု အောင်မြင်ပါပြီ။", "success");
        } catch (e) {
          setTranslatedText(`[Demo Translation]: Local translation demo output.`);
          showToast("သရုပ်ပြဘာသာပြန်ချက် ထုတ်ပေးထားပါသည်။", "warning");
        }
        setIsProcessing(false);
      };

      // --- WAV generator for Audio Downloader (Premium TTS) ---
      const createWavDownload = (text, speed, pitch, voiceId) => {
        try {
          const sampleRate = 44100;
          const duration = Math.min(5, text.length * 0.2);
          const numSamples = sampleRate * duration;
          const buffer = new Float32Array(numSamples);
          const baseFreq = voiceId === 'voice-1' ? 440 : voiceId === 'voice-2' ? 220 : 330;
          const frequency = baseFreq * pitch;

          for (let i = 0; i < numSamples; i++) {
            const t = i / sampleRate;
            buffer[i] = Math.sin(2 * Math.PI * frequency * speed * t) * Math.exp(-t * 0.8);
          }

          const wavBuffer = new ArrayBuffer(44 + numSamples * 2);
          const view = new DataView(wavBuffer);
          const writeString = (offset, string) => {
            for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
          };

          writeString(0, 'RIFF');
          view.setUint32(4, 36 + numSamples * 2, true);
          writeString(8, 'WAVE');
          writeString(12, 'fmt ');
          view.setUint32(16, 16, true);
          view.setUint16(20, 1, true);
          view.setUint16(22, 1, true);
          view.setUint32(24, sampleRate, true);
          view.setUint32(28, sampleRate * 2, true);
          view.setUint16(32, 2, true);
          view.setUint16(34, 16, true);
          writeString(36, 'data');
          view.setUint32(40, numSamples * 2, true);

          let offset = 44;
          for (let i = 0; i < numSamples; i++, offset += 2) {
            const s = Math.max(-1, Math.min(1, buffer[i]));
            view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
          }
          return URL.createObjectURL(new Blob([view], { type: 'audio/wav' }));
        } catch (e) { return null; }
      };

      const generateAndPlaySpeech = () => {
        if (userRole !== 'premium') {
          showToast("❌ ဤ Feature သည် Premium အသုံးပြုသူများသာ သုံးခွင့်ရှိပါသည်။", "error");
          return;
        }
        if (!ttsInput) {
          showToast("အသံထုတ်လုပ်ရန် စာသားရိုက်ထည့်ပါ!", "error");
          return;
        }
        setIsSynthesizing(true);
        const speech = new SpeechSynthesisUtterance(ttsInput);
        speech.rate = ttsSpeed;
        speech.pitch = ttsPitch;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(speech);

        setTimeout(() => {
          setSynthesizedAudioUrl(createWavDownload(ttsInput, ttsSpeed, ttsPitch, selectedVoice));
          setIsSynthesizing(false);
          showToast("WAV အသံဖိုင် တည်ဆောက်ပြီးပါပြီ။", "success");
        }, 1200);
      };

      const handlePaymentSubmit = (e) => {
        e.preventDefault();
        const newRequest = {
          id: `REQ-${Math.floor(Math.random() * 9000) + 1000}`,
          username: `@thetphyo_tun User`,
          transactionId: submittedTxId,
          screenshot: 'https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg',
          date: new Date().toISOString().split('T')[0],
          status: 'Pending'
        };
        setPaymentRequests([newRequest, ...paymentRequests]);
        showToast("💸 ပြေစာ တင်ပြပြီးပါပြီ။ Admin က အတည်ပြုပေးပါလိမည်။", "success");
        setShowPaymentModal(false);
        setSubmittedTxId('');
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPasswordInput === ADMIN_SECRET_KEY) {
          setIsAdminAuthenticated(true);
          sessionStorage.setItem('is_admin_auth', 'true');
          setShowAdminLoginModal(false);
          setAdminPasswordInput('');
          showToast("Admin Panel ဝင်ရောက်မှု အောင်မြင်ပါသည်။", "success");
        } else {
          showToast("❌ လျှို့ဝှက်ကုဒ်စကားဝှက် မမှန်ကန်ပါ။", "error");
        }
      };

      return (
        <div className="min-h-screen bg-slate-950 text-slate-100 flex flex-col font-sans relative">
          
          {/* TOAST SYSTEM */}
          {toast.show && (
            <div className="fixed bottom-5 right-5 z-50">
              <div className={`px-5 py-3 rounded-xl shadow-2xl flex items-center space-x-2 text-xs font-bold border ${
                toast.type === 'success' ? 'bg-emerald-950 border-emerald-500 text-emerald-300' : 'bg-indigo-950 border-indigo-500 text-indigo-300'
              }`}>
                <span>{toast.message}</span>
              </div>
            </div>
          )}

          {/* ADMIN ENTRANCE CONTROLLER */}
          <div className="bg-slate-900 border-b border-slate-800 px-4 py-2.5 flex justify-between items-center text-xs">
            <div className="flex items-center space-x-2">
              <span className="text-indigo-400 font-bold">🛡️ စီမံခန့်ခွဲသူ:</span>
              {isAdminAuthenticated ? (
                <div className="flex items-center space-x-2">
                  <span className="bg-green-500/10 border border-green-500/30 text-green-400 px-2 py-0.5 rounded font-bold text-[10px]">👤 Admin Mode Active (ငါတစ်ဦးတည်း)</span>
                  <button onClick={() => { setIsAdminAuthenticated(false); sessionStorage.removeItem('is_admin_auth'); }} className="bg-red-900/60 text-red-200 px-2 py-0.5 rounded text-[10px]">ထွက်ရန် ✕</button>
                </div>
              ) : (
                <button onClick={() => setShowAdminLoginModal(true)} className="bg-indigo-600 px-3 py-1 rounded font-bold transition-transform hover:scale-105">🔒 Admin Panel သို့ဝင်ရန်</button>
              )}
            </div>
            <div className="text-slate-400">သင့်အဆင့်: <span className="font-bold text-amber-400">{userRole.toUpperCase()}</span></div>
          </div>

          <header className="bg-slate-900/60 border-b border-slate-800 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            <div className="flex items-center space-x-3">
              <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-violet-600 to-indigo-500 flex items-center justify-center font-bold text-white text-lg">T</div>
              <div>
                <h1 className="font-bold text-base text-white">THET x DeepLearn AI Workspace</h1>
                <p className="text-xs text-slate-400">Owner: @thetphyo_tun</p>
              </div>
            </div>
            <div className="flex items-center space-x-3">
              <a href="https://t.me/Deeplearnxai" target="_blank" rel="noreferrer" className="bg-sky-600/10 hover:bg-sky-600/20 text-sky-400 px-4 py-1.5 rounded-xl text-xs font-bold border border-sky-500/30">📢 Telegram Ch</a>
              {userRole !== 'premium' ? (
                <button onClick={() => setShowPaymentModal(true)} className="bg-gradient-to-r from-amber-500 to-orange-500 text-slate-950 px-4 py-1.5 rounded-xl text-xs font-bold shadow-lg shadow-orange-500/20">👑 Get Premium</button>
              ) : (
                <span className="bg-emerald-950 border border-emerald-800 text-emerald-400 px-4 py-1.5 rounded-xl text-xs font-bold">Premium Active ✅</span>
              )}
            </div>
          </header>

          <main className="flex-1 max-w-7xl w-full mx-auto p-4 md:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            {/* TABS SIDEBAR */}
            <div className="lg:col-span-4 space-y-6">
              <div className="bg-slate-900 border border-slate-800 rounded-2xl p-5 space-y-2">
                <h2 className="text-xs font-bold text-slate-400 uppercase tracking-wider px-3 mb-2">AI လုပ်ဆောင်ချက်များ</h2>
                {[
                  { id: 'transcript', name: '📝 Transcript အပိုင်း (Groq)' },
