  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // 14 TTS voice options.
    // NOTE: only v1 (Thiha) and v2 (Nilar) are genuine Myanmar-language neural
    // voices. v3-v14 are multilingual neural voices from other languages that
    // can also read Myanmar text aloud with a different accent/timbre — useful
    // for variety, but they are NOT Myanmar voices and are labeled generically
    // below (Voice 3, Voice 4, ...) rather than given real people's names, since
    // labeling a synthetic voice with a real, identifiable person's name would
    // misrepresent whose voice it actually is.
    const VOICE_MAP = {
      v1:  "my-MM-ThihaNeural",
      v2:  "my-MM-NilarNeural",
      v3:  "it-IT-GiuseppeMultilingualNeural",
      v4:  "en-AU-WilliamMultilingualNeural",
      v5:  "en-US-AndrewMultilingualNeural",
      v6:  "en-US-AvaMultilingualNeural",
      v7:  "en-US-BrianMultilingualNeural",
      v8:  "en-US-EmmaMultilingualNeural",
      v9:  "fr-FR-RemyMultilingualNeural",
      v10: "fr-FR-VivienneMultilingualNeural",
      v11: "de-DE-SeraphinaMultilingualNeural",
      v12: "de-DE-FlorianMultilingualNeural",
      v13: "pt-BR-ThalitaMultilingualNeural",
      v14: "ko-KR-HyunsuMultilingualNeural",
    };

    const VOICE_PRESETS = [
      // 10 style variations of the two real Myanmar voices
      { id: 'nilar-normal',    code: 'v2', voice: VOICE_MAP.v2, label: 'နီလာ - ပုံမှန်',            rate: 0,   pitch: 0 },
      { id: 'nilar-slow',      code: 'v2', voice: VOICE_MAP.v2, label: 'နီလာ - နှေးနှေးလေး',        rate: -20, pitch: -10 },
      { id: 'nilar-fast',      code: 'v2', voice: VOICE_MAP.v2, label: 'နီလာ - မြန်မြန်',           rate: 20,  pitch: 5 },
      { id: 'nilar-warm',      code: 'v2', voice: VOICE_MAP.v2, label: 'နီလာ - နူးညံ့',            rate: -10, pitch: -5 },
      { id: 'nilar-energetic', code: 'v2', voice: VOICE_MAP.v2, label: 'နီလာ - တက်ကြွ',            rate: 15,  pitch: 15 },
      { id: 'thiha-normal',    code: 'v1', voice: VOICE_MAP.v1, label: 'သီဟ - ပုံမှန်',            rate: 0,   pitch: 0 },
      { id: 'thiha-slow',      code: 'v1', voice: VOICE_MAP.v1, label: 'သီဟ - နှေးနှေးလေး',        rate: -20, pitch: -10 },
      { id: 'thiha-fast',      code: 'v1', voice: VOICE_MAP.v1, label: 'သီဟ - မြန်မြန်',           rate: 20,  pitch: 5 },
      { id: 'thiha-deep',      code: 'v1', voice: VOICE_MAP.v1, label: 'သီဟ - နက်နက်ရှိုင်းရှိုင်း', rate: -10, pitch: -20 },
      { id: 'thiha-energetic', code: 'v1', voice: VOICE_MAP.v1, label: 'သီဟ - တက်ကြွ',            rate: 15,  pitch: 15 },
      // 14 additional multilingual voices that can also read Myanmar text
      { id: 'v3',  code: 'v3',  voice: VOICE_MAP.v3,  label: 'Voice 3 - ယောက်ျား (နူးညံ့)',      rate: 0, pitch: 0 },
      { id: 'v4',  code: 'v4',  voice: VOICE_MAP.v4,  label: 'Voice 4 - ယောက်ျား (ခိုင်မာ)',      rate: 0, pitch: 0 },
      { id: 'v5',  code: 'v5',  voice: VOICE_MAP.v5,  label: 'Voice 5 - ယောက်ျား (ပုံမှန်)',      rate: 0, pitch: 0 },
      { id: 'v6',  code: 'v6',  voice: VOICE_MAP.v6,  label: 'Voice 6 - မိန်းမ (တက်ကြွ)',        rate: 0, pitch: 0 },
      { id: 'v7',  code: 'v7',  voice: VOICE_MAP.v7,  label: 'Voice 7 - ယောက်ျား (နက်ရှိုင်း)',   rate: 0, pitch: 0 },
      { id: 'v8',  code: 'v8',  voice: VOICE_MAP.v8,  label: 'Voice 8 - မိန်းမ (ပွင့်လင်း)',      rate: 0, pitch: 0 },
      { id: 'v9',  code: 'v9',  voice: VOICE_MAP.v9,  label: 'Voice 9 - ယောက်ျား (နူးညံ့)',      rate: 0, pitch: 0 },
      { id: 'v10', code: 'v10', voice: VOICE_MAP.v10, label: 'Voice 10 - မိန်းမ (ချိုမြိန်)',     rate: 0, pitch: 0 },
      { id: 'v11', code: 'v11', voice: VOICE_MAP.v11, label: 'Voice 11 - မိန်းမ (ပရိုဖက်ရှင်နယ်)', rate: 0, pitch: 0 },
      { id: 'v12', code: 'v12', voice: VOICE_MAP.v12, label: 'Voice 12 - ယောက်ျား (တည်ငြိမ်)',    rate: 0, pitch: 0 },
      { id: 'v13', code: 'v13', voice: VOICE_MAP.v13, label: 'Voice 13 - မိန်းမ (နွေးထွေး)',      rate: 0, pitch: 0 },
      { id: 'v14', code: 'v14', voice: VOICE_MAP.v14, label: 'Voice 14 - ယောက်ျား (ချောမွေ့)',    rate: 0, pitch: 0 },
    ];

    // --- Firebase Setup (used only to host shared system API keys) ---
    const firebaseConfig = {
      apiKey: "AIzaSyDRaW1Y_L586Z7NBqiPDUpXa-dVXGvF1QE",
      authDomain: "whlaing-d5c07.firebaseapp.com",
      projectId: "whlaing-d5c07",
      storageBucket: "whlaing-d5c07.firebasestorage.app",
      messagingSenderId: "824820035764",
      appId: "1:824820035764:web:8ad8bffe7ce77f4c3027e1"
    };
    let db = null, auth = null;
    try {
      if (window.firebase && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
      }
    } catch (e) {}

    function App() {
      const [userGeminiKey, setUserGeminiKey] = useState('');
      const [userGroqKey, setUserGroqKey] = useState('');
      const [systemGroqKeys, setSystemGroqKeys] = useState([]);
      const [systemGroqKeysInput, setSystemGroqKeysInput] = useState('');
      const [currentGroqKeyIndex, setCurrentGroqKeyIndex] = useState(0);
      const [systemGeminiKey, setSystemGeminiKey] = useState('');

      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(false);
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');

      const [activeTab, setActiveTab] = useState('transcript');

      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [transcribeProgress, setTranscribeProgress] = useState(0);
      const [logs, setLogs] = useState([]);
      const [transcriptText, setTranscriptText] = useState('');
      const [transcriptSegments, setTranscriptSegments] = useState([]);
      const [srtText, setSrtText] = useState('');
      const [srtProgress, setSrtProgress] = useState(0);
      const [translatedText, setTranslatedText] = useState('');
      const [translatedSrtText, setTranslatedSrtText] = useState('');
      const [translateTextProgress, setTranslateTextProgress] = useState(0);
      const [translateSrtProgress, setTranslateSrtProgress] = useState(0);

      const [ttsInput, setTtsInput] = useState('');
      const [selectedPreset, setSelectedPreset] = useState(VOICE_PRESETS[0].id);
      const [ttsRate, setTtsRate] = useState(0);
      const [ttsPitch, setTtsPitch] = useState(0);
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [ttsProgress, setTtsProgress] = useState(0);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);
      const [ttsErrorDetail, setTtsErrorMsg] = useState('');
      const [isPreviewing, setIsPreviewing] = useState(false);
      const [previewUrl, setPreviewUrl] = useState(null);

      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 3500);
      };

      // Apply a preset's default rate/pitch when chosen
      useEffect(() => {
        const p = VOICE_PRESETS.find(v => v.id === selectedPreset);
        if (p) { setTtsRate(p.rate); setTtsPitch(p.pitch); }
      }, [selectedPreset]);

      // Load shared system API keys so people without their own key can still use the app
      useEffect(() => {
        if (!auth || !db) return;
        auth.signInAnonymously().catch(() => {});
        const unsub = db.collection("settings").doc("api_keys").onSnapshot(doc => {
          if (doc.exists) {
            const data = doc.data();
            setSystemGeminiKey(data.geminiKey || '');
            setSystemGroqKeys(data.groqKeys || []);
            setSystemGroqKeysInput((data.groqKeys || []).join('\n'));
          }
        }, () => {});
        return () => unsub();
      }, []);

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPasswordInput === "223344") {
          setIsAdminAuthenticated(true);
          setShowAdminLoginModal(false);
          setAdminPasswordInput('');
          setActiveTab('admin');
          showToast("Admin ဝင်ရောက်ပြီးပါပြီ။", "success");
        } else { showToast("Password မှားယွင်းပါသည်။", "error"); }
      };

      const saveSystemKeys = async () => {
        if (!db) { showToast("Cloud connection မရှိပါ", "error"); return; }
        const groqArray = systemGroqKeysInput.split('\n').map(k => k.trim()).filter(k => k.length > 0);
        try {
          await db.collection("settings").doc("api_keys").set({ geminiKey: systemGeminiKey, groqKeys: groqArray }, { merge: true });
          showToast("System API Keys များ သိမ်းဆည်းပြီးပါပြီ", "success");
        } catch (e) { showToast("သိမ်းဆည်း၍ မရပါ", "error"); }
      };

      // Simple fake-but-honest progress ticker while a real request is in flight.
      // Climbs to 90% smoothly, then the caller jumps it to 100% on completion.
      const runWithProgress = async (setProgress, task) => {
        setProgress(4);
        let pct = 4;
        const timer = setInterval(() => {
          pct = Math.min(90, pct + Math.random() * 9);
          setProgress(Math.round(pct));
        }, 250);
        try {
          const result = await task();
          clearInterval(timer);
          setProgress(100);
          setTimeout(() => setProgress(0), 900);
          return result;
        } catch (err) {
          clearInterval(timer);
          setProgress(0);
          throw err;
        }
      };

      const copyToClipboard = async (text, label) => {
        if (!text || !text.trim()) { showToast("ကူးစရာ စာသား မရှိပါ", "error"); return; }
        try {
          await navigator.clipboard.writeText(text);
          showToast(`${label} ကို ကူးယူပြီးပါပြီ`, "success");
        } catch (e) { showToast("ကူးယူ၍ မရပါ", "error"); }
      };

      // --- Audio Extraction Logic ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(["အသံလှိုင်းများကို ပြင်ဆင်နေပါသည်... ⏳"]);
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              const renderedBuffer = await offlineCtx.startRendering();
              const wavBlob = encodeWAV(renderedBuffer);
              setLogs(["အသံဖိုင် သီးသန့်ခွဲထုတ်ခြင်း ပြီးမြောက်ပါပြီ။ 🚀"]);
              resolve(new File([wavBlob], "extracted_audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
        writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE');
        writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true);
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true);
        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true);
        view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Transcription ---
      const runTranscription = async () => {
        if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!", "error"); return; }

        let activeKey = userGroqKey;
        let useSystemKeys = false;
        if (!activeKey) {
          if (systemGroqKeys && systemGroqKeys.length > 0) {
            activeKey = systemGroqKeys[currentGroqKeyIndex % systemGroqKeys.length];
            useSystemKeys = true;
          } else {
            showToast("System API Key မရှိပါ။ Admin မှထည့်ပေးရန် (သို့) Settings တွင် ကိုယ်ပိုင် Key ထည့်ပေးရန် လိုအပ်ပါသည်။", "error");
            return;
          }
        }

        setIsProcessing(true);
        setLogs([useSystemKeys ? "System Key ဖြင့် စတင်နေပါသည်..." : "ကိုယ်ပိုင် Key ဖြင့် စတင်နေပါသည်..."]);

        try {
          await runWithProgress(setTranscribeProgress, async () => {
            let audioFileToSend = selectedFile;
            if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov|avi)$/i)) {
              audioFileToSend = await processAndExtractAudio(selectedFile);
            }
            const formData = new FormData();
            formData.append('file', audioFileToSend);
            formData.append('model', 'whisper-large-v3');
            formData.append('response_format', 'verbose_json');

            setLogs(["AI Server သို့ ပေးပို့နေပါသည်..."]);
            const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', {
              method: 'POST',
              headers: { 'Authorization': `Bearer ${activeKey}` },
              body: formData
            });
            if (!res.ok) {
              if (useSystemKeys) setCurrentGroqKeyIndex(prev => prev + 1);
              throw new Error("API Error");
            }
            const data = await res.json();
            setTranscriptText(data.text);
            setTranscriptSegments(data.segments || []);
            showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။", "success");
            setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
            if (useSystemKeys) setCurrentGroqKeyIndex(prev => prev + 1);
          });
        } catch (err) {
          showToast("API Limit (သို့) Connection Error", "error");
          setLogs(["⚠️ Error. ကျေးဇူးပြု၍ ပြန်လည်ကြိုးစားပါ။"]);
        }
        setIsProcessing(false);
      };

      const generateSrt = async () => {
        if (!transcriptText || transcriptSegments.length === 0) { showToast("စာသားအရင်ထုတ်ပါ!", "error"); return; }
        setIsProcessing(true);
        await runWithProgress(setSrtProgress, async () => {
          await new Promise(r => setTimeout(r, 500));
          let srtResult = "";
          const formatTime = (seconds) => {
            const date = new Date(seconds * 1000);
            return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
          };
          transcriptSegments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
          setSrtText(srtResult);
          showToast("SRT ဖန်တီးပြီးပါပြီ။", "success");
        });
        setIsProcessing(false);
      };

      const runTranslation = async (type) => {
        const activeKey = userGeminiKey || systemGeminiKey;
        if (!activeKey) { showToast("System Key မရှိပါ။ Settings တွင် ကိုယ်ပိုင် Gemini Key ထည့်ပါ", "error"); return; }
        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent.trim()) { showToast("ဘာသာပြန်ရန် စာသားအရင်ထည့်ပါ။", "error"); return; }

        setIsProcessing(true);
        const progressSetter = type === 'srt' ? setTranslateSrtProgress : setTranslateTextProgress;
        const langRule = "Translate into natural, everyday Burmese (Myanmar) only. Output must be written strictly in Myanmar (Burmese) Unicode script. Do NOT include any Chinese characters, Chinese words, or any other language mixed in the output — Myanmar text only, no exceptions.";
        const prompt = type === 'srt'
          ? `${langRule} This is an SRT file. Preserve all numbers and timestamps exactly, only translate the caption text. SRT:\n\n${sourceContent}`
          : `${langRule}\n\nText to translate:\n\n${sourceContent}`;

        try {
          await runWithProgress(progressSetter, async () => {
            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${activeKey}`, {
              method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });
            if (!res.ok) throw new Error("API Error");
            const data = await res.json();
            const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Error.";
            type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);

                          <span>Groq API Keys</span>
                          <span className="text-amber-500/70 text-[10px] bg-amber-500/10 px-2 py-0.5 rounded">တစ်လိုင်းတစ်ကီး</span>
                        </label>
                        <textarea rows="4" value={systemGroqKeysInput} onChange={(e) => setSystemGroqKeysInput(e.target.value)} className="w-full bg-black/40 border border-purple-500/30 focus:border-amber-500 rounded-xl py-3 px-3 text-white text-xs font-mono outline-none transition-colors resize-none input-focus-ring" placeholder={"gsk_key_1\ngsk_key_2\n..."}></textarea>
                      </div>
                      <button onClick={saveSystemKeys} className="w-full joker-btn hover:opacity-90 text-slate-900 py-3.5 rounded-xl font-bold text-sm shadow-lg transform transition-all active:scale-95 flex items-center justify-center gap-2">
                        <i className="fa-solid fa-cloud-arrow-up"></i> Save Keys to Cloud
                      </button>
                      <p className="text-[10px] text-purple-400">Key မထည့်ထားသော user များ Extract Text/Translate သုံးသည့်အခါ ဤ key များကို အလှည့်ကျ (rotation) သုံးမည်။</p>
                    </div>
                  </div>
                </div>
              )}

            </main>
          </div>

          {/* ADMIN LOGIN MODAL */}
          {showAdminLoginModal && (
            <div className="fixed inset-0 bg-black/80 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
              <div className="glass-card border border-purple-500/30 w-full max-w-xs rounded-3xl p-8 relative text-center shadow-2xl">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-purple-400 w-8 h-8 hover:text-white bg-black/40 rounded-full flex items-center justify-center"><i className="fa-solid fa-xmark"></i></button>
                <div className="w-16 h-16 rounded-full bg-amber-500/10 flex items-center justify-center border border-amber-500/30 mx-auto mb-4 text-2xl">🃏</div>
                <h3 className="text-lg font-bold gold-text mb-6">Admin Login</h3>
                <form onSubmit={handleAdminLogin} className="space-y-5">
                  <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-black/40 border border-purple-500/30 rounded-xl p-4 text-white text-center tracking-[0.3em] text-xl outline-none focus:border-amber-500 transition-colors input-focus-ring" placeholder="••••••" />
                  <button type="submit" className="w-full joker-btn text-slate-900 font-bold py-4 rounded-xl shadow-lg hover:opacity-90 transition-transform active:scale-95">ဝင်မည်</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
