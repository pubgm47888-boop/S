<body>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    const safeGetLocal = (key, defaultVal) => { try { return window.localStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
    const safeSetLocal = (key, val) => { try { window.localStorage.setItem(key, val); } catch(e) {} };
    const safeGetSession = (key, defaultVal) => { try { return window.sessionStorage.getItem(key) || defaultVal; } catch(e) { return defaultVal; } };
    const safeSetSession = (key, val) => { try { window.sessionStorage.setItem(key, val); } catch(e) {} };
    const safeRemoveSession = (key) => { try { window.sessionStorage.removeItem(key); } catch(e) {} };

    // --- Firebase Setup ---
    const firebaseConfig = {
      apiKey: "AIzaSyDRaW1Y_L586Z7NBqiPDUpXa-dVXGvF1QE",
      authDomain: "whlaing-d5c07.firebaseapp.com",
      projectId: "whlaing-d5c07",
      storageBucket: "whlaing-d5c07.firebasestorage.app",
      messagingSenderId: "824820035764",
      appId: "1:824820035764:web:8ad8bffe7ce77f4c3027e1",
      measurementId: "G-HHFLLWEW6L"
    };

    let db = null, auth = null;
    try {
      if (window.firebase && !firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
        db = firebase.firestore();
        auth = firebase.auth();
      }
    } catch (e) { console.warn("Firebase Init Error:", e); }

    function App() {
      const initialGroqKeys = [
        "gsk_MaUgafpHlKCG7rm4yrWGdybZ3YYajEy9h1UGDgp8slZBaiaHh",
        "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",
        "gsk_VzWWFVfaf2OGQFKrYVMWGdbY3Ysa28Ov2zqc3fh5e2NIQe",
        "gsk_IYWAEfpNhqA1hj9AAMWIWdby3FDFZ3drWdDbI4mjzv6bd388GBI",
        "gsk_YjrainOzPDsG9vc8ETFWhdGdbY3WkCvxUHdqsb2ZNstPnGQ7f6n"
      ];

      const [firebaseUser, setFirebaseUser] = useState(null);
      const [userRole, setUserRole] = useState('user');
      const [isAdminAuthenticated, setIsAdminAuthenticated] = useState(() => safeGetSession('is_admin_auth', 'false') === 'true');
      const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
      const [adminPasswordInput, setAdminPasswordInput] = useState('');
      
      const [userGeminiKey, setUserGeminiKey] = useState(() => safeGetLocal('gemini_api_key', ''));
      const [userGroqKey, setUserGroqKey] = useState(() => safeGetLocal('user_groq_api_key', ''));
      const [groqStatus, setGroqStatus] = useState(null);
      const [geminiStatus, setGeminiStatus] = useState(null);
      
      const [showPaymentModal, setShowPaymentModal] = useState(false);
      const [submittedTxId, setSubmittedTxId] = useState('');
      const [activeTab, setActiveTab] = useState('tts'); // Changed default tab to 'tts' for easy testing
      const [activeKeyIndex, setActiveKeyIndex] = useState(0);

      const [selectedFile, setSelectedFile] = useState(null);
      const [isProcessing, setIsProcessing] = useState(false);
      const [logs, setLogs] = useState([]);
      const [transcriptText, setTranscriptText] = useState(() => safeGetLocal('stored_transcript', ''));
      const [transcriptSegments, setTranscriptSegments] = useState(() => { try { return JSON.parse(safeGetLocal('stored_segments', '[]')); } catch(e) { return []; } });
      const [srtText, setSrtText] = useState(() => safeGetLocal('stored_srt', ''));
      const [translatedText, setTranslatedText] = useState(() => safeGetLocal('stored_translation', ''));
      const [translatedSrtText, setTranslatedSrtText] = useState(() => safeGetLocal('stored_translated_srt', ''));

      const [targetLang, setTargetLang] = useState('Myanmar');
      const languagesList = [
        { id: 'Myanmar', name: '🇲🇲 မြန်မာ' }, { id: 'English', name: '🇬🇧 အင်္ဂလိပ်' },
        { id: 'Japanese', name: '🇯🇵 ဂျပန်' }, { id: 'Korean', name: '🇰🇷 ကိုရီးယား' },
        { id: 'Thai', name: '🇹🇭 ထိုင်း' }, { id: 'Chinese', name: '🇨🇳 တရုတ်' }
      ];

      // TTS States Update
      const [ttsInput, setTtsInput] = useState('');
      const [selectedVoice, setSelectedVoice] = useState('Nilar');
      const [ttsRate, setTtsRate] = useState(0);   
      const [ttsPitch, setTtsPitch] = useState(0); 
      const [isSynthesizing, setIsSynthesizing] = useState(false);
      const [synthesizedAudioUrl, setSynthesizedAudioUrl] = useState(null);
      const [ttsErrorDetail, setTtsErrorMsg] = useState('');
      const audioRef = useRef(null);

      const [toast, setToast] = useState({ show: false, message: '', type: 'info' });
      const [paymentRequests, setPaymentRequests] = useState([]);

      const showToast = (message, type = 'info') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'info' }), 4000);
      };

      // --- Auth & Database Listener ---
      useEffect(() => {
        if (!auth) return;
        auth.signInAnonymously().catch(e => console.warn("Anonymous Auth Warning:", e));
        
        const unsub = auth.onAuthStateChanged(user => {
          if (user) {
            setFirebaseUser(user);
            if(db) {
              db.collection("users").doc(user.uid).onSnapshot(doc => {
                if (doc.exists) { setUserRole(doc.data().role || 'user'); } 
                else { db.collection("users").doc(user.uid).set({ role: 'user', createdAt: new Date().toISOString() }); }
              });
            }
          } else {
            setFirebaseUser(null);
          }
        });
        return () => unsub();
      }, []);

      useEffect(() => {
        if (!firebaseUser || !db) return;
        const unsub = db.collection("payments").onSnapshot(snapshot => {
          const list = [];
          snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
          list.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
          setPaymentRequests(list);
        });
        return () => unsub();
      }, [firebaseUser]);

      useEffect(() => {
        safeSetLocal('stored_transcript', transcriptText);
        safeSetLocal('stored_segments', JSON.stringify(transcriptSegments));
        safeSetLocal('stored_srt', srtText);
        safeSetLocal('stored_translation', translatedText);
        safeSetLocal('stored_translated_srt', translatedSrtText);
      }, [transcriptText, transcriptSegments, srtText, translatedText, translatedSrtText]);

      // --- API Key Checkers ---
      const testGroqKey = async () => {
        if(!userGroqKey) { showToast("Key အရင်ထည့်ပါ", "warning"); return; }
        setLogs(["Groq API Key ကို စစ်ဆေးနေပါသည်..."]);
        try {
          const res = await fetch('https://api.groq.com/openai/v1/models', { headers: { 'Authorization': `Bearer ${userGroqKey}` } });
          if (res.ok) { setGroqStatus('success'); showToast("✅ Groq Key မှန်ကန်ပါသည်။", "success"); setLogs(["✅ Groq Key အလုပ်လုပ်ပါသည်။"]); } 
          else { setGroqStatus('error'); showToast("❌ Groq Key မှားယွင်းနေပါသည်။", "error"); setLogs(["❌ Groq Key မှားယွင်းနေပါသည်။"]); }
        } catch(e) { setGroqStatus('error'); showToast("Connection Error", "error"); }
      };

      const testGeminiKey = async () => {
        if(!userGeminiKey) { showToast("Key အရင်ထည့်ပါ", "warning"); return; }
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: "hi" }] }] })
          });
          if (res.ok) { setGeminiStatus('success'); showToast("✅ Gemini Key မှန်ကန်ပါသည်။", "success"); } 
          else { setGeminiStatus('error'); showToast("❌ Gemini Key မှားယွင်းနေပါသည်။", "error"); }
        } catch(e) { setGeminiStatus('error'); showToast("Connection Error", "error"); }
      };

      // --- Audio Extraction Logic (Client Side) ---
      const processAndExtractAudio = async (videoFile) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = async (e) => {
            try {
              setLogs(["အသံလှိုင်းများကို ပြင်ဆင်နေပါသည် (ဖိုင်ကြီးပါက အနည်းငယ် ကြာနိုင်ပါသည်)... ⏳"]);
              const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
              const decodedBuffer = await audioCtx.decodeAudioData(e.target.result);
              
              const offlineCtx = new OfflineAudioContext(1, 16000 * decodedBuffer.duration, 16000);
              const bufferSource = offlineCtx.createBufferSource();
              bufferSource.buffer = decodedBuffer;
              bufferSource.connect(offlineCtx.destination);
              bufferSource.start();
              const renderedBuffer = await offlineCtx.startRendering();
              
              const wavBlob = encodeWAV(renderedBuffer);
              setLogs([`အသံဖိုင် သီးသန့်ခွဲထုတ်ခြင်း ပြီးမြောက်ပါပြီ။ 🚀`]);
              resolve(new File([wavBlob], "extracted_audio.wav", { type: "audio/wav" }));
            } catch (err) { reject(err); }
          };
          reader.onerror = () => reject(new Error("File reading failed"));
          reader.readAsArrayBuffer(videoFile);
        });
      };

      const encodeWAV = (audioBuffer) => {
        const buffer = audioBuffer.getChannelData(0);
        const sampleRate = audioBuffer.sampleRate;
        const length = buffer.length * 2 + 44;
        const bufferArray = new ArrayBuffer(length);
        const view = new DataView(bufferArray);
        const writeStr = (offset, str) => { for (let i = 0; i < str.length; i++) view.setUint8(offset + i, str.charCodeAt(i)); };
        
        writeStr(0, 'RIFF'); view.setUint32(4, length - 8, true); writeStr(8, 'WAVE'); 
        writeStr(12, 'fmt '); view.setUint32(16, 16, true); view.setUint16(20, 1, true); 
        view.setUint16(22, 1, true); view.setUint32(24, sampleRate, true); 
        view.setUint32(28, sampleRate * 2, true); view.setUint16(32, 2, true); 
        view.setUint16(34, 16, true); writeStr(36, 'data'); view.setUint32(40, length - 44, true);
        
        let offset = 44;
        for (let i = 0; i < buffer.length; i++, offset += 2) {
          const s = Math.max(-1, Math.min(1, buffer[i]));
          view.setInt16(offset, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
        }
        return new Blob([view], { type: 'audio/wav' });
      };

      // --- Transcription ---
      const runTranscription = async () => {
        if (!selectedFile) { showToast("ဖိုင်ရွေးချယ်ပေးပါ!", "error"); return; }
        if (userGroqKey && groqStatus === 'error') { showToast("Groq API Key မှားယွင်းနေပါသည်။", "error"); return; }

        setIsProcessing(true); 
        setLogs(["AI စတင် အလုပ်လုပ်နေပါပြီ..."]);
        
        let audioFileToSend = selectedFile;
        
        if (selectedFile.type.startsWith('video/') || selectedFile.name.match(/\.(mp4|mkv|mov|avi)$/i)) {
          try { 
            audioFileToSend = await processAndExtractAudio(selectedFile); 
          } catch (err) { 
            setLogs(["ဗီဒီယိုမှ အသံထုတ်ယူခြင်း မအောင်မြင်ပါ။ ဖုန်း Memory မလုံလောက်ခြင်း ဖြစ်နိုင်ပါသည်။"]); 
            setIsProcessing(false); 
            return; 
          }
        }

        let success = false, resultText = "", resultSegments = [];
        const formData = new FormData(); 
        formData.append('file', audioFileToSend); 
        formData.append('model', 'whisper-large-v3'); 
        formData.append('response_format', 'verbose_json');
        
        if (userGroqKey && groqStatus !== 'error') {
          try {
            setLogs(["ကိုယ်ပိုင် Key ဖြင့် AI သို့ ဖိုင်ပေးပို့နေပါသည်..."]);
            const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${userGroqKey}` }, body: formData });
            if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; }
          } catch (err) {}
        }
        
        if (!success) {
          setLogs(["စနစ် Key ဖြင့် AI သို့ ဖိုင်ပေးပို့နေပါသည်..."]);
          let keyIndex = activeKeyIndex;
          for (let i = 0; i < initialGroqKeys.length; i++) {
            try {
              const res = await fetch('https://api.groq.com/openai/v1/audio/transcriptions', { method: 'POST', headers: { 'Authorization': `Bearer ${initialGroqKeys[keyIndex]}` }, body: formData });
              if (res.ok) { const data = await res.json(); resultText = data.text; resultSegments = data.segments || []; success = true; setActiveKeyIndex(keyIndex); break; }
            } catch (err) { keyIndex = (keyIndex + 1) % initialGroqKeys.length; }
          }
        }

        if (success) {
          setTranscriptText(resultText); setTranscriptSegments(resultSegments); showToast("စာသားထုတ်ယူခြင်း အောင်မြင်ပါသည်။", "success"); setLogs(["✅ အောင်မြင်စွာ ပြီးမြောက်ပါပြီ။"]);
        } else {
          showToast("API Error - ဖိုင်အရွယ်အစား ကြီးလွန်းနေနိုင်ပါသည်။", "error"); setLogs(["⚠️ ထုတ်ယူ၍ မရပါ။ ဖိုင်အရွယ်အစား လျှော့ချကြည့်ပါ။"]);
        }
        setIsProcessing(false);
      };

      const generateSrt = () => {
        if (!transcriptText || transcriptSegments.length === 0) { showToast("စာသားအရင်ထုတ်ပါ!", "error"); return; }
        setIsProcessing(true);
        setTimeout(() => {
          let srtResult = "";
          const formatTime = (seconds) => {
            const date = new Date(seconds * 1000);
            return `${String(date.getUTCHours()).padStart(2,'0')}:${String(date.getUTCMinutes()).padStart(2,'0')}:${String(date.getUTCSeconds()).padStart(2,'0')},${String(Math.floor((seconds%1)*1000)).padStart(3,'0')}`;
          };
          transcriptSegments.forEach((seg, idx) => { srtResult += `${idx + 1}\n${formatTime(seg.start)} --> ${formatTime(seg.end)}\n${seg.text.trim()}\n\n`; });
          setSrtText(srtResult); showToast("SRT ဖန်တီးပြီးပါပြီ။", "success"); setIsProcessing(false);
        }, 500);
      };

      // --- Translation ---
      const runTranslation = async (type) => {
        if (!userGeminiKey) { showToast("Gemini API Key အရင်ထည့်ပါ။", "error"); return; }

        const sourceContent = type === 'srt' ? srtText : transcriptText;
        if (!sourceContent.trim()) { showToast("ဘာသာပြန်ရန် မူရင်းစာသား မရှိပါ။ စာသားအရင်ထည့်ပါ။", "error"); return; }

        setIsProcessing(true);
        const prompt = type === 'srt' ? `Translate this SRT file into ${targetLang}. Preserve all numbers and timestamps exactly. Only translate the text. SRT:\n\n${sourceContent}` : `Translate the following text into ${targetLang}:\n\n${sourceContent}`;
        try {
          const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${userGeminiKey}`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
          });
          if (!res.ok) throw new Error("API Error");
          const data = await res.json();
          const result = data.candidates?.[0]?.content?.parts?.[0]?.text || "Translation Error.";
          type === 'srt' ? setTranslatedSrtText(result) : setTranslatedText(result);
          showToast(`အောင်မြင်စွာ ပြန်ဆိုပြီးပါပြီ။`, "success");
        } catch (e) { showToast("Gemini Key မှားယွင်းနိုင်ပါသည်။", "error"); }
        setIsProcessing(false);
      };

      // --- TTS Logic Updated ---
      const chunkBurmeseText = (text, maxLength) => {
        const chunks = [];
        let current = text;
        while (current.length > 0) {
          if (current.length <= maxLength) { chunks.push(current); break; }
          let splitIndex = current.lastIndexOf("။", maxLength);
          if (splitIndex === -1) splitIndex = current.lastIndexOf("၊", maxLength);
          if (splitIndex === -1) splitIndex = current.lastIndexOf(" ", maxLength);
          if (splitIndex === -1 || splitIndex === 0) splitIndex = maxLength; else splitIndex += 1;
          chunks.push(current.slice(0, splitIndex).trim());
          current = current.slice(splitIndex).trim();
        }
        return chunks.filter(c => c.length > 0);
      };

      const runTtsGeneration = async () => {
        if (userRole !== 'premium') { showToast("Premium ဖြင့်သာ သုံးနိုင်ပါသည်။", "error"); return; }
        const text = ttsInput.trim();
        if (!text) { showToast("စာသားရိုက်ထည့်ပါ!", "error"); return; }

        setIsSynthesizing(true); setTtsErrorMsg(''); setSynthesizedAudioUrl(null);
        try {
          const chunks = chunkBurmeseText(text, 150);
          let currentChunk = 0;
          if (audioRef.current) audioRef.current.pause();

          const playbackSpeed = 1.0 + (ttsRate / 100);
          
          const playNextChunk = () => {
            if(currentChunk >= chunks.length) { setIsSynthesizing(false); showToast("အသံဖန်တီးမှု ပြီးဆုံးပါပြီ။", "success"); return; }
            
            const speechUrl = `https://translate.google.com/translate_tts?ie=UTF-8&tl=my&client=tw-ob&q=${encodeURIComponent(chunks[currentChunk])}`;
            const audioObj = new Audio(speechUrl);
            audioRef.current = audioObj;
            
            audioObj.playbackRate = playbackSpeed;
            // Google Translate Voice is naturally female. If 'Thiha' is selected, we lower pitch to simulate male voice.
            if (selectedVoice === 'Thiha') {
               audioObj.preservesPitch = false;
               audioObj.playbackRate = playbackSpeed * 0.85; // slightly slower & deeper for Thiha
            } else {
               audioObj.preservesPitch = (ttsPitch == 0); 
            }

            audioObj.onended = () => { currentChunk++; playNextChunk(); };
            audioObj.onerror = () => { setTtsErrorMsg(`အသံဖိုင် ဖွင့်၍မရပါ။`); currentChunk++; playNextChunk(); };
            audioObj.play().then(() => { if (chunks.length === 1) setSynthesizedAudioUrl(speechUrl); }).catch(err => {
              setTtsErrorMsg("Browser အသံပိတ်ထားပါသည်။ Play ခလုတ်ကို နှိပ်ပါ။"); setIsSynthesizing(false);
            });
          };
          playNextChunk();
        } catch (err) { setTtsErrorMsg("⚠ Error: " + err.message); setIsSynthesizing(false); }
      };

      // --- Admin Actions ---
      const handlePaymentSubmit = async (e) => {
        e.preventDefault();
        
        if (!db) { 
           showToast("Database နှင့် ချိတ်ဆက်၍မရပါ။", "error"); 
           return; 
        }

        let currentUser = firebaseUser;
        
        if (!currentUser) {
           try {
             const cred = await auth.signInAnonymously();
             currentUser = cred.user;
             setFirebaseUser(currentUser);
           } catch (err) {
             showToast("Firebase တွင် Anonymous Auth ဖွင့်ထားရန် လိုအပ်ပါသည်။", "error");
             return;
           }
        }

        try {
          await db.collection("payments").doc(currentUser.uid).set({
            userId: currentUser.uid, transactionId: submittedTxId, status: "Pending", timestamp: new Date().toISOString()
          });
          showToast("အောင်မြင်စွာ တင်ပြပြီးပါပြီ။", "success"); 
          setShowPaymentModal(false); 
          setSubmittedTxId('');
        } catch (err) { 
          showToast("တင်ပြမှု မအောင်မြင်ပါ။", "error"); 
        }
      };

      const handleApproveRequest = async (request) => {
        if (!db) return;
        try {
          await db.collection("users").doc(request.userId).update({ role: 'premium' });
          await db.collection("payments").doc(request.userId).update({ status: 'Approved' });
          showToast("Premium အတည်ပြုပြီးပါပြီ။", "success");
        } catch (err) { showToast("Error", "error"); }
      };

      const handleRejectRequest = async (id) => { 
        if (!db) return; 
        try { await db.collection("payments").doc(id).update({ status: 'Rejected' }); } catch (err) { showToast("Error", "error"); }
      };

      const handleAdminLogin = (e) => {
        e.preventDefault();
        if (adminPasswordInput === "111") {
          setIsAdminAuthenticated(true); safeSetSession('is_admin_auth', 'true'); setShowAdminLoginModal(false); setAdminPasswordInput(''); showToast("Admin ဝင်ရောက်ပြီးပါပြီ။", "success");
        } else { showToast("Password မှားယွင်းပါသည်။", "error"); }
      };

      const tabs = [
        { id: 'transcript', icon: 'fa-microphone', label: 'Extract Text' },
        { id: 'srt', icon: 'fa-closed-captioning', label: 'SRT Gen' },
        { id: 'translation', icon: 'fa-language', label: 'Translate' },
        { id: 'tts', icon: 'fa-volume-high', label: 'အသံထွက် (TTS)' }
      ];
      if (isAdminAuthenticated) tabs.push({ id: 'admin', icon: 'fa-shield-halved', label: 'Admin Board' });

      return (
        <div className="min-h-screen pb-20 md:pb-8 flex flex-col items-center pt-4 md:pt-10 px-4">
          {toast.show && (
            <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 px-6 py-3 rounded-full shadow-lg bg-indigo-600 text-white font-semibold text-sm flex items-center gap-2">
              <i className="fa-solid fa-circle-info"></i> {toast.message}
            </div>
          )}

          <div className="w-full max-w-2xl">
            <header className="flex justify-between items-center mb-6">
              <div>
                <h1 className="text-2xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-indigo-400 to-purple-400 flex items-center gap-2">
                  <i className="fa-solid fa-sparkles text-indigo-400"></i> DeepLearn 
                </h1>
                <p className="text-xs text-slate-500 font-medium mt-1">AI Workspace Pro</p>
              </div>
              <div className="flex gap-2">
                <a href="https://t.me/Deeplearnxai" target="_blank" className="glass-card hover:bg-slate-800 text-[#2AABEE] w-10 h-10 rounded-xl flex items-center justify-center transition-colors" title="Join Telegram Channel">
                  <i className="fa-brands fa-telegram text-xl"></i>
                </a>

                {userRole !== 'premium' ? (
                  <button onClick={() => setShowPaymentModal(true)} className="bg-gradient-to-r from-amber-500 to-orange-400 text-slate-900 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1 shadow-lg hover:scale-105 transition-all">
                    <i className="fa-solid fa-crown text-base"></i> Upgrade
                  </button>
                ) : (
                  <span className="glass-card text-emerald-400 border-emerald-500/20 font-bold px-4 py-2 rounded-xl text-xs flex items-center gap-1">
                    <i className="fa-solid fa-circle-check"></i> Premium
                  </span>
                )}
                {!isAdminAuthenticated ? (
                  <button onClick={() => setShowAdminLoginModal(true)} className="glass-card hover:bg-slate-800 text-slate-400 w-10 h-10 rounded-xl flex items-center justify-center">
                    <i className="fa-solid fa-lock text-lg"></i>
                  </button>
                ) : (
                  <button onClick={() => {setIsAdminAuthenticated(false); safeRemoveSession('is_admin_auth');}} className="bg-red-500/10 text-red-400 border border-red-500/20 w-10 h-10 rounded-xl flex items-center justify-center">
                    <i className="fa-solid fa-right-from-bracket text-lg"></i>
                  </button>
                )}
              </div>
            </header>

            <div className="flex overflow-x-auto gap-3 hide-scrollbar mb-6 pb-2">
              {tabs.map(tab => (
                <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex items-center gap-2 px-5 py-3 rounded-2xl font-semibold text-sm transition-all whitespace-nowrap ${activeTab === tab.id ? 'bg-indigo-600 text-white shadow-lg' : 'glass-card text-slate-400 hover:text-slate-200 hover:bg-slate-800'}`}>
                  <i className={`fa-solid ${tab.icon} text-lg`}></i> {tab.label}
                </button>
              ))}
            </div>

            <main className="glass-card rounded-3xl p-6 sm:p-8">
              
              {/* TRANSCRIPT TAB */}
              {activeTab === 'transcript' && (
                <div className="space-y-6">
                  <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                     <label className="text-xs font-bold text-slate-300 block mb-2">Groq API Key ထည့်ရန် (Optional)</label>
                     <div className="flex gap-2">
                        <input type="password" value={userGroqKey} onChange={(e) => {setUserGroqKey(e.target.value); safeSetLocal('user_groq_api_key', e.target.value);}} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-white text-xs" placeholder="gsk_..." />
                        <button onClick={testGroqKey} className="bg-indigo-600 hover:bg-indigo-500 px-3 rounded-lg text-xs font-bold whitespace-nowrap">စစ်ဆေးမည်</button>
                     </div>
                  </div>

                  <div className="text-center">
                    <div className="relative mb-6">
                      <input type="file" accept="audio/*,video/*" onChange={(e) => setSelectedFile(e.target.files[0])} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                      <div className="border-2 border-dashed border-slate-700 bg-slate-900 rounded-2xl p-6 hover:border-indigo-500/50">
                        {selectedFile ? <i className="fa-solid fa-file-audio text-4xl text-indigo-400 mx-auto mb-3 block"></i> : <i className="fa-solid fa-cloud-arrow-up text-4xl text-slate-500 mx-auto mb-3 block"></i>}
                        <p className="text-sm font-semibold text-slate-300">{selectedFile ? selectedFile.name : "Tap to browse files"}</p>
                      </div>
                    </div>
                    <button onClick={runTranscription} disabled={isProcessing} className="w-full bg-indigo-600 hover:bg-indigo-500 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
                      {isProcessing ? <i className="fa-solid fa-spinner fa-spin text-2xl"></i> : <i className="fa-solid fa-wand-magic-sparkles text-2xl"></i>} စာသားထုတ်ယူမည်
                    </button>
                    {logs.length > 0 && <p className="text-xs text-indigo-400 font-semibold mt-4">{logs[logs.length-1]}</p>}
                  </div>

                  <div className="pt-4 border-t border-slate-800">
                    <textarea rows="6" value={transcriptText} onChange={(e) => setTranscriptText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-slate-300 text-sm" placeholder="Result will appear here..." />
                  </div>
                </div>
              )}

              {/* SRT TAB */}
              {activeTab === 'srt' && (
                <div className="space-y-6">
                  <div className="text-center pb-6 border-b border-slate-800">
                    <button onClick={generateSrt} disabled={isProcessing} className="w-full bg-purple-600 hover:bg-purple-500 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2">
                      <i className="fa-solid fa-file-video text-2xl"></i> SRT ဖန်တီးမည်
                    </button>
                  </div>
                  {srtText && (
                    <div>
                      <textarea rows="8" value={srtText} onChange={(e) => setSrtText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-4 text-slate-300 font-mono text-xs" />
                    </div>
                  )}
                </div>
              )}

              {/* TRANSLATION TAB */}
              {activeTab === 'translation' && (
                <div className="space-y-6">
                  <div className="bg-slate-900 border border-slate-800 p-4 rounded-xl">
                     <label className="text-xs font-bold text-slate-300 block mb-2">Gemini API Key ထည့်ရန် (Required)</label>
                     <div className="flex gap-2">
                        <input type="password" value={userGeminiKey} onChange={(e) => {setUserGeminiKey(e.target.value); safeSetLocal('gemini_api_key', e.target.value);}} className="w-full bg-slate-950 border border-slate-700 rounded-lg p-2 text-white text-xs" placeholder="AIzaSy..." />
                        <button onClick={testGeminiKey} className="bg-blue-600 hover:bg-blue-500 px-3 rounded-lg text-xs font-bold whitespace-nowrap">စစ်ဆေးမည်</button>
                     </div>
                  </div>

                  <div className="flex items-center justify-between">
                    <h2 className="text-lg font-bold text-white">AI Translator</h2>
                    <select value={targetLang} onChange={(e) => setTargetLang(e.target.value)} className="bg-slate-900 border border-slate-700 py-2 px-3 rounded-xl text-white text-sm">
                      {languagesList.map(lang => <option key={lang.id} value={lang.id}>{lang.name}</option>)}
                    </select>
                  </div>

                  <div className="space-y-4">
                    <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-4">
                      <label className="text-xs font-bold text-slate-400 block mb-2">မူရင်းစာသား (Source Text)</label>
                      <textarea rows="3" value={transcriptText} onChange={(e) => setTranscriptText(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-sm text-slate-300 mb-2" placeholder="ဘာသာပြန်မည့် စာသားကို ဤနေရာတွင် ထည့်ပါ..." />
                      
                      <button onClick={() => runTranslation('transcript')} disabled={isProcessing} className="w-full bg-indigo-600/20 hover:bg-indigo-600/30 text-indigo-300 py-3 rounded-xl font-bold mb-3 text-sm">စာသားကို ဘာသာပြန်မည်</button>
                      
                      <label className="text-xs font-bold text-emerald-400 block mb-2">ဘာသာပြန်ထားသောစာသား (Result)</label>
                      <textarea rows="4" value={translatedText} onChange={(e) => setTranslatedText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-sm text-slate-300" placeholder="Translated text..." />
                    </div>

                    <div className="bg-slate-900/50 border border-slate-800 rounded-2xl p-4">
                      <label className="text-xs font-bold text-slate-400 block mb-2">မူရင်း SRT (Source SRT)</label>
                      <textarea rows="3" value={srtText} onChange={(e) => setSrtText(e.target.value)} className="w-full bg-slate-950 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300 mb-2" placeholder="ဘာသာပြန်မည့် SRT စာသားကို ဤနေရာတွင် ထည့်ပါ..." />

                      <button onClick={() => runTranslation('srt')} disabled={isProcessing} className="w-full bg-purple-600/20 hover:bg-purple-600/30 text-purple-300 py-3 rounded-xl font-bold mb-3 text-sm">SRT ကို ဘာသာပြန်မည်</button>
                      
                      <label className="text-xs font-bold text-emerald-400 block mb-2">ဘာသာပြန်ထားသော SRT (Result)</label>
                      <textarea rows="4" value={translatedSrtText} onChange={(e) => setTranslatedSrtText(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-xl p-3 text-xs font-mono text-slate-300" placeholder="Translated SRT..." />
                    </div>
                  </div>
                </div>
              )}

              {/* TTS TAB */}
              {activeTab === 'tts' && (
                <div className="space-y-6 relative">
                  {userRole !== 'premium' && (
                    <div className="absolute inset-0 z-10 bg-slate-950/80 rounded-2xl flex flex-col items-center justify-center p-6 text-center">
                      <i className="fa-solid fa-lock text-5xl text-amber-500 mb-4"></i>
                      <h2 className="text-xl font-bold text-white mb-2">Premium Exclusive</h2>
                      <button onClick={() => setShowPaymentModal(true)} className="bg-gradient-to-r from-amber-500 to-orange-400 text-slate-900 px-8 py-3 rounded-xl font-bold mt-4">Unlock Premium</button>
                    </div>
                  )}
                  <div className={`space-y-6 ${userRole !== 'premium' ? 'opacity-20 pointer-events-none' : ''}`}>
                    
                    {/* UI - Voice Selection & Sliders */}
                    <div className="bg-slate-900 p-4 rounded-2xl border border-slate-800 space-y-4">
                      <div>
                         <label className="text-xs text-slate-400 font-bold block mb-2">Voice Type</label>
                         <select value={selectedVoice} onChange={(e) => setSelectedVoice(e.target.value)} className="w-full bg-slate-950 p-3 rounded-xl text-white outline-none border border-slate-700">
                           <option value="Nilar">🎙️ Nilar (Female)</option>
                           <option value="Thiha">🎙️ Thiha (Male - Auto Pitch adjustment)</option>
                         </select>
                      </div>

                      <div className="flex gap-4">
                        <div className="flex-1">
                          <div className="flex justify-between items-center mb-2">
                             <label className="text-xs text-slate-400 font-bold">Speed</label>
                             <span className="text-xs font-bold text-pink-400">{ttsRate > 0 ? '+' : ''}{ttsRate}%</span>
                          </div>
                          <input type="range" min="-50" max="50" step="5" value={ttsRate} onChange={(e) => setTtsRate(parseInt(e.target.value))} className="w-full accent-pink-500" />
                        </div>
                        <div className="flex-1">
                          <div className="flex justify-between items-center mb-2">
                             <label className="text-xs text-slate-400 font-bold">Pitch</label>
                             <span className="text-xs font-bold text-purple-400">{ttsPitch > 0 ? '+' : ''}{ttsPitch}%</span>
                          </div>
                          <input type="range" min="-50" max="50" step="5" value={ttsPitch} onChange={(e) => setTtsPitch(parseInt(e.target.value))} className="w-full accent-purple-500" />
                        </div>
                      </div>
                    </div>

                    <textarea rows="6" value={ttsInput} onChange={(e) => setTtsInput(e.target.value)} className="w-full bg-slate-900 border border-slate-800 rounded-2xl p-4 text-white outline-none" placeholder="မြန်မာစာ ရိုက်ထည့်ပါ..." />
                    
                    <button onClick={runTtsGeneration} disabled={isSynthesizing} className="w-full bg-pink-600 hover:bg-pink-500 text-white py-4 rounded-2xl font-bold text-lg flex items-center justify-center gap-2 transition-all">
                       {isSynthesizing ? <i className="fa-solid fa-spinner fa-spin text-xl"></i> : <i className="fa-solid fa-play text-xl"></i>}
                       Generate Audio
                    </button>
                    
                    {synthesizedAudioUrl && (
                      <div className="mt-4 p-4 bg-slate-950 rounded-xl border border-slate-800">
                         <audio controls className="w-full" src={synthesizedAudioUrl}></audio>
                      </div>
                    )}
                  </div>
                </div>
              )}

              {/* ADMIN TAB */}
              {activeTab === 'admin' && isAdminAuthenticated && (
                <div className="space-y-3">
                  {paymentRequests.length === 0 ? <p className="text-slate-500 text-center py-10">No requests.</p> : paymentRequests.map(req => (
                    <div key={req.id} className="bg-slate-900 p-4 rounded-xl border border-slate-800 flex justify-between items-center">
                      <div>
                        <p className="text-indigo-400 font-mono text-sm font-bold">{req.transactionId}</p>
                        <p className="text-[10px] text-slate-500">User: {req.userId.substring(0,8)}</p>
                      </div>
                      {req.status === 'Pending' ? (
                        <div className="flex gap-2">
                          <button onClick={() => handleApproveRequest(req)} className="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-lg text-xs font-bold">Approve</button>
                          <button onClick={() => handleRejectRequest(req.id)} className="bg-red-500/20 text-red-400 px-3 py-1 rounded-lg text-xs font-bold">Reject</button>
                        </div>
                      ) : <span className="font-bold text-[10px] uppercase">{req.status}</span>}
                    </div>
                  ))}
                </div>
              )}

            </main>
          </div>

          {showPaymentModal && (
            <div className="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4">
              <div className="glass-card w-full max-w-sm rounded-3xl p-6 relative">
                <button onClick={() => setShowPaymentModal(false)} className="absolute top-4 right-4 text-slate-500 w-8 h-8"><i className="fa-solid fa-xmark"></i></button>
                <div className="text-center mb-6 pt-2"><h3 className="text-xl font-bold text-amber-400 mb-2">Go Premium</h3><span className="bg-slate-950 px-5 py-2 rounded-2xl text-white font-bold">၁ လ - ၁၀,၀၀၀ ကျပ်</span></div>
                
                <div className="flex gap-4 mb-6">
                   <div className="flex-1 bg-white p-2 rounded-2xl text-center"><img src="https://i.postimg.cc/zLrJ2JT5/IMG-20260702-083712-916.jpg" className="w-full rounded-lg" /><p className="text-black font-extrabold text-[10px] mt-2">KBZ Pay</p></div>
                   <div className="flex-1 bg-white p-2 rounded-2xl text-center"><img src="https://i.postimg.cc/Ty6RNRnx/IMG-20260702-083717-243.jpg" className="w-full rounded-lg" /><p className="text-black font-extrabold text-[10px] mt-2">Wave Pay</p></div>
                </div>
                
                <a href="https://t.me/thetphyo_tun" target="_blank" className="w-full bg-[#2AABEE]/10 border border-[#2AABEE]/20 text-[#2AABEE] py-3.5 rounded-xl font-bold flex items-center justify-center gap-2 hover:bg-[#2AABEE]/20 transition-colors text-sm mb-4">
                   <i className="fa-brands fa-telegram text-xl"></i> ငွေလွှဲပြေစာအား Telegram သို့ပို့ရန်
                </a>

                <form onSubmit={handlePaymentSubmit} className="space-y-5">
                  <input type="text" required value={submittedTxId} onChange={(e) => setSubmittedTxId(e.target.value)} className="w-full bg-slate-950 rounded-xl p-4 text-white text-center tracking-[0.2em]" placeholder="TxID နောက်ဆုံး ၆ လုံး" />
                  <button type="submit" className="w-full bg-gradient-to-r from-amber-500 to-orange-400 text-slate-950 font-bold py-4 rounded-xl">တင်ပြမည်</button>
                </form>
              </div>
            </div>
          )}

          {showAdminLoginModal && (
            <div className="fixed inset-0 bg-slate-950/80 z-50 flex items-center justify-center p-4">
              <div className="glass-card w-full max-w-xs rounded-3xl p-8 relative text-center">
                <button onClick={() => setShowAdminLoginModal(false)} className="absolute top-4 right-4 text-slate-500 w-8 h-8"><i className="fa-solid fa-xmark"></i></button>
                <h3 className="text-lg font-bold text-white mb-6">Admin Login</h3>
                <form onSubmit={handleAdminLogin} className="space-y-5">
                  <input type="password" required value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)} className="w-full bg-slate-950 rounded-xl p-4 text-white text-center tracking-[0.3em] text-xl" placeholder="••••••" />
                  <button type="submit" className="w-full bg-slate-100 text-slate-900 font-bold py-4 rounded-xl">ဝင်မည်</button>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    const root = ReactDOM.createRoot(document.getElementById('root')); 
    root.render(<App/>);
  </script>
</body>
</html>
